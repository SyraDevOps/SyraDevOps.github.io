<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYRA | Soluções Concluídas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        :root {
            --primary-white: #ffffff;
            --primary-black: #050505;
            --sidebar-width: 280px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; font-family: 'Inter', sans-serif;
            background-color: var(--primary-black); color: var(--primary-white); overflow: hidden;
        }
        .noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.03; pointer-events: none; z-index: 100;
        }
        .dashboard-container { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); background: var(--primary-white); height: 100%;
            display: flex; flex-direction: column; padding: 40px 0; z-index: 10;
            border-right: 1px solid rgba(0,0,0,0.05);
        }
        .sidebar-header { padding: 0 40px 60px 40px; }
        .sidebar-logo { max-width: 100px; filter: grayscale(1); }
        .nav-group { flex-grow: 1; display: flex; flex-direction: column; }
        .nav-item {
            padding: 16px 40px; color: #666; text-decoration: none;
            font-size: 0.75rem; letter-spacing: 1.2px; text-transform: uppercase;
            font-weight: 500; transition: var(--transition);
        }
        .nav-item:hover { color: var(--primary-black); }
        .nav-item.active { color: var(--primary-black); font-weight: 700; border-left: 3px solid var(--primary-black); }
        .sidebar-footer {
            padding: 40px; border-top: 1px solid rgba(0,0,0,0.05);
            font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: #999; line-height: 1.5;
        }

        /* MAIN */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            background: radial-gradient(circle at center, #0c0c0c 0%, #000 100%);
            overflow: hidden;
        }
        .top-bar {
            padding: 30px 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .top-bar h1 { font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: #444; }
        .top-right { display: flex; align-items: center; gap: 12px; }
        .count-badge { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: #444; letter-spacing: 1px; }
        .clock-small { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: #333; }

        /* SESSIONS */
        .sessions-container {
            flex-grow: 1; overflow-y: auto; padding: 40px 50px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .sessions-container::-webkit-scrollbar { width: 4px; }
        .sessions-container::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        .session-card {
            background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden; transition: var(--transition);
            animation: fadeUp 0.4s ease;
        }
        .session-card:hover { border-color: rgba(255,255,255,0.09); }

        .card-header {
            padding: 20px 25px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer;
        }
        .card-header:hover { background: rgba(255,255,255,0.02); }

        .session-status {
            font-family: 'Space Grotesk', sans-serif; font-size: 8px;
            letter-spacing: 2px; text-transform: uppercase; color: #333;
            margin-bottom: 8px;
        }
        .session-title { font-size: 0.9rem; color: #888; font-weight: 400; line-height: 1.4; max-width: 500px; }
        .session-meta {
            margin-top: 10px; font-family: 'Space Grotesk', sans-serif;
            font-size: 9px; color: #2a2a2a; letter-spacing: 1px; display: flex; gap: 20px;
        }
        .expand-icon { color: #333; font-size: 12px; transition: 0.3s; }
        .expand-icon.open { color: #555; }

        /* Conversa expandida */
        .card-content {
            display: none; border-top: 1px solid rgba(255,255,255,0.04);
            padding: 20px 25px; max-height: 400px; overflow-y: auto;
            display: none; flex-direction: column; gap: 16px;
        }
        .card-content.open { display: flex; }
        .card-content::-webkit-scrollbar { width: 3px; }
        .card-content::-webkit-scrollbar-thumb { background: #222; }

        .msg-item { display: flex; flex-direction: column; gap: 4px; }
        .msg-label { font-family: 'Space Grotesk', sans-serif; font-size: 8px; letter-spacing: 1px; color: #2a2a2a; text-transform: uppercase; }
        .msg-user .msg-label { text-align: right; color: #3a3a3a; }
        .msg-bubble {
            padding: 12px 16px; border-radius: 8px;
            font-size: 0.82rem; line-height: 1.6;
        }
        .msg-model .msg-bubble { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: #666; }
        .msg-user .msg-bubble { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #aaa; align-self: flex-end; }
        .msg-user { align-items: flex-end; }

        /* code blocks inside conversations */
        .msg-bubble pre { background: #0d1117 !important; border-radius: 6px; padding: 10px; margin: 8px 0; overflow-x: auto; border: 1px solid #222; }
        .msg-bubble pre code { font-family: 'Courier New', monospace; font-size: 0.78rem; background: transparent !important; color: #c9d1d9 !important; }
        .msg-bubble p code { background: rgba(255,255,255,0.06); color: #888; padding: 2px 5px; border-radius: 3px; font-family: 'Courier New', monospace; font-size: 0.78rem; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }

        /* Empty state */
        .empty-list { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; gap: 15px; }
        .empty-list.visible { display: flex; }
        .empty-list p { font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: #333; letter-spacing: 2px; text-transform: uppercase; }
        .empty-list a {
            font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: #555;
            letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none;
            border-bottom: 1px solid #333; padding-bottom: 2px; transition: 0.3s;
        }
        .empty-list a:hover { color: #fff; border-color: #fff; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="noise"></div>
<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Syra" class="sidebar-logo" onerror="this.style.display='none'">
        </div>
        <nav class="nav-group">
            <a href="home.html" class="nav-item">Nova Solicitação</a>
            <a href="slcc.html" class="nav-item">Solicitações em execução</a>
            <a href="slce.html" class="nav-item active">Soluções concluídas</a>
            <a href="perfil.html" class="nav-item">Perfil</a>
            <a href="config.html" class="nav-item">Configurações</a>
        </nav>
        <div class="sidebar-footer">
            SY-CORE V2.5.1<br>
            <span id="sidebar-uid">---</span>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h1>Soluções Concluídas</h1>
            <div class="top-right">
                <span class="count-badge" id="count-badge">0 soluções</span>
                <span class="clock-small" id="clock">--:--:--</span>
            </div>
        </div>

        <div class="sessions-container" id="sessions-list"></div>
        <div class="empty-list" id="empty-list">
            <p>Nenhuma solução registrada</p>
            <a href="home.html">Iniciar nova solicitação</a>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import {
        getFirestore, doc, getDoc, collection, query,
        where, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDOrxvJTgiGUmycgFK3aku5bVY3CuUTzx8",
        authDomain: "syra-a9ee0.firebaseapp.com",
        projectId: "syra-a9ee0",
        storageBucket: "syra-a9ee0.firebasestorage.app",
        messagingSenderId: "817185680125",
        appId: "1:817185680125:web:c12e463633183caa882c94"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    marked.setOptions({
        highlight: (code, lang) => {
            const language = hljs.getLanguage(lang) ? lang : 'plaintext';
            return hljs.highlight(code, { language }).value;
        },
        breaks: true
    });

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; return; }

        try {
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                document.getElementById('sidebar-uid').textContent = snap.data().username || user.email;
            }
        } catch (e) {}

        const q = query(
            collection(db, `users/${user.uid}/sessions`),
            where("status", "==", "concluida"),
            orderBy("updatedAt", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('sessions-list');
            const empty = document.getElementById('empty-list');
            const countBadge = document.getElementById('count-badge');

            if (snapshot.empty) {
                list.innerHTML = '';
                list.style.display = 'none';
                empty.classList.add('visible');
                countBadge.textContent = '0 soluções';
                return;
            }

            list.style.display = 'flex';
            empty.classList.remove('visible');
            countBadge.textContent = `${snapshot.size} solução${snapshot.size > 1 ? 'ões' : ''}`;

            list.innerHTML = snapshot.docs.map(docSnap => {
                const s = docSnap.data();
                const id = docSnap.id;
                const date = s.updatedAt ? new Date(s.updatedAt.seconds * 1000) : new Date();
                const dateStr = date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
                const timeStr = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const msgCount = s.messageCount || (s.messages?.length || 0);

                const messagesHtml = (s.messages || []).map(msg => {
                    const role = msg.role === 'user' ? 'user' : 'model';
                    const label = role === 'user' ? '@USER_OP' : '@SYRA_CORE';
                    const content = role === 'model' ? marked.parse(msg.text || '') : `<p>${escapeHtml(msg.text || '')}</p>`;
                    return `
                        <div class="msg-item msg-${role}">
                            <div class="msg-label">${label}</div>
                            <div class="msg-bubble">${content}</div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="session-card">
                        <div class="card-header" onclick="toggleCard('${id}')">
                            <div>
                                <div class="session-status">CONCLUIDA</div>
                                <div class="session-title">${escapeHtml(s.title || 'Sessão sem título')}</div>
                                <div class="session-meta">
                                    <span>${dateStr} ${timeStr}</span>
                                    <span>${msgCount} mensagens</span>
                                    <span>ID: ${id.substring(0,8).toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="expand-icon" id="icon-${id}">+</div>
                        </div>
                        <div class="card-content" id="content-${id}">
                            ${messagesHtml || '<p style="color:#333;font-size:0.8rem;">Sem conteúdo registrado.</p>'}
                        </div>
                    </div>
                `;
            }).join('');
        });
    });

    window.toggleCard = function(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);
        const isOpen = content.classList.contains('open');
        content.classList.toggle('open', !isOpen);
        icon.classList.toggle('open', !isOpen);
        icon.textContent = isOpen ? '+' : '−';
    };

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR') + " UTC-3";
    }, 1000);
</script>
</body>
</html>
