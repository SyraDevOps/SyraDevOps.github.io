            "id": "selene",
            "title": "Selene",
            "type": "text",
            "content": "<p class=\"italic text-zinc-500\">O Framework de Treinamento de Inteligência Artificial da Syra</p><p><b>Selene</b> é um framework desenvolvido pela <b>Syra</b> para criação, treinamento, gerenciamento, versionamento e distribuição de modelos de Inteligência Artificial de forma simples, modular e escalável.</p><p>O projeto nasceu com o objetivo de democratizar o treinamento de modelos personalizados, permitindo que desenvolvedores, empresas e pesquisadores criem soluções específicas para seus próprios domínios de conhecimento sem depender de grandes infraestruturas ou serviços externos.</p><p>Mais do que um chatbot, o Selene é uma plataforma de treinamento de modelos de IA.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Objetivos</h3><p>O Selene foi criado para resolver um problema comum no desenvolvimento de aplicações inteligentes: a dificuldade em criar modelos personalizados de maneira organizada.</p><p>O framework oferece uma arquitetura que centraliza:</p><ul class=\"list-disc pl-5 space-y-1\"><li>gerenciamento de datasets;</li><li>treinamento de modelos;</li><li>armazenamento de conhecimento;</li><li>versionamento;</li><li>exportação;</li><li>importação;</li><li>inferência;</li><li>evolução contínua dos modelos.</li></ul><p>Tudo isso utilizando uma arquitetura simples, portátil e independente.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Filosofia</h3><p>O Selene foi desenvolvido seguindo alguns princípios fundamentais.</p><p><b>Simplicidade</b> — O treinamento de um modelo não deve exigir dezenas de ferramentas diferentes. O framework concentra todas as etapas em um único ambiente.</p><p><b>Modularidade</b> — Cada componente possui responsabilidade própria. Isso permite substituir ou melhorar partes do sistema sem reescrever toda a aplicação.</p><p><b>Portabilidade</b> — Cada modelo é completamente independente. Um modelo pode ser exportado, compartilhado e importado em outro computador mantendo toda sua estrutura.</p><p><b>Evolução</b> — O framework foi projetado para crescer. Novos algoritmos, arquiteturas, tokenizadores, embeddings e modelos poderão ser incorporados futuramente sem alterar a experiência do usuário.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Arquitetura</h3><p>O Selene organiza todo o ciclo de vida de um modelo de IA:</p><pre class=\"code-block\"><code>Dataset\n  ↓\nPré-processamento\n  ↓\nVetorização\n  ↓\nTreinamento\n  ↓\nValidação\n  ↓\nPersistência\n  ↓\nInferência\n  ↓\nExportação</code></pre><p>Cada modelo possui seu próprio ambiente de trabalho. Exemplo:</p><pre class=\"code-block\"><code>models/\n    suporte/\n        data.db\n        torch_model.pt\n        vectorizer.pkl\n        manifest.json</code></pre><p>Essa organização torna os modelos independentes entre si.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Gerenciamento de Dados</h3><p>O Selene utiliza um banco de dados SQLite para armazenar o conhecimento utilizado durante o treinamento. Cada registro pode conter: pergunta, resposta e contexto.</p><p>No futuro, poderão ser adicionados: categorias, idiomas, pesos, autor, data de criação, prioridade, feedback e métricas de utilização. Essa estrutura permite evolução constante do conhecimento.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Pipeline de Treinamento</h3><p>O framework executa automaticamente todas as etapas do treinamento:</p><ol class=\"list-decimal pl-5 space-y-1\"><li>Importação dos dados.</li><li>Armazenamento em banco.</li><li>Processamento textual.</li><li>Vetorização.</li><li>Construção do dataset.</li><li>Treinamento.</li><li>Avaliação.</li><li>Persistência do modelo.</li></ol><p>Todo esse processo pode ser repetido continuamente conforme novos dados são adicionados.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Gerenciamento de Modelos</h3><p>Cada modelo possui sua própria estrutura, o que permite: múltiplos modelos simultâneos, diferentes bases de conhecimento, diferentes versões e isolamento completo entre projetos.</p><p>Exemplos: Suporte, Financeiro, Vendas, Jurídico, Assistente, IoT, API — todos convivendo no mesmo framework.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Exportação</h3><p>O Selene permite exportar modelos completos. São preservados: parâmetros treinados, vetorizadores, banco de dados e configurações. Isso facilita distribuição, backup e implantação.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Importação</h3><p>Modelos exportados podem ser importados para outro ambiente mantendo todas as informações necessárias para funcionamento. Essa característica permite compartilhar conhecimento entre equipes e servidores.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Inferência</h3><p>Após treinado, o modelo pode responder consultas utilizando o conhecimento adquirido durante o treinamento. O mecanismo de inferência utiliza exatamente a mesma configuração utilizada durante o treinamento, garantindo consistência nos resultados.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Registro de Eventos</h3><p>O framework registra automaticamente informações importantes como: criação de modelos, treinamentos, erros, avisos, exportações e importações. Esses registros facilitam auditoria, manutenção e depuração.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Escalabilidade</h3><p>O Selene foi pensado para evoluir em diversas direções. Entre as possibilidades futuras estão: suporte a múltiplos algoritmos, embeddings modernos, modelos Transformer, treinamento incremental, GPU, APIs REST, treinamento distribuído, interface gráfica, plugins, integração com bancos vetoriais, RAG, memória semântica, treinamento multimodal, avaliação automática de desempenho e métricas em tempo real.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Casos de Uso</h3><p>O Selene pode ser utilizado para desenvolver: assistentes virtuais, centrais de atendimento, bases de conhecimento, classificadores de texto, sistemas de FAQ, análise documental, automação empresarial, aplicações embarcadas, soluções educacionais e agentes especializados.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Público-Alvo</h3><p>O framework foi desenvolvido para: desenvolvedores, pesquisadores, empresas, startups, instituições de ensino, equipes de IA e projetos de automação.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Ecossistema Syra</h3><p>Dentro do ecossistema da Syra, o Selene representa o núcleo responsável pelo treinamento e gerenciamento de modelos de Inteligência Artificial.</p><p>Enquanto outros projetos do ecossistema atuam na interação com o usuário, infraestrutura ou aplicações finais, o Selene é responsável por transformar dados em modelos inteligentes reutilizáveis. Sua função é servir como a base de treinamento sobre a qual diferentes aplicações poderão ser construídas.</p><h3 class=\"text-base font-bold text-black mt-8 mb-2\">Visão de Longo Prazo</h3><p>A visão do projeto é tornar o Selene uma plataforma completa para desenvolvimento de Inteligência Artificial personalizada.</p><p>Em vez de estar limitado a uma única arquitetura de rede neural ou algoritmo específico, o framework busca oferecer uma infraestrutura flexível capaz de acompanhar a evolução da área de IA. O mesmo ambiente poderá treinar desde classificadores tradicionais até modelos baseados em embeddings, Transformers e arquiteturas futuras, mantendo uma interface consistente para gerenciamento, treinamento, avaliação e distribuição.</p><p>O objetivo final é que qualquer desenvolvedor possa criar, evoluir e compartilhar modelos especializados utilizando uma única plataforma, transformando o Selene no principal framework de treinamento de IA do ecossistema Syra.</p><p class=\"pt-2\">Repositório oficial: <a class=\"underline hover:text-black\" href=\"https://github.com/SyraDevOps/Selene\" target=\"_blank\" rel=\"noopener noreferrer\">github.com/SyraDevOps/Selene</a>.</p>"
        },

const int DEV_NAME_LEN = 32; // bytes per name (includes terminator)
int deviceCount = 0;
String devices[DEV_MAX];

// Messaging (Bridge) in RAM
const int MSG_MAX = 20;

// ---------- Utilities ----------
String sanitizeName(const String &s) {
  String out;
  out.reserve(DEV_NAME_LEN);
  for (size_t i = 0; i < s.length() && out.length() < DEV_NAME_LEN - 1; i++) {
    char c = s[i];
    if (isalnum((unsigned char)c) || c == ' ' || c == '-' || c == '_') {
      out += c;
    }
  }
  out.trim();
  return out;
}

void setLEDConnected(bool connected) {
  pinMode(LED_BUILTIN, OUTPUT);
  if (connected) {
    blinkEnabled = false;
    digitalWrite(LED_BUILTIN, LOW); // on (active LOW)
  } else {
    blinkEnabled = true;
  }
}

void startMDNS() {
  if (MDNS.begin(hostName)) {
    mdnsRunning = true;
    MDNS.addService("http", "tcp", 80);
    Serial.printf("mDNS: http://%s.local\n", hostName);
  } else {
    mdnsRunning = false;
    Serial.println("Failed to start mDNS");
  }
}

void startAP() {
  WiFi.mode(WIFI_AP);
  WiFi.softAP("Syra-Config");
  Serial.print("AP IP: ");
  Serial.println(WiFi.softAPIP());
  setLEDConnected(false);
  startMDNS();
}

// ---------- EEPROM device persistence ----------
void loadDevices() {
  int raw = EEPROM.read(DEV_LIST_ADDR);
  deviceCount = (raw >= 0 && raw <= DEV_MAX) ? raw : 0;
  for (int i = 0; i < deviceCount; i++) {
    int base = DEV_LIST_ADDR + 1 + i * DEV_NAME_LEN;
    String name;
    name.reserve(DEV_NAME_LEN);
    for (int j = 0; j < DEV_NAME_LEN - 1; j++) {
      char ch = EEPROM.read(base + j);
      if (ch == '\0') break;
      name += ch;
    }
    devices[i] = name;
  }
}

void saveDevices() {
  EEPROM.write(DEV_LIST_ADDR, deviceCount);
  for (int i = 0; i < DEV_MAX; i++) {
    int base = DEV_LIST_ADDR + 1 + i * DEV_NAME_LEN;
    for (int j = 0; j < DEV_NAME_LEN; j++) {
      EEPROM.write(base + j, 0);
    }
  }
  for (int i = 0; i < deviceCount; i++) {
    int base = DEV_LIST_ADDR + 1 + i * DEV_NAME_LEN;
    const String &name = devices[i];
    int j = 0;
    for (; j < (int)name.length() && j < DEV_NAME_LEN - 1; j++) {
      EEPROM.write(base + j, name[j]);
    }
    EEPROM.write(base + j, '\0');
  }
  EEPROM.commit();
}

bool addDevice(const String &raw) {
  String name = sanitizeName(raw);
  if (name.length() == 0) return false;
  for (int i = 0; i < deviceCount; i++) {
    if (devices[i] == name) return true; // already exists
  }
  if (deviceCount >= DEV_MAX) return false;
  devices[deviceCount++] = name;
  saveDevices();
  return true;
}

bool removeDeviceByName(const String &raw) {
  String name = sanitizeName(raw);
  if (name.length() == 0) return false;
  int idx = -1;
  for (int i = 0; i < deviceCount; i++) {
    if (devices[i] == name) { idx = i; break; }
  }
  if (idx < 0) return false;
  for (int i = idx; i < deviceCount - 1; i++) {
    devices[i] = devices[i + 1];
  }
  devices[deviceCount - 1] = "";
  deviceCount--;
  saveDevices();
  return true;
}

// ---------- Handlers ----------
void handleRoot() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  server.send_P(200, "text/html", MAIN_page);
}

void handleConfig() {
  server.send_P(200, "text/html", CONFIG_page);
}

void handleRootDynamic() {
  if (WiFi.status() == WL_CONNECTED && WiFi.getMode() == WIFI_STA) {
    handleRoot();
  } else {
    handleConfig();
  }
}

void handleInfo() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String ip = (WiFi.getMode() == WIFI_AP) ? WiFi.softAPIP().toString() : WiFi.localIP().toString();
  String status = (WiFi.status() == WL_CONNECTED) ? "online" : "config";
  String json;
  json.reserve(220);
  json += "{\"id\":\"";      json += serialNumber;
  json += "\",\"name\":\"Syra Node\",\"ip\":\""; json += ip;
  json += "\",\"status\":\""; json += status;
  json += "\",\"mdns\":\"";  json += hostName; json += ".local";
  json += "\",\"fw\":\"";    json += __DATE__; json += " "; json += __TIME__;
  json += "\"}";
  server.send(200, "application/json", json);
}

void handleDevicesGet() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String json;
  json.reserve(64 + deviceCount * (DEV_NAME_LEN + 3));
  json += "{\"count\":"; json += deviceCount; json += ",\"items\":[";
  for (int i = 0; i < deviceCount; i++) {
    if (i) json += ",";
    json += "\""; json += devices[i]; json += "\"";
  }
  json += "]}";
  server.send(200, "application/json", json);
}

String getArgAny(const String &key) {
  if (server.hasArg(key)) return server.arg(key);
  if (server.hasArg("plain")) {
    String body = server.arg("plain");
    int pos = body.indexOf(key);
    if (pos >= 0) {
      int q1 = body.indexOf('"', pos + key.length());
      if (q1 >= 0) {
        int q2 = body.indexOf('"', q1 + 1);
        if (q2 > q1) return body.substring(q1 + 1, q2);
      }
    }
  }
  return "";
}

void handleDevicesPost() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String name = getArgAny("name");
  if (name.length() == 0) {
    server.send(400, "application/json", "{\"ok\":false,\"err\":\"name required\"}");
    return;
  }
  bool ok = addDevice(name);
  if (ok) server.send(200, "application/json", "{\"ok\":true}");
  else server.send(409, "application/json", "{\"ok\":false,\"err\":\"list full or duplicate\"}");
}

void handleDevicesDelete() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String name = getArgAny("name");
  if (name.length() == 0) {
    server.send(400, "application/json", "{\"ok\":false,\"err\":\"name required\"}");
    return;
  }
  bool ok = removeDeviceByName(name);
  if (ok) server.send(200, "application/json", "{\"ok\":true}");
  else server.send(404, "application/json", "{\"ok\":false,\"err\":\"device not found\"}");
}

int findFreeMsg() { for (int i = 0; i < MSG_MAX; i++) if (!msgs[i].used) return i; return -1; }
int findOldestMsg() {
  int idx = -1;
  unsigned long oldest = ULONG_MAX;
  for (int i = 0; i < MSG_MAX; i++) {
    if (msgs[i].used && msgs[i].ts < oldest) { oldest = msgs[i].ts; idx = i; }
  }
  return idx;
}

void handleBridgePost() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String to = sanitizeName(getArgAny("to"));
  String from = sanitizeName(getArgAny("from"));
  String body = getArgAny("data");
  if (body.length() == 0) body = getArgAny("body");
  if (to.length() == 0 || from.length() == 0 || body.length() == 0) {
    server.send(400, "application/json", "{\"ok\":false,\"err\":\"required params: to, from, data\"}");
    return;
  }
  if (body.length() > 256) body = body.substring(0, 256);
  int idx = findFreeMsg();
  if (idx < 0) idx = findOldestMsg();
  if (idx < 0) {
    server.send(507, "application/json", "{\"ok\":false,\"err\":\"mailbox full\"}");
    return;
  }
  msgs[idx].to = to; msgs[idx].from = from; msgs[idx].body = body;
  msgs[idx].ts = millis(); msgs[idx].used = true;
  server.send(200, "application/json", "{\"ok\":true}");
}

void handleBridgeGet() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  String who = sanitizeName(server.hasArg("device") ? server.arg("device") : server.arg("to"));
  if (who.length() == 0) {
    server.send(400, "application/json", "{\"ok\":false,\"err\":\"device required\"}");
    return;
  }
  String json;
  json.reserve(512);
  json += "{\"ok\":true,\"messages\":[";
  bool first = true;
  unsigned long now = millis();
  for (int i = 0; i < MSG_MAX; i++) {
    if (msgs[i].used && msgs[i].to == who) {
      if (!first) json += ","; else first = false;
      json += "{\"from\":\""; json += msgs[i].from;
      json += "\",\"data\":\""; json += msgs[i].body;
      json += "\",\"ts\":"; json += msgs[i].ts; json += "}";
      msgs[i].used = false; // consumed
      msgs[i].to = msgs[i].from = msgs[i].body = "";
      msgs[i].ts = now;
    }
  }
  json += "]}";
  server.send(200, "application/json", json);
}

void writeStringToEEPROM(int addr, const String &data) {
  size_t i = 0;
  for (; i < data.length(); ++i) EEPROM.write(addr + i, data[i]);
  EEPROM.write(addr + i, '\0');
}

String readStringFromEEPROM(int addr) {
  String data;
  data.reserve(32);
  char ch = EEPROM.read(addr);
  int i = 0;
  while (ch != '\0' && i < 31) {
    data += ch;
    i++;
    ch = EEPROM.read(addr + i);
  }
  return data;
}

void handleDisconnect() {
  server.sendHeader("Access-Control-Allow-Origin", "*");
  server.send(200, "text/plain", "Disconnecting and starting Syra-Config...");
  WiFi.disconnect(true);
  delay(300);
  startAP();
}

void handleSetWiFi() {
  String ssid = server.arg("ssid");
  String pass = server.arg("pass");
  writeStringToEEPROM(SSID_ADDR, ssid);
  writeStringToEEPROM(PASS_ADDR, pass);
  EEPROM.commit();
  server.send(200, "text/html",
    "<h2>Connecting...</h2><p>If the connection succeeds, the device will restart.</p>"
    "<script>setTimeout(() => location.reload(), 10000);</script>");
  WiFi.mode(WIFI_STA);
  WiFi.begin(ssid.c_str(), pass.c_str());

  // Non-blocking-ish wait with watchdog feed
  unsigned long start = millis();
  while (WiFi.status() != WL_CONNECTED && millis() - start < 15000) {
    delay(100);
    yield();
  }
  if (WiFi.status() == WL_CONNECTED) {
    startMDNS();
    ESP.restart();
  }
}

void handleNotFound() {
  server.send(404, "application/json", "{\"ok\":false,\"err\":\"not found\"}");
}

// ---------- Setup / Loop ----------
void setup() {
  Serial.begin(115200);
  EEPROM.begin(EEPROM_SIZE);
  loadDevices();
  pinMode(LED_BUILTIN, OUTPUT);

  String savedSSID = readStringFromEEPROM(SSID_ADDR);
  String savedPass = readStringFromEEPROM(PASS_ADDR);
  bool connected = false;

  if (savedSSID.length() > 0) {
    Serial.println("Trying to connect with saved credentials...");
    WiFi.mode(WIFI_STA);
    WiFi.setSleepMode(WIFI_NONE_SLEEP); // faster, more stable HTTP/OTA response
    WiFi.begin(savedSSID.c_str(), savedPass.c_str());
    int attempts = 0;
    while (WiFi.status() != WL_CONNECTED && attempts < 20) {
      delay(500);
      Serial.print(".");
      attempts++;
    }
    if (WiFi.status() == WL_CONNECTED) {
      connected = true;
      Serial.println("\n✅ Connected with saved credentials!");
      Serial.print("Local IP: ");
      Serial.println(WiFi.localIP());
      setLEDConnected(true);
      lastConnOk = millis();
    }
  }

  if (!connected) {
    Serial.println("Starting AP mode for configuration...");
    startAP();
  }

  server.on("/", handleRootDynamic);
  server.on("/setwifi", HTTP_POST, handleSetWiFi);
  server.on("/info", handleInfo);
  server.on("/disconnect", handleDisconnect);
  server.on("/devices", HTTP_GET, handleDevicesGet);
  server.on("/devices", HTTP_POST, handleDevicesPost);
  server.on("/devices", HTTP_DELETE, handleDevicesDelete);
  server.on("/bridge", HTTP_GET, handleBridgeGet);
  server.on("/bridge", HTTP_POST, handleBridgePost);
  server.onNotFound(handleNotFound);

  // OTA update endpoint: http://<ip-or-mdns>/update (browser upload of .bin)
  httpUpdater.setup(&server, "/update", OTA_USER, OTA_PASS);

  server.begin();
  Serial.println("HTTP server started!");
  Serial.println("OTA available at /update (Basic Auth protected)");

  if (connected) {
    startMDNS();
  }
}

void loop() {
  server.handleClient();
  if (mdnsRunning) {
    MDNS.update();
  }

  // Connection monitor
  if (WiFi.getMode() == WIFI_STA) {
    if (WiFi.status() == WL_CONNECTED) {
      if (!blinkEnabled) digitalWrite(LED_BUILTIN, LOW); // ensure LED is on
      lastConnOk = millis();
    } else if (millis() - lastConnOk > 10000) { // 10s without connection => back to AP
      Serial.println("Connection lost. Returning to Syra-Config...");
      startAP();
    }
  }

  // Blink LED in AP/config mode
  if (blinkEnabled && millis() - lastBlink >= BLINK_INTERVAL) {
    lastBlink = millis();
    digitalWrite(LED_BUILTIN, !digitalRead(LED_BUILTIN));
  }

                    container.appendChild(navLink);
                });

        };

    <!-- ==========================================================
         MÓDULO DE SEÇÕES DE TEXTO
         ========================================================== -->
    <script id="module-text-section">
        const TextSectionModule = {
            render(section) {
                const el = document.createElement('section');
                el.id = section.id;
                el.className = "scroll-mt-24";
                el.innerHTML = `
                    <h2 class="text-xl font-bold text-black tracking-wide mb-3">${section.title}</h2>
                    <div class="text-zinc-600 text-sm leading-relaxed space-y-3 font-normal">

                return el;
            }

    <!-- ==========================================================
         MÓDULO DE SEÇÕES DE CÓDIGO (usado por Syra Hardware /
         Syra Home): descrição + bloco de código destacado.
         O código-fonte é lido de um <template> pelo id indicado em
         "codeTemplateId", já em texto puro (sem escaping de JSON).
         ========================================================== -->
    <script id="module-code-section">
        const CodeSectionModule = {
            render(section) {
                const el = document.createElement('section');
                el.id = section.id;
                el.className = "scroll-mt-24";

                const templateEl = document.getElementById(section.codeTemplateId);
                const code = templateEl ? templateEl.innerHTML.trim() : '';

                el.innerHTML = `
                    <h2 class="text-xl font-bold text-black tracking-wide mb-1">${section.title}</h2>
                    <p class="text-[10px] uppercase tracking-widest text-zinc-400 mb-3">Firmware · ${section.language || 'code'}</p>
                    <div class="text-zinc-600 text-sm leading-relaxed space-y-3 font-normal mb-4">
                        ${section.description || ''}
                    </div>
                    <pre class="code-block"><code>${code}</code></pre>
                `;
                return el;
            }
        };
    </script>

    <!-- ==========================================================
         MÓDULO DE CONTEÚDO: decide, por seção, qual módulo de
         renderização usar (texto ou código) e monta a área principal.
         ========================================================== -->
    <script id="module-content">
        const ContentModule = {
            render(sections, container) {
                container.innerHTML = '';
                sections.forEach(section => {
                    let el;
                    if (section.type === 'code') {
                        el = CodeSectionModule.render(section);
                    } else {
                        el = TextSectionModule.render(section);
                    }
                    container.appendChild(el);
                });
            }
        };
    </script>
