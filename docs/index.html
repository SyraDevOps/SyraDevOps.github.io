<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syradevops</title>
    <style>
        /* Configurações Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f2f2f5; /* Fundo cinza claro limpo */
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estrutura centralizada sem Box */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 440px;
            width: 100%;
        }

        /* Tipografia de Marca Corporativa */
        .brand-name {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.04em; /* Espaçamento corporativo clássico */
            color: #000000;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid #000000;
            width: 0;
            margin-bottom: 1rem;
            /* Animação de digitação baseada em 11 caracteres de '@Syradevops' */
            animation: 
                typing 1.6s steps(11, end) 0.3s forwards,
                blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 11.5ch }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #000000; }
        }

        /* Linha divisória minimalista de alto contraste */
        .separator {
            width: 60px;
            height: 2px;
            background: #000000;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 1.9s;
        }

        /* Elementos interativos em contraste */
        .interactive-area {
            width: 100%;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 2.1s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Botões Corporativos de Alto Contraste */
        .buttons-group {
            display: flex;
            gap: 12px;
            width: 100%;
            margin-bottom: 2.5rem;
        }

        .btn {
            flex: 1;
            padding: 14px 28px;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase; /* Estética de portal corporativo */
            text-decoration: none;
            border-radius: 4px; /* Cantos mais retos e profissionais */
            transition: all 0.2s ease-in-out;
            text-align: center;
        }

        .btn-primary {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #000000;
        }

        .btn-primary:hover {
            background-color: #222222;
            border-color: #222222;
        }

        .btn-secondary {
            background-color: transparent;
            color: #000000;
            border: 1px solid #000000;
        }

        .btn-secondary:hover {
            background-color: rgba(0, 0, 0, 0.06);
        }

        /* Ícones Sociais Diretos (Sem círculos ou fundos) */
        .social-links {
            display: flex;
            gap: 24px;
            justify-content: center;
            align-items: center;
        }

        .social-icon {
            color: #444446;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .social-icon:hover {
            color: #000000; /* Contraste máximo ao interagir */
        }

        .social-icon svg {
            width: 21px;
            height: 21px;
            fill: currentColor;
        }
    </style>
</head>
<body>
