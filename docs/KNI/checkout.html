<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Knimodas</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="topbar">Knimodas | Moda elegante, minimalista e sofisticada</div>
    <div class="nav-wrap">
      <a class="brand" href="index.html"><span>Kni</span>modas</a>
      <button class="menu-toggle" type="button">Menu</button>
            <nav>
        <a data-page="index.html" href="index.html">Home</a>
        <a data-page="produtos.html" href="produtos.html">Loja</a>
        <a data-page="sobre.html" href="sobre.html">Sobre</a>
        <a data-page="contato.html" href="contato.html">Contato</a>
      </nav>
            <div class="header-actions">
        <a class="icon-link" data-header-action="search" href="produtos.html#busca-loja" title="Buscar" aria-label="Buscar">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </a>
        <div class="header-cart-wrap">
          <a class="icon-link" data-header-action="cart" href="carrinho.html" title="Carrinho" aria-label="Carrinho">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 5h2l2.1 10.2a1 1 0 0 0 1 .8h8.9a1 1 0 0 0 1-.8L20 8H7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="10" cy="19" r="1.5" fill="currentColor"/><circle cx="17" cy="19" r="1.5" fill="currentColor"/></svg>
            <span class="icon-badge hidden" data-cart-badge>0</span>
          </a>
          <div class="cart-preview hidden" id="header-cart-preview" aria-live="polite"></div>
        </div>
        <a class="icon-link" data-header-action="account" href="conta.html" title="Conta" aria-label="Conta">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c1.8-3.2 5-5 8-5s6.2 1.8 8 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span class="account-dot hidden" data-account-dot></span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <h1>Finalizar Compra</h1>
    <div class="checkout-steps">
      <div class="step active">1. Dados</div>
      <div class="step active">2. Endereco</div>
      <div class="step active">3. Pagamento</div>
    </div>

    <section class="checkout-shell">
      <section class="card">
        <form id="checkout-form">
          <input name="customer_name" placeholder="Nome completo" required />
          <input type="email" name="email" placeholder="E-mail" required />
          <input name="phone" placeholder="Telefone" required />
          <div class="grid grid-3">
            <input name="destination_cep" id="destination-cep" placeholder="CEP (ex: 90000-000)" required />
            <input name="state" placeholder="UF" maxlength="2" required />
            <input name="city" placeholder="Cidade" required />
          </div>
          <div class="grid grid-3">
            <input name="street" placeholder="Rua" required />
            <input name="number" placeholder="Numero" required />
            <input name="district" placeholder="Bairro" required />
          </div>
          <textarea name="address" placeholder="Complemento (opcional)"></textarea>
          <input name="coupon_code" placeholder="Cupom (opcional)" />
          <button class="primary" type="submit">Finalizar Compra</button>
        </form>
        <p id="checkout-status" class="notice"></p>
        <p id="page-error" class="notice"></p>
      </section>

      <aside class="checkout-side">
        <div class="card side-card">
          <h3>Resumo do pedido</h3>
          <p id="checkout-cart-note" class="notice"></p>
        </div>
        <details class="card side-card" open>
          <summary>Frete</summary>
          <div class="shipping-box">
            <div class="shipping-actions">
              <button id="quote-shipping-btn" class="alt" type="button">Calcular frete</button>
              <span id="shipping-note" class="notice"></span>
            </div>
            <select id="shipping-option" name="shipping_name" required>
              <option value="">Selecione o frete</option>
            </select>
          </div>
        </details>
        <details class="card side-card">
          <summary>Pagamento</summary>
          <select name="payment_method" form="checkout-form" required>
            <option value="pix">Pix</option>
            <option value="cartao">Cartao</option>
            <option value="boleto">Boleto</option>
          </select>
        </details>
      </aside>
    </section>
  </main>

  <a class="whatsapp-float" href="https://wa.me/5500000000000" target="_blank" rel="noreferrer" aria-label="WhatsApp">
    <svg class="wa-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3a9 9 0 0 0-7.8 13.5L3 21l4.7-1.2A9 9 0 1 0 12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 9.5c.2-.6.5-.6.8-.6h.5c.2 0 .4.1.5.4l.8 1.8c.1.2 0 .4-.1.5l-.5.6c-.1.1-.1.3 0 .4.4.8 1 1.5 1.8 2 .1.1.3.1.4 0l.6-.5c.1-.1.3-.2.5-.1l1.8.8c.3.1.4.3.4.5v.5c0 .3 0 .6-.6.8-.4.1-1.4.2-2.8-.4-1.2-.5-2.4-1.6-3.3-2.8-.8-1.1-1.3-2.2-1.3-2.8 0-.5 0-1 .1-1.3Z" fill="currentColor"/></svg>
  </a>

  <footer>
    <div class="footer-wrap">
      <strong><span style="color:#c4a463">Kni</span>modas</strong>
      <div class="footer-links">
        <a href="privacidade.html">Politica de Privacidade</a>
        <a href="termos.html">Termos de Uso</a>
        <a href="trocas-devolucoes.html">Troca e Devolucao</a>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
