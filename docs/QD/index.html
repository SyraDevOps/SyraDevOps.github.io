<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Faça login ou registre-se no seu diário pessoal com assistente IA Sory.">
    <meta name="theme-color" content="#ff6b6b">
    <meta name="color-scheme" content="light">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QDiário">
    <meta name="msapplication-TileColor" content="#ff6b6b">
    <meta name="msapplication-tap-highlight" content="no">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="shortcut icon" href="icons/icon.svg" type="image/svg+xml">
    <title>Login e Registro</title>
    <link rel="stylesheet" href="styles.css?v=202603071600">
    <script src="font-size.js"></script>
</head>
<body>
    <div class="notebook-page">
        <div class="content auth-content">
            <h1 class="auth-main-title">Querido Diário</h1>
            <div class="auth-card">
                <h2>Acesse sua conta</h2>

                <div class="auth-tabs" role="tablist" aria-label="Alternar entre login e registro">
                    <button type="button" class="auth-tab active" data-auth-target="login">Login</button>
                    <button type="button" class="auth-tab" data-auth-target="registro">Registro</button>
                </div>

                <form class="auth-form active" id="loginForm" data-auth-form="login">
                    <input type="email" id="loginEmail" placeholder="E-mail" required>
                    <input type="password" id="loginPassword" placeholder="Senha" required>
                    <button type="submit" class="auth-submit">Entrar</button>
                    <p id="loginError" class="auth-error" style="color:#e74c3c;font-size:0.85rem;display:none;"></p>
                </form>

                <form class="auth-form" id="registroForm" data-auth-form="registro">
                    <input type="text" id="regUsername" placeholder="Username" minlength="3" maxlength="30" required>
                    <input type="email" id="regEmail" placeholder="E-mail" required>
                    <input type="password" id="regPassword" placeholder="Senha (min. 6 caracteres)" minlength="6" required>
                    <input type="password" id="regPasswordConfirm" placeholder="ConfirmaÃ§Ã£o da senha" required>
                    <button type="submit" class="auth-submit">Criar conta</button>
                    <p id="regError" class="auth-error" style="color:#e74c3c;font-size:0.85rem;display:none;"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script src="crypto-utils.js"></script>
    <script src="backup-utils.js"></script>
    <script src="analytics-utils.js"></script>
    <script src="script.js"></script>
    
    <!-- PWA Support Scripts -->
    <script src="pwa-install.js"></script>
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registrado', reg))
                    .catch(err => console.log('❌ Erro ao registrar Service Worker:', err));
            });
        }
    </script>
    <script>
    // If already authenticated, redirect to diary
    if (typeof QDApi !== 'undefined' && QDApi.isAuthenticated) {
        window.location.href = 'diario.html';
    }

    // Login form handler
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('loginError');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            errorEl.style.display = 'none';

            try {
                await QDApi.login(email, password);
                window.location.href = 'diario.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Erro ao fazer login';
                errorEl.style.display = 'block';
            }
        });
    }

    // Register form handler
    const registroForm = document.getElementById('registroForm');
    if (registroForm) {
        registroForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('regError');
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            errorEl.style.display = 'none';

            if (password !== passwordConfirm) {
                errorEl.textContent = 'As senhas nÃ£o coincidem';
                errorEl.style.display = 'block';
                return;
            }

            try {
                await QDApi.register(username, email, password);
                window.location.href = 'diario.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Erro ao criar conta';
                errorEl.style.display = 'block';
            }
        });
    }
    </script>
</body>
</html>
