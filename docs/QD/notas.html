    <aside id="stickerPanel" class="sticker-panel" aria-label="Catalogo de adesivos" aria-hidden="true">
        <header class="sticker-panel-header">
            <h2>Adesivos</h2>
            <button id="stickerPanelClose" class="sticker-panel-close" type="button" aria-label="Fechar catalogo">Ã—</button>
        </header>
        <p class="sticker-panel-subtitle">Escolha e arraste para decorar</p>
        <input id="stickerSearchInput" class="sticker-search-input" type="text" placeholder="Buscar adesivos..." aria-label="Buscar adesivos">
        <button id="stickerImportButton" class="sticker-import-button" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg> Importar imagem</button>

            <button class="sticker-view-tab" data-view="favorites" type="button"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:inline-block;vertical-align:middle;margin-right:2px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> Favoritos</button>
        </div>
        <div id="stickerCategoryChips" class="sticker-category-chips"></div>
        <div id="stickerCatalog" class="sticker-catalog" aria-live="polite" data-view="catalog"></div>
        <div id="stickerFavorites" class="sticker-catalog" aria-live="polite" data-view="favorites" style="display: none;"></div>
    </aside>

    <aside id="chatPanel" class="chat-panel" aria-label="Lista de assuntos" aria-hidden="true">

            <button id="chatPanelClose" class="chat-panel-close" type="button" aria-label="Fechar lista de chats">Ã—</button>
        </header>
        <button id="newChatButton" class="new-chat-button" type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> Novo chat</button>
        <div id="chatList" class="chat-list" aria-label="HistÃ³rico de chats"></div>
    </aside>

    <aside id="drawingPanel" class="drawing-panel" aria-label="Ferramentas de desenho" aria-hidden="true">
        <header class="drawing-panel-header">
            <h2>Desenhar</h2>
            <button id="drawingPanelClose" class="drawing-panel-close" type="button" aria-label="Fechar painel">x</button>
        </header>
        <p class="drawing-panel-subtitle">Modo escrita manual</p>
        
        <div class="drawing-tools-section">
            <h3>Ferramentas</h3>
            <div class="drawing-tools" id="drawingToolsContainer">
                <button type="button" class="drawing-tool-btn active" data-tool="pen" title="Caneta fina">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    <span class="tool-label">Caneta</span>
                </button>
                <button type="button" class="drawing-tool-btn" data-tool="marker" title="Marcador">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    <span class="tool-label">Marcador</span>
                </button>
                <button type="button" class="drawing-tool-btn" data-tool="brush" title="Pincel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 2.5l6 6L8 22l-6-6L15.5 2.5z"/><path d="M2 22l6-6"/><path d="M8 8l8 8"/></svg>
                    <span class="tool-label">Pincel</span>
                </button>
                <button type="button" class="drawing-tool-btn" data-tool="pencil" title="LÃ¡pis">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="2" x2="22" y2="6"/><path d="M7.5 20.5L19 9l-4-4L3.5 16.5 2 22z"/></svg>
                    <span class="tool-label">LÃ¡pis</span>
                </button>
                <button type="button" class="drawing-tool-btn" data-tool="highlighter" title="Marca-texto">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
                    <span class="tool-label">Marca</span>
                </button>
            </div>
        </div>

        <div class="drawing-colors-section">
            <h3>Cores</h3>
            <div class="drawing-colors" id="drawingColorsContainer">
                <button type="button" class="drawing-color-btn active" data-color="#000000" style="background-color: #000000;" title="Preto"></button>
                <button type="button" class="drawing-color-btn" data-color="#ff6b6b" style="background-color: #ff6b6b;" title="Vermelho"></button>
                <button type="button" class="drawing-color-btn" data-color="#4a90e2" style="background-color: #4a90e2;" title="Azul"></button>
                <button type="button" class="drawing-color-btn" data-color="#50c878" style="background-color: #50c878;" title="Verde"></button>
                <button type="button" class="drawing-color-btn" data-color="#ffc184" style="background-color: #ffc184;" title="Laranja"></button>
                <button type="button" class="drawing-color-btn" data-color="#a876d3" style="background-color: #a876d3;" title="Roxo"></button>
                <button type="button" class="drawing-color-btn" data-color="#ffeb3b" style="background-color: #ffeb3b;" title="Amarelo"></button>
                <button type="button" class="drawing-color-btn" data-color="#666666" style="background-color: #666666;" title="Cinza"></button>
            </div>
        </div>

        <div class="drawing-size-section">
            <h3>Espessura</h3>
            <input type="range" id="drawingSize" class="drawing-size-slider" min="1" max="30" value="3" aria-label="Tamanho do pincel">
            <span id="drawingSizeValue" class="drawing-size-value">3px</span>
        </div>

        <div class="drawing-opacity-section">
            <h3>Opacidade</h3>
            <input type="range" id="drawingOpacity" class="drawing-opacity-slider" min="0.3" max="1" step="0.1" value="1" aria-label="Opacidade do pincel">
            <span id="drawingOpacityValue" class="drawing-opacity-value">100%</span>
        </div>

        <div class="drawing-actions">
            <button id="drawingClearBtn" class="drawing-action-btn clear" type="button">Limpar desenho</button>
            <button id="drawingUndoBtn" class="drawing-action-btn undo" type="button">â† Desfazer</button>
        </div>
    </aside>

    <div class="notebook-page">
        <div class="content">
            <h1>Notas</h1>

            <section class="notes-section" aria-label="Blocos autoadesivos">
                <div id="stickerStage" class="sticker-stage" aria-hidden="true"></div>
                <div class="notes-toolbar">
                    <button id="addNoteButton" class="send-button" type="button">Nova nota</button>

                    <label for="noteColorSelect" class="notes-label">Cor:</label>
                    <select id="noteColorSelect" class="notes-color-select">
                        <option value="#fff7a8">Amarelo</option>
                        <option value="#ffd1e4">Rosa</option>
                        <option value="#d2f5c8">Verde</option>
                        <option value="#cde8ff">Azul</option>
                        <option value="#f2ddff">LilÃ¡s</option>
                    </select>
                </div>

                <div id="notesBoard" class="notes-board" aria-label="Quadro de notas"></div>
            </section>
        </div>
    </div>
