<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testes - Querido DiÃ¡rio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .test-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .test-suite {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .test-suite h2 {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .test-case {
            margin: 15px 0;
            padding: 12px;
            background: #f5f5f5;
            border-left: 4px solid #999;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .test-case.pass {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }

        .test-case.fail {
            border-left-color: #f44336;
            background: #fdecec;
        }

        .test-case.pending {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-right: 10px;
        }

        .status-badge.pass {
            background: #4caf50;
            color: white;
        }

        .status-badge.fail {
            background: #f44336;
            color: white;
        }

        .status-badge.pending {
            background: #ff9800;
            color: white;
        }

        .test-result {
            margin: 10px 0;
            padding: 8px;
            background: white;
            border-radius: 4px;
        }

        .test-result.pass {
            color: #4caf50;
            border-left: 3px solid #4caf50;
            padding-left: 10px;
        }

        .test-result.fail {
            color: #f44336;
            border-left: 3px solid #f44336;
            padding-left: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .summary {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 8px;
            text-align: center;
        }

        .summary-stat {
            display: inline-block;
            margin: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .summary-stat.pass {
            color: #4caf50;
        }

        .summary-stat.fail {
            color: #f44336;
        }

        .summary-stat.pending {
            color: #ff9800;
        }

        @media (max-width: 768px) {
            .test-container {
                padding: 15px;
            }

            h1 {
                font-size: 1.5em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">

        <div class="button-group">

        </div>
    </div>

    <script src="crypto-utils.js"></script>
    <script src="backup-utils.js"></script>
    <script src="analytics-utils.js"></script>
    <script src="tests.js"></script>
</body>
</html>
