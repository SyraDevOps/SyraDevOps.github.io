<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Validação completa do PWA - Testes técnicos e checklist">
    <meta name="theme-color" content="#ff6b6b">
    <title>PWA Validation Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 100%);
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 16px;
        }

        .content {
            padding: 30px 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
            color: #2c3e50;
        }

        .test-item {
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #ddd;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafafa;
        }

        .test-item.pass {
            background: #f0fdf4;
            border-left-color: #22c55e;
        }

        .test-item.fail {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .test-item.warn {
            background: #fffbeb;
            border-left-color: #f59e0b;
        }

        .test-status {
            font-weight: 600;
            font-size: 18px;
            min-width: 30px;
        }

        .test-item.pass .test-status {
            color: #22c55e;
        }

        .test-item.fail .test-status {
            color: #ef4444;
        }

        .test-item.warn .test-status {
            color: #f59e0b;
        }

        .test-message {
            flex: 1;
        }

        .test-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .test-details {
            font-size: 13px;
            opacity: 0.7;
        }

        .summary {
            background: linear-gradient(135deg, #f5f5f5 0%, #efefef 100%);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            text-align: center;
        }

        .summary-item {
            padding: 15px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .summary-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: #ff6b6b;
        }

        .summary-unit {
            font-size: 14px;
            color: #999;
            margin-left: 4px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #ff6b6b 100%);
            transition: width 0.3s ease;
        }

        footer {
            background: #f9f9f9;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #ff6b6b;
            color: white;
        }

        .btn-primary:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 24px;
            }

            .summary {
                grid-template-columns: 1fr;
            }

            .test-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 PWA Validation Report</h1>
            <p class="subtitle">QDiário - Progressive Web App Testing & Compliance</p>
        </header>

        <div class="content">
            <div class="summary">
                <div class="summary-item">
                    <div class="summary-label">Tests Passed</div>
                    <div class="summary-value" id="passCount">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Tests Failed</div>
                    <div class="summary-value" id="failCount" style="color: #ef4444;">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Compliance Score</div>
                    <div class="summary-value" id="scorePercentage">0<span class="summary-unit">%</span></div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Status</div>
                    <div class="summary-value" id="statusIndicator" style="font-size: 20px;">🔄</div>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
            </div>

            <div id="results"></div>

            <div class="button-group">
                <button class="btn-primary" onclick="runTests()">🔄 Run Tests Again</button>
                <button class="btn-secondary" onclick="downloadReport()">📥 Download Report</button>
                <button class="btn-secondary" onclick="copyToClipboard()">📋 Copy Results</button>
            </div>
        </div>

        <footer>
            <p>PWA Validation - QDiário | Last Updated: <span id="timestamp"></span></p>
        </footer>
    </div>

    <script src="pwa-validator.js"></script>
    <script>
        let lastResults = null;

        async function runTests() {
            document.getElementById('results').innerHTML = '<p style="text-align: center; padding: 20px;">Running tests...</p>';
            
            const results = await PWA_VALIDATOR.runAll();
            lastResults = results;
            
            displayResults(results);
        }

        function displayResults(results) {
            const { passed, total, percentage, tests } = results;
            
            // Update summary
            document.getElementById('passCount').textContent = passed;
            document.getElementById('failCount').textContent = total - passed;
            document.getElementById('scorePercentage').textContent = percentage;
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('timestamp').textContent = new Date().toLocaleString('pt-BR');

            // Status indicator
            let status = '❌';
            if (percentage === 100) status = '✅';
            else if (percentage >= 80) status = '⚠️';
            document.getElementById('statusIndicator').textContent = status;

            // Results list
            let html = '';
            const sections = {};

            tests.forEach(test => {
                const section = test.name.split(' ')[0];
                if (!sections[section]) sections[section] = [];
                sections[section].push(test);
            });

            Object.entries(sections).forEach(([section, sectionTests]) => {
                html += `<div class="section">
                    <h3 class="section-title">📌 ${section}</h3>`;
                
                sectionTests.forEach(test => {
                    const status = test.passed ? 'pass' : 'fail';
                    const icon = test.passed ? '✅' : '❌';
                    html += `<div class="test-item ${status}">
                        <div class="test-status">${icon}</div>
                        <div class="test-message">
                            <div class="test-name">${test.name}</div>
                            <div class="test-details">${test.message}</div>
                        </div>
                    </div>`;
                });

                html += '</div>';
            });

            document.getElementById('results').innerHTML = html;
        }

        function downloadReport() {
            if (!lastResults) {
                alert('Run tests first!');
                return;
            }

            const report = JSON.stringify(lastResults, null, 2);
            const blob = new Blob([report], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `pwa-report-${new Date().toISOString()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function copyToClipboard() {
            if (!lastResults) {
                alert('Run tests first!');
                return;
            }

            const text = JSON.stringify(lastResults, null, 2);
            navigator.clipboard.writeText(text).then(() => {
                alert('Report copied to clipboard!');
            });
        }

        // Auto run on load
        window.addEventListener('load', () => {
            runTests();
        });
    </script>
</body>
</html>
