<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yra Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

:root {
  --g1: #1B5E20;
  --g2: #2E7D32;
  --g3: #4CAF50;
  --g4: #81C784;
  --g5: #A5D6A7;
  --sidebar-w: 240px;
  --text: #1a2a1a;
  --text-muted: #6B7B6B;
  --bg: #F4F8F4;
  --white: #ffffff;
  --border: rgba(46,125,50,0.10);
  --shadow: 0 2px 20px rgba(46,125,50,0.07);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.sidebar-top {
  padding: 28px 20px 24px;
  border-bottom: 1px solid var(--border);
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
}

/* Mini esferas — APENAS aqui */
.brand-orb {
  position: relative;
  width: 34px;
  height: 34px;
  flex-shrink: 0;
}
.brand-orb .bd {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  left: 50%;
  top: 50%;
  margin: -5px 0 0 -5px;
  transition: transform 0.9s cubic-bezier(.4,0,.2,1);
}
.brand-orb .bd:nth-child(1) { background: var(--g1); }
.brand-orb .bd:nth-child(2) { background: var(--g2); }
.brand-orb .bd:nth-child(3) { background: var(--g3); }
.brand-orb .bd:nth-child(4) { background: var(--g4); }

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.brand-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--g1);
  letter-spacing: 0.3px;
}
.brand-sub {
  font-size: 10px;
  font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

/* NAV */
.nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  overflow-y: auto;
}

.nav-section-label {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 10px 10px 6px;
  margin-top: 8px;
}
.nav-section-label:first-child { margin-top: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 9px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text-muted);
  font-size: 13.5px;
  font-weight: 450;
  transition: all 0.18s ease;
  letter-spacing: 0.1px;
}
.nav-item:hover {
  background: rgba(46,125,50,0.06);
  color: var(--g2);
}
.nav-item.active {
  background: rgba(46,125,50,0.09);
  color: var(--g1);
  font-weight: 550;
}
.nav-item svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0.85;
}
.nav-item .nav-label { flex: 1; }
.nav-item .nav-badge {
  font-size: 10px;
  font-weight: 600;
  background: rgba(46,125,50,0.12);
  color: var(--g2);
  padding: 1px 6px;
  border-radius: 10px;
}

/* Status dot */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 9px;
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #4CAF50;
  box-shadow: 0 0 0 2px rgba(76,175,80,0.2);
  animation: statusPulse 3s ease-in-out infinite;
}
@keyframes statusPulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(76,175,80,0.2); }
  50%      { box-shadow: 0 0 0 5px rgba(76,175,80,0);   }
}
.status-label {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 450;
}

/* ── MAIN ─────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* TOPBAR */
.topbar {
  padding: 20px 36px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 450;
  letter-spacing: 0.2px;
}
.topbar-actions {
  display: flex;
  gap: 8px;
}
.topbar-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.18s;
}
.topbar-btn:hover {
  border-color: var(--g4);
  color: var(--g2);
}
.topbar-btn svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* CENTER STAGE */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 36px;
  padding: 0 36px;
  position: relative;
}

/* ── ORBE CENTRAL — GRADIENTE PERMANENTE ──────────── */
.voice-orb-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.voice-orb {
  position: relative;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Anel girante gradiente (permanente) */
.orb-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg,
    var(--g1) 0%,
    var(--g3) 25%,
    var(--g4) 45%,
    #C8E6C9 55%,
    var(--g4) 65%,
    var(--g3) 75%,
    var(--g1) 100%
  );
  animation: orbSpin 6s linear infinite;
  opacity: 0.9;
}
.orb-ring::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--bg);
}
@keyframes orbSpin { to { transform: rotate(360deg); } }

/* Halo exterior suave */
.orb-halo {
  position: absolute;
  inset: -14px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(76,175,80,0.10) 0%,
    rgba(76,175,80,0.03) 60%,
    transparent 100%
  );
  animation: haloBreath 4s ease-in-out infinite;
}
@keyframes haloBreath {
  0%,100% { transform: scale(1);    opacity: 0.7; }
  50%      { transform: scale(1.08); opacity: 1;   }
}

/* Canvas dentro do orbe */
#orbCanvas {
  position: absolute;
  inset: 3px;
  width: calc(100% - 6px);
  height: calc(100% - 6px);
  border-radius: 50%;
  z-index: 2;
}

/* Fundo branco do orbe */
.orb-bg {
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--white);
  box-shadow: 0 8px 32px rgba(46,125,50,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
  z-index: 1;
}

/* Ícone central quando idle */
.orb-icon {
  position: relative;
  z-index: 3;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.35;
  transition: opacity 0.4s;
}
.orb-icon svg {
  width: 32px; height: 32px;
  stroke: var(--g2); fill: none;
  stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
}
.voice-orb.active .orb-icon { opacity: 0; }

/* Modo ativo */
.voice-orb.active .orb-ring {
  animation: orbSpin 2.5s linear infinite;
  opacity: 1;
}
.voice-orb.active .orb-halo {
  animation: haloBreath 1.5s ease-in-out infinite;
}
.voice-orb.responding .orb-ring {
  background: conic-gradient(
    from 0deg,
    var(--g1) 0%,
    var(--g3) 20%,
    #A5D6A7 35%,
    #F48FB1 55%,
    #E91E8C 70%,
    var(--g3) 85%,
    var(--g1) 100%
  );
  animation: orbSpin 2s linear infinite;
}

/* Label abaixo do orbe */
.orb-label {
  text-align: center;
}
.orb-status {
  font-size: 14px;
  font-weight: 500;
  color: var(--g2);
  letter-spacing: 0.2px;
  min-height: 20px;
  transition: opacity 0.4s;
}
.orb-hint {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 4px;
  font-style: italic;
}

/* Placeholders rotativo */
#placeholderText {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  font-style: italic;
  max-width: 280px;
  transition: opacity 0.5s;
  min-height: 18px;
}
#placeholderText.fade { opacity: 0; }

/* ── RESPONSE BUBBLE ──────────────────────────────── */
.response-wrap {
  width: 100%;
  max-width: 520px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.45s ease, transform 0.45s ease;
  pointer-events: none;
}
.response-wrap.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.response-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 22px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  box-shadow: var(--shadow);
  max-height: 240px;
  overflow-y: auto;
  cursor: pointer;
  position: relative;
}
.response-bubble::-webkit-scrollbar { width: 4px; }
.response-bubble::-webkit-scrollbar-thumb { background: var(--g5); border-radius: 4px; }
.response-close {
  position: absolute;
  top: 10px; right: 12px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(46,125,50,0.07);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1;
  transition: background 0.18s;
}
.response-close:hover { background: rgba(46,125,50,0.14); }

/* Markdown dentro da bolha */
.response-bubble p { margin: 6px 0; }
.response-bubble h1,.response-bubble h2,.response-bubble h3 {
  font-weight: 600; margin: 10px 0 4px; color: var(--g1);
}
.response-bubble ul,.response-bubble ol { padding-left: 18px; margin: 6px 0; }
.response-bubble li { margin: 3px 0; }
.response-bubble code {
  background: rgba(46,125,50,0.08);
  padding: 2px 5px; border-radius: 4px;
  font-size: 12.5px; font-family: 'Courier New', monospace;
  color: var(--g1);
}
.response-bubble pre {
  background: rgba(46,125,50,0.06);
  padding: 12px; border-radius: 8px;
  overflow-x: auto; margin: 8px 0;
  border-left: 2px solid var(--g4);
}
.response-bubble pre code { background: none; padding: 0; }
.response-bubble strong { font-weight: 600; }
.response-bubble blockquote {
  border-left: 2px solid var(--g4);
  padding-left: 10px; margin: 6px 0;
  color: var(--text-muted); font-style: italic;
}

/* Typing dots */
.typing-dots { display: inline-flex; gap: 5px; align-items: center; padding: 4px 0; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--g4);
  animation: blink 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,80%,100% { opacity:.25; transform:scale(.8); }
  40%          { opacity:1;   transform:scale(1);   }
}

/* ── INPUT FOOTER ─────────────────────────────────── */
.footer {
  padding: 0 36px 28px;
  flex-shrink: 0;
}
.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 6px 8px 6px 20px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 640px;
  margin: 0 auto;
}
.input-row:focus-within {
  border-color: rgba(46,125,50,0.3);
  box-shadow: 0 4px 24px rgba(46,125,50,0.10);
}
.msg-input {
  flex: 1; border: none; outline: none;
  background: transparent;
  font-size: 14px; color: var(--text);
  font-family: inherit;
  padding: 8px 0;
}
.msg-input::placeholder { color: var(--text-muted); }

.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: none; background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted);
  transition: all 0.18s;
  flex-shrink: 0;
}
.icon-btn:hover { background: rgba(46,125,50,0.07); color: var(--g2); }
.icon-btn svg {
  width: 17px; height: 17px;
  stroke: currentColor; fill: none;
  stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
}

.voice-btn {
  border: 1.5px solid rgba(46,125,50,0.15);
  background: transparent;
}
.voice-btn.active {
  background: var(--g2);
  border-color: var(--g2);
  color: var(--white);
  box-shadow: 0 3px 12px rgba(46,125,50,0.28);
}
.voice-btn .wv { display: flex; align-items: center; gap: 2px; height: 14px; }
.voice-btn .wv span {
  display: block; width: 2px; border-radius: 2px;
  background: currentColor; transition: background 0.2s;
}
.voice-btn .wv span:nth-child(1) { height: 5px;  }
.voice-btn .wv span:nth-child(2) { height: 10px; }
.voice-btn .wv span:nth-child(3) { height: 14px; }
.voice-btn .wv span:nth-child(4) { height: 9px;  }
.voice-btn .wv span:nth-child(5) { height: 4px;  }
.voice-btn.active .wv span:nth-child(1) { animation: bw .9s ease-in-out infinite; }
.voice-btn.active .wv span:nth-child(2) { animation: bw .9s ease-in-out infinite .15s; }
.voice-btn.active .wv span:nth-child(3) { animation: bw .9s ease-in-out infinite .05s; }
.voice-btn.active .wv span:nth-child(4) { animation: bw .9s ease-in-out infinite .20s; }
.voice-btn.active .wv span:nth-child(5) { animation: bw .9s ease-in-out infinite .10s; }
@keyframes bw { 0%,100% { transform:scaleY(.45); } 50% { transform:scaleY(1); } }

.send-btn {
  background: linear-gradient(135deg, var(--g2), var(--g3));
  color: var(--white);
  border: none;
  box-shadow: 0 2px 10px rgba(46,125,50,0.25);
}
.send-btn:hover {
  background: linear-gradient(135deg, var(--g1), var(--g2));
  box-shadow: 0 4px 16px rgba(46,125,50,0.35);
}
.send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; stroke: white; }

/* Transcrição flutuante sob orbe */
#listenTranscript {
  font-size: 13px;
  color: var(--g2);
  font-weight: 500;
  text-align: center;
  min-height: 18px;
  opacity: 0;
  transition: opacity 0.4s;
  max-width: 300px;
  letter-spacing: 0.1px;
}
#listenTranscript.vis { opacity: 1; }

</style>
</head>
<body>

<!-- ════ SIDEBAR ════ -->
<aside class="sidebar">
  <div class="sidebar-top">
    <div class="brand">
      <div class="brand-orb" id="brandOrb">
        <div class="bd"></div>
        <div class="bd"></div>
        <div class="bd"></div>
        <div class="bd"></div>
      </div>
      <div class="brand-text">
        <span class="brand-name">Yra</span>
        <span class="brand-sub">Assistant</span>
      </div>
    </div>
  </div>

  <nav class="nav">
    <span class="nav-section-label">Principal</span>

    <a class="nav-item active" href="#">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-label">Chat</span>
    </a>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      <span class="nav-label">Plugins</span>
      <span class="nav-badge">3</span>
    </a>

    <span class="nav-section-label">Organização</span>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nav-label">Notas</span>
    </a>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      <span class="nav-label">Memória</span>

    <span class="nav-section-label">Sistema</span>

    <a class="nav-item" href="#">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9"/></svg>
      <span class="nav-label">Configurações</span>

  </nav>

  <div class="sidebar-footer">
    <div class="status-dot"></div>
    <span class="status-label">Conectado</span>
  </div>
</aside>

<!-- ════ MAIN ════ -->
<div class="main">

  <div class="topbar">
    <span class="topbar-title">Assistente pessoal</span>
    <div class="topbar-actions">
      <button class="topbar-btn" title="Histórico">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.9"/></svg>
      </button>
      <button class="topbar-btn" title="Nova conversa">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="stage">

    <!-- ORBE CENTRAL PERMANENTE -->
    <div class="voice-orb-wrap">
      <div class="voice-orb" id="voiceOrb">
        <div class="orb-halo"></div>
        <div class="orb-ring"></div>
        <div class="orb-bg"></div>
        <canvas id="orbCanvas"></canvas>
        <div class="orb-icon">
          <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </div>
      </div>

      <div class="orb-label">
        <div class="orb-status" id="orbStatus">Pronto para ajudar</div>
        <div id="listenTranscript"></div>
      </div>
      <div id="placeholderText"></div>
    </div>

    <!-- RESPOSTA -->
    <div class="response-wrap" id="responseWrap">
      <div class="response-bubble" id="responseBubble">
        <button class="response-close" id="responseClose" title="Fechar">✕</button>
      </div>
    </div>

  </div>

  <!-- FOOTER INPUT -->
  <footer class="footer">
    <div class="input-row">
      <input type="text" class="msg-input" id="msgInput" placeholder="Pergunte qualquer coisa ao Yra…" autocomplete="off">

      <button class="icon-btn voice-btn" id="voiceBtn" title="Modo voz">
        <div class="wv"><span></span><span></span><span></span><span></span><span></span></div>
      </button>

      <button class="icon-btn send-btn" id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
/* ─── BRAND ORB IDLE ANIMATION ─────────────────────── */
const brandDots = document.querySelectorAll('.brand-orb .bd');
const brandPos  = [{x:0,y:-10},{x:10,y:0},{x:0,y:10},{x:-10,y:0}];
function shuffleArr(arr) {
  let a=[...arr]; for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}
setInterval(() => {
  const p = shuffleArr(brandPos);
  brandDots.forEach((d,i) => d.style.transform = `translate(${p[i].x}px,${p[i].y}px)`);
}, 1200);

/* ─── PLACEHOLDERS ────────────────────────────────── */
const PLACEHOLDERS = [
  "Estudando o mercado cripto…","Memorizando as leis de Newton…",
  "Calculando a entropia do universo…","Lendo Kant por prazer. Sério.",
  "Analisando padrões nas estrelas…","Bebendo café virtual ☕",
  "Processando 847 abas abertas…","Simulando universos paralelos…",
  "Otimizando algoritmos de procrastinação…","Traduzindo emojis para latim…",
  "Pesquisando por vida inteligente. Ainda buscando.",
  "Atualizando o mapa mental do cosmos…","Refatorando a teoria do tudo…",
];
const phEl = document.getElementById('placeholderText');
let phIdx  = 0;
let phTimer = null;
let phActive = true;

function nextPlaceholder() {
  if (!phActive) return;
  phEl.classList.add('fade');
  setTimeout(() => {
    phIdx = (phIdx + 1) % PLACEHOLDERS.length;
    phEl.textContent = PLACEHOLDERS[phIdx];
    phEl.classList.remove('fade');
  }, 500);
  phTimer = setTimeout(nextPlaceholder, 3800);
}
function startPH() {
  phActive = true;
  phEl.style.opacity = '';
  phEl.textContent = PLACEHOLDERS[phIdx];
  clearTimeout(phTimer);
  phTimer = setTimeout(nextPlaceholder, 3800);
}
function stopPH() {
  phActive = false;
  clearTimeout(phTimer);
  phEl.textContent = '';
}
startPH();

/* ─── ORB CANVAS ─────────────────────────────────── */
const orbEl     = document.getElementById('voiceOrb');
const orbCanvas = document.getElementById('orbCanvas');
const orbCtx    = orbCanvas.getContext('2d');

let audioCtx=null, analyser=null, micSrc=null, waveData=null, isAudioReady=false;
let rafId = null;

function resizeOrbCanvas() {
  const sz = orbEl.offsetWidth - 6;
  orbCanvas.width  = sz;
  orbCanvas.height = sz;
}
resizeOrbCanvas();
window.addEventListener('resize', resizeOrbCanvas);

/* Waveform idle — ondas suaves simuladas */
function drawIdle() {
  cancelAnimationFrame(rafId);
  const sz = orbCanvas.width;
  const cx = sz/2, cy = sz/2, r = sz * 0.32;
  const bars = 40;
  let t = 0;
  function frame() {
    rafId = requestAnimationFrame(frame);
    t += 0.025;
    orbCtx.clearRect(0,0,sz,sz);
    for (let i=0;i<bars;i++) {
      const angle = (i/bars)*Math.PI*2 - Math.PI/2;
      const wave  = 0.08 + 0.12 * Math.abs(Math.sin(angle*2.5 + t));
      const len   = r * wave;
      const alpha = 0.18 + 0.25 * Math.abs(Math.sin(angle*2 + t));
      const x1 = cx + Math.cos(angle)*(r-2);
      const y1 = cy + Math.sin(angle)*(r-2);
      const x2 = cx + Math.cos(angle)*(r-2+len);
      const y2 = cy + Math.sin(angle)*(r-2+len);
      orbCtx.beginPath();
      orbCtx.moveTo(x1,y1);
      orbCtx.lineTo(x2,y2);
      orbCtx.strokeStyle = `rgba(46,125,50,${alpha})`;
      orbCtx.lineWidth   = 2.5;
      orbCtx.lineCap     = 'round';
      orbCtx.stroke();
    }
  }
  frame();
}

/* Waveform mic real */
function drawMic() {
  cancelAnimationFrame(rafId);
  const sz = orbCanvas.width;
  const cx = sz/2, cy = sz/2, r = sz*0.32;
  const bars = 40;
  const step = Math.floor(waveData.length/bars);
  function frame() {
    rafId = requestAnimationFrame(frame);
    if (analyser) analyser.getByteFrequencyData(waveData);
    orbCtx.clearRect(0,0,sz,sz);
    for (let i=0;i<bars;i++) {
      const angle = (i/bars)*Math.PI*2 - Math.PI/2;
      const norm  = (waveData[i*step]||0)/255;
      const len   = r*(0.08 + 0.55*norm);
      const alpha = 0.35 + 0.65*norm;
      const x1 = cx+Math.cos(angle)*(r-2), y1 = cy+Math.sin(angle)*(r-2);
      const x2 = cx+Math.cos(angle)*(r-2+len), y2 = cy+Math.sin(angle)*(r-2+len);
      orbCtx.beginPath(); orbCtx.moveTo(x1,y1); orbCtx.lineTo(x2,y2);
      orbCtx.strokeStyle = `rgba(46,125,50,${alpha})`;
      orbCtx.lineWidth = 2.5; orbCtx.lineCap = 'round'; orbCtx.stroke();
    }
  }
  frame();
}

/* Waveform responding — gradiente verde→rosa */
function drawResponding() {
  cancelAnimationFrame(rafId);
  const sz = orbCanvas.width;
  const cx = sz/2, cy = sz/2, r = sz*0.32;
  const bars = 44;
  let t = 0;
  function frame() {
    rafId = requestAnimationFrame(frame);
    t += 0.03;
    orbCtx.clearRect(0,0,sz,sz);
    for (let i=0;i<bars;i++) {
      const angle = (i/bars)*Math.PI*2 + t;
      const mix   = ((Math.sin(angle*3 + t*2)+1)/2);
      const rc    = Math.round(46  + (233-46)*mix);
      const gc    = Math.round(125 + (30-125)*mix);
      const bc    = Math.round(50  + (139-50)*mix);
      const len   = r*(0.18 + 0.18*Math.abs(Math.sin(angle*4+t*3)));
      const x1 = cx+Math.cos(angle)*r, y1 = cy+Math.sin(angle)*r;
      const x2 = cx+Math.cos(angle)*(r+len), y2 = cy+Math.sin(angle)*(r+len);
      orbCtx.beginPath(); orbCtx.moveTo(x1,y1); orbCtx.lineTo(x2,y2);
      orbCtx.strokeStyle = `rgba(${rc},${gc},${bc},0.88)`;
      orbCtx.lineWidth = 2.5; orbCtx.lineCap = 'round'; orbCtx.stroke();
    }
  }
  frame();
}

drawIdle();

/* ─── AUDIO SETUP ─────────────────────────────────── */
async function setupAudio() {
  if (isAudioReady) return true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx  = new (window.AudioContext||window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    waveData  = new Uint8Array(analyser.frequencyBinCount);
    micSrc    = audioCtx.createMediaStreamSource(stream);
    micSrc.connect(analyser);
    isAudioReady = true;
    return true;
  } catch(e) { return false; }
}

/* ─── SPEECH RECOGNITION ─────────────────────────── */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, isRecog = false, silTimer = null;
const SILENCE = 2000;

if (SR) {
  recog = new SR();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = 'pt-BR';
  recog.onresult = (e) => {
    if (!voiceActive) return;
    let final='', interim='';
    for (let i=e.resultIndex;i<e.results.length;i++) {
      if (e.results[i].isFinal) final   += e.results[i][0].transcript;
      else                      interim += e.results[i][0].transcript;
    }
    const txt = final||interim;
    ltEl.textContent = txt;
    ltEl.classList.add('vis');
    if (APP_STATE==='responding') leaveResponding();
    clearTimeout(silTimer);
    if (final) silTimer = setTimeout(()=>{ if(voiceActive&&APP_STATE==='listening') fromVoice(final.trim()); }, SILENCE);
  };
  recog.onerror = (e) => {
    if (e.error==='no-speech') return;
    if (e.error==='not-allowed') { alert('Permissão de microfone negada.'); deactivateVoice(); }
  };
  recog.onend = () => {
    isRecog = false;
    if (voiceActive && APP_STATE!=='thinking') try{ recog.start(); isRecog=true; }catch(_){}
  };
}

/* ─── STATE ──────────────────────────────────────── */
let APP_STATE  = 'idle';
let voiceActive = false;
let isBusy     = false;

const voiceBtn  = document.getElementById('voiceBtn');
const orbStatus = document.getElementById('orbStatus');
const ltEl      = document.getElementById('listenTranscript');
const responseWrap   = document.getElementById('responseWrap');
const responseBubble = document.getElementById('responseBubble');
const responseClose  = document.getElementById('responseClose');
const sendBtn   = document.getElementById('sendBtn');
const msgInput  = document.getElementById('msgInput');

function setOrbState(state) {
  orbEl.classList.remove('active','responding');
  if (state==='active')     orbEl.classList.add('active');
  if (state==='responding') orbEl.classList.add('responding');
}

/* ─── VOICE ACTIVATION ───────────────────────────── */
async function activateVoice() {
  voiceActive = true;
  voiceBtn.classList.add('active');
  const ok = await setupAudio();
  if (!ok) { deactivateVoice(); return; }
  stopPH();
  setOrbState('active');
  orbStatus.textContent = 'Ouvindo…';
  ltEl.textContent = '';
  ltEl.classList.add('vis');
  drawMic();
  APP_STATE = 'listening';
  if (recog && !isRecog) try{ recog.start(); isRecog=true; }catch(_){}
}

function deactivateVoice() {
  voiceActive = false;
  isRecog = false;
  voiceBtn.classList.remove('active');
  clearTimeout(silTimer);
  if (recog) try{ recog.stop(); }catch(_){}
  setOrbState('');
  orbStatus.textContent = 'Pronto para ajudar';
  ltEl.classList.remove('vis');
  drawIdle();
  closeResponse();
  startPH();
  APP_STATE = 'idle';
}

function leaveResponding() {
  setOrbState('active');
  closeResponse();
  ltEl.textContent = 'Ouvindo…';
  ltEl.classList.add('vis');
  orbStatus.textContent = 'Ouvindo…';
  drawMic();
  APP_STATE = 'listening';
}

voiceBtn.addEventListener('click', () => { voiceActive ? deactivateVoice() : activateVoice(); });

/* ─── RESPONSE ───────────────────────────────────── */
function showResponse(html) {
  // preserve close button
  const closeBtn = `<button class="response-close" id="responseClose" title="Fechar">✕</button>`;
  responseBubble.innerHTML = closeBtn + html;
  document.getElementById('responseClose').addEventListener('click', closeResponse);
  responseWrap.classList.add('visible');
}

function closeResponse() {
  responseWrap.classList.remove('visible');
}

responseClose && responseClose.addEventListener('click', closeResponse);

/* ─── SUBMIT ─────────────────────────────────────── */
async function submitMsg(text) {
  if (isBusy || !text) return;
  const apiKey = window.__yraApiKey;
  if (!apiKey) { showMdResponse('⚠️ Nenhuma API key encontrada. Configure em Configurações.'); return; }

  isBusy = true;
  msgInput.value = '';
  msgInput.disabled = true;
  sendBtn.disabled  = true;
  APP_STATE = 'thinking';
  stopPH();

  setOrbState('');
  orbStatus.textContent = 'Pensando…';
  ltEl.classList.remove('vis');
  drawIdle();

  showResponse('<div class="typing-dots"><span></span><span></span><span></span></div>');

  try {
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
    const res  = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ role:'user', parts:[{text}] }],
        generationConfig: { temperature:0.85, maxOutputTokens:512 }
      })
    });
    const data  = await res.json();
    const reply = data.error
      ? `⚠️ ${data.error.message}`
      : (data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sem resposta.');

    showMdResponse(reply);

  } catch(err) {
    showMdResponse('⚠️ Não foi possível conectar. Tente novamente.');
  } finally {
    isBusy = false;
    msgInput.disabled = false;
    sendBtn.disabled  = false;
  }
}

function showMdResponse(text) {
  let html;
  try { html = typeof marked!=='undefined' ? marked.parse(text) : text.replace(/\n/g,'<br>'); }
  catch { html = text.replace(/\n/g,'<br>'); }

  APP_STATE = 'responding';

  if (voiceActive) {
    setOrbState('responding');
    orbStatus.textContent = 'Resposta pronta';
    ltEl.textContent = 'Fale para continuar…';
    ltEl.classList.add('vis');
    drawResponding();
    if (recog && !isRecog) try{ recog.start(); isRecog=true; }catch(_){}
  } else {
    setOrbState('');
    orbStatus.textContent = 'Pronto para ajudar';
    drawIdle();
    startPH();
  }

  showResponse(html);
}

function fromVoice(text) {
  if (!text) return;
  ltEl.classList.remove('vis');
  setTimeout(() => { ltEl.textContent=''; }, 300);
  submitMsg(text);
}

/* ─── TEXT SEND ──────────────────────────────────── */
sendBtn.addEventListener('click', () => {
  const t = msgInput.value.trim();
  if (!t) return;
  if (voiceActive) deactivateVoice();
  submitMsg(t);
});
msgInput.addEventListener('keypress', e => {
  if (e.key==='Enter') { const t=msgInput.value.trim(); if(t){if(voiceActive)deactivateVoice();submitMsg(t);} }
});
</script>
