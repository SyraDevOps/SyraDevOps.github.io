<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yra · Assistant</title>
    <style>
        /* ── reset & base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-900: #1B3A1F;
            --green-800: #1E4D2A;
            --green-700: #2E7D32;
            --green-600: #388E3C;
            --green-500: #43A047;
            --green-400: #66BB6A;
            --green-300: #81C784;
            --green-200: #A5D6A7;
            --green-100: #C8E6C9;
            --green-50: #E8F5E9;
            --green-10: #F4FBF4;

            --gray-900: #1A1A1A;
            --gray-800: #2D2D2D;
            --gray-700: #3D3D3D;
            --gray-600: #555;
            --gray-500: #7A7A7A;
            --gray-400: #9E9E9E;
            --gray-300: #C0C0C0;
            --gray-200: #DFDFDF;
            --gray-100: #EEEEEE;
            --gray-50: #F8F8F8;
            --white: #FFFFFF;

            --sidebar-width: 250px;
            --sidebar-collapsed: 72px;
            --radius-lg: 24px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-soft: 0 8px 40px rgba(0, 0, 0, 0.04);
            --shadow-medium: 0 12px 48px rgba(0, 0, 0, 0.06);
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F6F9F6;
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ── scrollbar ────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green-300);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--green-600);
        }

        /* ── layout ───────────────────────────────────────── */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ──────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(18px) saturate(1.3);
            -webkit-backdrop-filter: blur(18px) saturate(1.3);
            border-right: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            padding: 24px 16px 28px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            transition: width var(--transition), padding var(--transition);
            overflow: hidden;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 4px 20px 4px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .diamond-scene {
            position: relative;
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }
        .diamond-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            margin-left: -4px;
            margin-top: -4px;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        .diamond-dot:nth-child(1) {
            background: var(--green-800);
        }
        .diamond-dot:nth-child(2) {
            background: var(--green-600);
        }
        .diamond-dot:nth-child(3) {
            background: var(--green-400);
        }
        .diamond-dot:nth-child(4) {
            background: var(--green-300);
        }

        .brand-name {
            font-size: 19px;
            font-weight: 620;
            letter-spacing: -0.3px;
            color: var(--green-800);
            white-space: nowrap;
            transition: opacity var(--transition), transform var(--transition);
        }
        .brand-name span {
            font-weight: 350;
            color: var(--gray-500);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 10px;
            margin-bottom: 16px;
            border-radius: var(--radius-sm);
            background: var(--green-10);
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--green-200);
            color: var(--green-800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 15px;
            flex-shrink: 0;
            text-transform: uppercase;
        }
        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-800);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-email {
            font-size: 11px;
            color: var(--gray-500);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .user-meta {
            flex: 1;
            min-width: 0;
        }

        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }
        .menu-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 14px;
            font-weight: 460;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            white-space: nowrap;
            position: relative;
        }
        .menu-item a svg {
            stroke: currentColor;
            fill: none;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            opacity: 0.65;
            transition: opacity 0.2s;
        }
        .menu-item a:hover {
            background: var(--green-10);
            color: var(--green-700);
        }
        .menu-item a:hover svg {
            opacity: 1;
        }
        .menu-item.active a {
            background: var(--green-50);
            color: var(--green-700);
            font-weight: 500;
        }
        .menu-item.active a svg {
            opacity: 1;
        }
        .menu-item.active a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--green-600);
            border-radius: 0 3px 3px 0;
        }
        .menu-label {
            transition: opacity var(--transition);
        }

        @media (max-width: 820px) {
            .sidebar {
                width: var(--sidebar-collapsed);
                padding: 16px 8px 20px;
            }
            .brand-name,
            .menu-label,
            .user-name,
            .user-email {
                opacity: 0;
                width: 0;
                overflow: hidden;
                display: none;
            }
            .user-info {
                padding: 8px;
                justify-content: center;
            }
            .user-avatar {
                width: 30px;
                height: 30px;
                font-size: 13px;
            }
            .menu-item a {
                justify-content: center;
                padding: 10px 0;
            }
            .menu-item a svg {
                width: 22px;
                height: 22px;
            }
            .brand {
                justify-content: center;
                padding-bottom: 16px;
            }
            .diamond-scene {
                width: 34px;
                height: 34px;
            }
            .diamond-dot {
                width: 7px;
                height: 7px;
                margin-left: -3.5px;
                margin-top: -3.5px;
            }
            .main-wrap {
                margin-left: var(--sidebar-collapsed);
                padding: 16px 12px 12px;
            }
        }

        /* ── MAIN ─────────────────────────────────────────── */
        .main-wrap {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px 28px 16px;
            overflow: hidden;
            transition: margin-left var(--transition), padding var(--transition);
            position: relative;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        /* ── MESSAGES ─────────────────────────────────────── */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px 12px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }
        .messages-container.empty {
            justify-content: center;
            align-items: center;
        }

        /* ── welcome state (spheres) ────────────────────── */
        .welcome-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            opacity: 1;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: scale(1);
        }
        .welcome-state.hidden {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
            position: absolute;
        }

        .scene {
            position: relative;
            width: 160px;
            height: 160px;
            flex-shrink: 0;
        }
        .dot {
            position: absolute;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            margin-left: -16px;
            margin-top: -16px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), background 0.6s ease;
            box-shadow: 0 4px 16px rgba(46, 125, 50, 0.08);
        }
        .dot:nth-child(1) {
            background: #1B5E20;
        }
        .dot:nth-child(2) {
            background: #2E7D32;
        }
        .dot:nth-child(3) {
            background: #4CAF50;
        }
        .dot:nth-child(4) {
            background: #81C784;
        }

        .scene.thinking .dot:nth-child(1) {
            animation: orbit1 1.4s linear infinite;
        }
        .scene.thinking .dot:nth-child(2) {
            animation: orbit2 1.4s linear infinite;
        }
        .scene.thinking .dot:nth-child(3) {
            animation: orbit3 1.4s linear infinite;
        }
        .scene.thinking .dot:nth-child(4) {
            animation: orbit4 1.4s linear infinite;
        }

        @keyframes orbit1 {
            0% {
                transform: translate(0px, -48px);
            }
            25% {
                transform: translate(48px, 0px);
            }
            50% {
                transform: translate(0px, 48px);
            }
            75% {
                transform: translate(-48px, 0px);
            }
            100% {
                transform: translate(0px, -48px);
            }
        }
        @keyframes orbit2 {
            0% {
                transform: translate(48px, 0px);
            }
            25% {
                transform: translate(0px, 48px);
            }
            50% {
                transform: translate(-48px, 0px);
            }
            75% {
                transform: translate(0px, -48px);
            }
            100% {
                transform: translate(48px, 0px);
            }
        }
        @keyframes orbit3 {
            0% {
                transform: translate(0px, 48px);
            }
            25% {
                transform: translate(-48px, 0px);
            }
            50% {
                transform: translate(0px, -48px);
            }
            75% {
                transform: translate(48px, 0px);
            }
            100% {
                transform: translate(0px, 48px);
            }
        }
        @keyframes orbit4 {
            0% {
                transform: translate(-48px, 0px);
            }
            25% {
                transform: translate(0px, -48px);
            }
            50% {
                transform: translate(48px, 0px);
            }
            75% {
                transform: translate(0px, 48px);
            }
            100% {
                transform: translate(-48px, 0px);
            }
        }

        .welcome-text {
            font-size: 15px;
            color: var(--gray-500);
            font-weight: 420;
            letter-spacing: 0.2px;
            text-align: center;
            transition: opacity 0.5s ease;
        }
        .welcome-text .highlight {
            color: var(--green-700);
            font-weight: 500;
        }

        /* ── MESSAGE BUBBLES ─────────────────────────────── */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 82%;
            animation: msgIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
            align-items: flex-start;
        }

        @keyframes msgIn {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: var(--radius-md);
            font-size: 14.5px;
            line-height: 1.65;
            word-wrap: break-word;
            overflow-wrap: break-word;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }
        .message.user .message-bubble {
            background: var(--green-700);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-bubble {
            background: var(--white);
            color: var(--gray-900);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-soft);
        }
        .message-time {
            font-size: 10.5px;
            color: var(--gray-400);
            margin-top: 4px;
            padding: 0 6px;
            letter-spacing: 0.2px;
        }
        .message.user .message-time {
            color: rgba(255, 255, 255, 0.5);
        }

        /* markdown */
        .message-bubble h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 8px 0 4px;
            color: inherit;
        }
        .message-bubble h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 6px 0 4px;
            color: inherit;
        }
        .message-bubble h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 5px 0 3px;
            color: inherit;
        }
        .message-bubble p {
            margin: 4px 0;
        }
        .message-bubble ul,
        .message-bubble ol {
            margin: 4px 0;
            padding-left: 20px;
        }
        .message-bubble li {
            margin: 2px 0;
        }
        .message-bubble code {
            background: rgba(0, 0, 0, 0.06);
            padding: 2px 8px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
        }
        .message.user .message-bubble code {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .message-bubble pre {
            background: rgba(0, 0, 0, 0.04);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 6px 0;
            border-left: 3px solid var(--green-400);
        }
        .message.user .message-bubble pre {
            background: rgba(255, 255, 255, 0.08);
            border-left-color: rgba(255, 255, 255, 0.3);
        }
        .message-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .message-bubble blockquote {
            border-left: 3px solid var(--green-300);
            padding-left: 14px;
            margin: 6px 0;
            color: var(--gray-500);
            font-style: italic;
        }
        .message.user .message-bubble blockquote {
            border-left-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }
        .message-bubble strong {
            font-weight: 600;
        }
        .message-bubble a {
            color: var(--green-700);
            text-decoration: none;
            border-bottom: 1px solid var(--green-200);
        }
        .message.user .message-bubble a {
            color: #fff;
            border-bottom-color: rgba(255, 255, 255, 0.3);
        }
        .message-bubble a:hover {
            border-bottom-color: var(--green-600);
        }

        /* ── THINKING INDICATOR ───────────────────────────── */
        .thinking-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 18px;
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: var(--shadow-soft);
            gap: 14px;
            align-items: center;
            animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            border-bottom-left-radius: 4px;
        }
        .thinking-indicator.visible {
            display: flex;
        }

        .thinking-indicator .pulse-ring {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2.5px solid var(--green-300);
            position: relative;
            animation: pulseRing 1.4s ease-in-out infinite;
            flex-shrink: 0;
        }
        .thinking-indicator .pulse-ring::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--green-50);
            animation: pulseDot 1.4s ease-in-out infinite;
        }
        @keyframes pulseRing {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }
        @keyframes pulseDot {
            0%,
            100% {
                transform: scale(0.7);
                opacity: 0.5;
            }
            50% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .thinking-indicator .thinking-text {
            font-size: 13.5px;
            color: var(--gray-500);
            font-weight: 420;
            letter-spacing: 0.2px;
        }
        .thinking-indicator .thinking-text .dot-anim {
            display: inline-flex;
            gap: 3px;
            margin-left: 2px;
        }
        .thinking-indicator .thinking-text .dot-anim span {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--green-400);
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        .thinking-indicator .thinking-text .dot-anim span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .thinking-indicator .thinking-text .dot-anim span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dotPulse {
            0%,
            80%,
            100% {
                opacity: 0.2;
                transform: scale(0.7);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── INPUT FOOTER ──────────────────────────────────── */
        .input-footer {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            padding-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            transition: all var(--transition);
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 4px 4px 4px 22px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: var(--shadow-soft);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: var(--green-300);
            box-shadow: 0 4px 28px rgba(46, 125, 50, 0.06);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--gray-900);
            padding: 12px 6px 12px 0;
            font-weight: 420;
            min-width: 0;
        }
        .input-wrapper input::placeholder {
            color: var(--gray-400);
            font-weight: 400;
        }

        .input-wrapper .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--green-50);
            color: var(--green-700);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        .input-wrapper .send-btn:hover {
            background: var(--green-700);
            color: #fff;
            transform: scale(1.02);
        }
        .input-wrapper .send-btn:active {
            transform: scale(0.94);
        }
        .input-wrapper .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .input-wrapper .send-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            transition: transform 0.25s;
        }
        .input-wrapper .send-btn:hover svg {
            transform: translateX(2px);
        }

        .voice-toggle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--green-10);
            color: var(--green-600);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: var(--shadow-soft);
            position: relative;
        }
        .voice-toggle-btn:hover {
            background: var(--green-50);
            transform: scale(1.03);
        }
        .voice-toggle-btn:active {
            transform: scale(0.93);
        }
        .voice-toggle-btn.active {
            background: var(--green-700);
            color: #fff;
            box-shadow: 0 4px 28px rgba(46, 125, 50, 0.25);
        }
        .voice-toggle-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            transition: transform 0.3s;
        }
        .voice-toggle-btn.active svg {
            transform: scale(1.05);
        }

        .stop-btn-wrap {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 14px;
            flex-shrink: 0;
            padding-top: 10px;
        }
        .stop-btn-wrap.visible {
            display: flex;
        }

        .stop-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 26px;
            border-radius: 60px;
            border: none;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: var(--shadow-soft);
            color: #C62828;
            font-size: 14px;

        /* ── responsive ────────────────────────────────────── */

            }
            @keyframes orbit1 {
                0% {
                    transform: translate(0px, -36px);
                }
                25% {
                    transform: translate(36px, 0px);
                }
                50% {
                    transform: translate(0px, 36px);
                }
                75% {
                    transform: translate(-36px, 0px);
                }
                100% {
                    transform: translate(0px, -36px);
                }
            }
            @keyframes orbit2 {
                0% {
                    transform: translate(36px, 0px);
                }
                25% {
                    transform: translate(0px, 36px);
                }
                50% {
                    transform: translate(-36px, 0px);
                }
                75% {
                    transform: translate(0px, -36px);
                }
                100% {
                    transform: translate(36px, 0px);
                }
            }
            @keyframes orbit3 {
                0% {
                    transform: translate(0px, 36px);
                }
                25% {
                    transform: translate(-36px, 0px);
                }
                50% {
                    transform: translate(0px, -36px);
                }
                75% {
                    transform: translate(36px, 0px);
                }

                    transform: translate(0px, 36px);

            @keyframes orbit4 {

        @media (max-width: 480px) {

    <!-- ─── LIBS ─── -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">

    <!-- ─── FIREBASE (import map) ─────────────────────────── -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        // ─── FIREBASE ──────────────────────────────────────
        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getFirestore, collection, query, where, getDocs } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyCvZrOVysl6iPOkqGNhUbWtmgRPkfxI1EA",
            authDomain: "yra-syra.firebaseapp.com",
            projectId: "yra-syra",
            storageBucket: "yra-syra.firebasestorage.app",
            messagingSenderId: "555145505684",
            appId: "1:555145505684:web:aa1ef14072653e41057d81"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ─── DOM REFS ──────────────────────────────────────
        const messagesContainer = document.getElementById('messagesContainer');
        const welcomeState = document.getElementById('welcomeState');
        const scene = document.getElementById('scene');
        const welcomeText = document.getElementById('welcomeText');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinkingIndicator = document.getElementById('thinkingIndicator');
        const voiceStatusBar = document.getElementById('voiceStatusBar');
        const inputFooter = document.getElementById('inputFooter');
        const stopBtnWrap = document.getElementById('stopBtnWrap');
        const voiceToggleBtn = document.getElementById('voiceToggleBtn');
        const stopBtn = document.getElementById('stopBtn');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');

        // ─── ESTADO ──────────────────────────────────────────
        let messages = [];
        let isProcessing = false;
        let isVoiceActive = false;
        let isRecognizing = false;
        let recognition = null;
        let silenceTimer = null;
        const SILENCE_MS = 1800;
        let apiKey = null;
        let currentUser = null;

        // ─── HELPERS ────────────────────────────────────────
        function getTime() {
            return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // ─── RENDER ──────────────────────────────────────────
        function renderMessages() {
            const msgs = messagesContainer.querySelectorAll('.message');
            msgs.forEach(el => el.remove());

            if (messages.length === 0) {
                messagesContainer.classList.add('empty');
                welcomeState.classList.remove('hidden');
                return;
            }

            messagesContainer.classList.remove('empty');
            welcomeState.classList.add('hidden');

            messages.forEach((msg, idx) => {
                const div = document.createElement('div');
                div.className = `message ${msg.role}`;
                div.setAttribute('data-index', idx);

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                if (msg.role === 'assistant') {
                    try {
                        if (typeof marked !== 'undefined') {
                            bubble.innerHTML = marked.parse(msg.content);
                        } else {
                            bubble.textContent = msg.content;
                        }
                    } catch (_) {
                        bubble.textContent = msg.content;
                    }
                } else {
                    bubble.textContent = msg.content;
                }

                const time = document.createElement('div');
                time.className = 'message-time';
                time.textContent = msg.time || getTime();

                div.appendChild(bubble);
                div.appendChild(time);
                messagesContainer.appendChild(div);
            });

            scrollToBottom();
        }

        function addMessage(role, content) {
            messages.push({ role, content, time: getTime() });
            renderMessages();
        }

        function showThinking() {
            thinkingIndicator.classList.add('visible');
            if (messages.length === 0) {
                welcomeState.classList.add('hidden');
                messagesContainer.classList.remove('empty');
            }
            scrollToBottom();
        }

        function hideThinking() {
            thinkingIndicator.classList.remove('visible');
        }

        // ─── ENVIAR ──────────────────────────────────────────
        async function sendMessage(text) {
            if (isProcessing || !text || !text.trim()) return;
            text = text.trim();

            if (isVoiceActive) deactivateVoice();

            isProcessing = true;
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;

            addMessage('user', text);
            showThinking();
            voiceStatusBar.textContent = '⏳ Yra está processando…';
            voiceStatusBar.className = 'voice-status-bar active';

            const key = apiKey;
            if (!key) {
                hideThinking();
                addMessage('assistant', '⚠️ Nenhuma API key encontrada. Configure em Configurações.');
                voiceStatusBar.textContent = '⚠️ API key não configurada';
                voiceStatusBar.className = 'voice-status-bar';
                isProcessing = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
                return;
            }

            try {
                const endpoint =
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text }] }],
                        generationConfig: { temperature: 0.85, maxOutputTokens: 512 }
                    })
                });
                const data = await res.json();
                const reply = data.error ?
                    `⚠️ ${data.error.message}` :
                    (data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sem resposta.');

                hideThinking();
                addMessage('assistant', reply);
                voiceStatusBar.textContent = '✅ Resposta pronta';
                voiceStatusBar.className = 'voice-status-bar';

            } catch (err) {
                console.error(err);
                hideThinking();
                addMessage('assistant', '⚠️ Erro ao conectar. Tente novamente.');
                voiceStatusBar.textContent = '⚠️ Erro de conexão';
                voiceStatusBar.className = 'voice-status-bar';
            }

            isProcessing = false;
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // ─── VOICE ──────────────────────────────────────────
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'pt-BR';

            recognition.onresult = (event) => {
                if (!isVoiceActive) return;
                let interim = '',
                    final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }

                const text = final || interim;
                if (text) {
                    voiceStatusBar.textContent = `🎤 ${text}`;
                    voiceStatusBar.className = 'voice-status-bar active';
                }

                clearTimeout(silenceTimer);
                if (final && text.trim()) {
                    silenceTimer = setTimeout(() => {
                        if (isVoiceActive && !isProcessing) {
                            deactivateVoice();
                            sendMessage(text.trim());
                        }
                    }, SILENCE_MS);
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'no-speech') return;
                console.error('Speech error:', e.error);
                if (e.error === 'not-allowed') {
                    alert('Permissão de microfone negada.');
                    deactivateVoice();
                }
            };

            recognition.onend = () => {
                isRecognizing = false;
                if (isVoiceActive && !isProcessing) {
                    try { recognition.start();
                        isRecognizing = true; } catch (_) {}
                }
            };
        }

        async function activateVoice() {
            if (isVoiceActive) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                alert('Permissão de microfone é necessária para o modo voz.');
                return;
            }

            isVoiceActive = true;
            voiceToggleBtn.classList.add('active');
            inputFooter.classList.add('hidden');
            stopBtnWrap.classList.add('visible');

            voiceStatusBar.textContent = '🎤 Ouvindo… fale algo';
            voiceStatusBar.className = 'voice-status-bar active';

            if (recognition && !isRecognizing) {
                try { recognition.start();
                    isRecognizing = true; } catch (_) {}
            }
        }

        function deactivateVoice() {
            isVoiceActive = false;
            isRecognizing = false;
            voiceToggleBtn.classList.remove('active');
            inputFooter.classList.remove('hidden');
            stopBtnWrap.classList.remove('visible');

            if (recognition) {
                try { recognition.stop(); } catch (_) {}
            }

            clearTimeout(silenceTimer);
            voiceStatusBar.textContent = 'Toque no microfone para ativar voz';
            voiceStatusBar.className = 'voice-status-bar';
        }

        // ─── EVENT LISTENERS ────────────────────────────────
        sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });

        voiceToggleBtn.addEventListener('click', () => {
            if (isVoiceActive) deactivateVoice();
            else activateVoice();
        });

        stopBtn.addEventListener('click', deactivateVoice);

        // ─── FIREBASE AUTH ──────────────────────────────────
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const name = user.displayName || user.email?.split('@')[0] || 'Usuário';
                const email = user.email || '—';
                const initial = name.charAt(0).toUpperCase();

                userAvatar.textContent = initial;
                userName.textContent = name;
                userEmail.textContent = email;

                // Busca a chave API
                try {
                    const q = query(
                        collection(db, 'Keys'),
                        where('user_id', '==', user.uid),
                        where('enabled', '==', true)
                    );
                    const ks = await getDocs(q);
                    if (!ks.empty) {
                        const keyData = ks.docs[0].data();
                        apiKey = keyData.key;
                        voiceStatusBar.textContent = '✅ Conectado · Yra pronto';
                        voiceStatusBar.className = 'voice-status-bar active';
                        setTimeout(() => {
                            voiceStatusBar.textContent = 'Toque no microfone para ativar voz';
                            voiceStatusBar.className = 'voice-status-bar';
                        }, 2500);
                    } else {
                        voiceStatusBar.textContent = '⚠️ Nenhuma chave API encontrada';
                        voiceStatusBar.className = 'voice-status-bar';
                    }
                } catch (e) {
                    console.error('Erro ao buscar key:', e);
                    voiceStatusBar.textContent = '⚠️ Erro ao carregar chave API';
                    voiceStatusBar.className = 'voice-status-bar';
                }
            } else {
                // Redireciona para login
                window.location.href = 'index.html';
            }
        });

        // ─── DIAMOND ANIMATION ──────────────────────────────
        (function diamondAnim() {
            const dots = document.querySelectorAll('.diamond-dot');
            if (!dots.length) return;
            const positions = [
                { x: 0, y: -13 },
                { x: 13, y: 0 },
                { x: 0, y: 13 },
                { x: -13, y: 0 }
            ];

            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            const initP = shuffle(positions);
            dots.forEach((dot, i) => {
                if (initP[i]) {
                    dot.style.transform = `translate(${initP[i].x}px, ${initP[i].y}px)`;
                }
            });

            setInterval(() => {
                const p = shuffle(positions);
                dots.forEach((dot, i) => {
                    if (p[i]) {
                        dot.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
                    }
                });
            }, 1200);
        })();

        // ─── SPHERE IDLE ANIMATION ──────────────────────────
        (function sphereAnim() {
            const dots = document.querySelectorAll('.dot');
            const sceneEl = document.getElementById('scene');
            if (!dots.length || !sceneEl) return;

            const pos = [
                { x: 0, y: -48 },
                { x: 48, y: 0 },
                { x: 0, y: 48 },
                { x: -48, y: 0 }
            ];

            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            let interval;

            function startIdle() {
                sceneEl.classList.remove('thinking');
                clearInterval(interval);
                const initP = shuffle(pos);
                dots.forEach((d, i) => {
                    if (initP[i]) {
                        d.style.transform = `translate(${initP[i].x}px, ${initP[i].y}px)`;
                        d.style.animation = '';
                    }
                });
                interval = setInterval(() => {
                    const p = shuffle(pos);
                    dots.forEach((d, i) => {
                        if (p[i]) {
                            d.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
                            d.style.animation = '';
                        }
                    });
                }, 1000);
            }

            const observer = new MutationObserver(() => {
                if (sceneEl.classList.contains('thinking')) {
                    clearInterval(interval);
                } else {
                    startIdle();
                }
            });
            observer.observe(sceneEl, { attributes: true, attributeFilter: ['class'] });

            startIdle();
        })();

        // ─── INICIALIZA ──────────────────────────────────────
        console.log('Yra Assistant · pronto');
        messageInput.focus();

        // ─── EXPOSIÇÃO PARA DEBUG ──────────────────────────
        window.__yra = { auth, db, sendMessage, activateVoice, deactivateVoice };
    </script>
