<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yra · Voice Assistant</title>
    <style>
        /* ── reset & base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-900: #1B3A1F;
            --green-800: #1E4D2A;
            --green-700: #2E7D32;
            --green-600: #388E3C;
            --green-500: #43A047;
            --green-400: #66BB6A;
            --green-300: #81C784;
            --green-200: #A5D6A7;
            --green-100: #C8E6C9;
            --green-50: #E8F5E9;
            --green-10: #F4FBF4;

            --gray-900: #1A1A1A;
            --gray-700: #3D3D3D;
            --gray-500: #6B6B6B;
            --gray-300: #B5B5B5;
            --gray-100: #E8E8E8;
            --gray-50: #F7F7F7;

            --sidebar-width: 250px;
            --sidebar-collapsed: 72px;
            --radius-lg: 28px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --shadow-soft: 0 8px 40px rgba(0, 0, 0, 0.04);
            --shadow-circle: 0 12px 56px rgba(46, 125, 50, 0.12);
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F6F9F6;
            color: var(--gray-900);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ── scrollbar ────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--green-300);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--green-600);
        }

        /* ── layout ───────────────────────────────────────── */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ──────────────────────────────────────── */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(16px) saturate(1.2);
            -webkit-backdrop-filter: blur(16px) saturate(1.2);
            border-right: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            padding: 28px 18px 32px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            transition: width var(--transition), padding var(--transition);
            overflow: hidden;
        }

        /* ── brand / diamond particles ───────────────────── */
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 4px 32px 4px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .diamond-scene {
            position: relative;
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .diamond-dot {
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            margin-left: -4.5px;
            margin-top: -4.5px;
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        .diamond-dot:nth-child(1) {
            background: var(--green-800);
        }
        .diamond-dot:nth-child(2) {
            background: var(--green-600);
        }
        .diamond-dot:nth-child(3) {
            background: var(--green-400);
        }
        .diamond-dot:nth-child(4) {
            background: var(--green-300);
        }

        .brand-name {
            font-size: 20px;
            font-weight: 620;
            letter-spacing: -0.3px;
            color: var(--green-800);
            white-space: nowrap;
            transition: opacity var(--transition), transform var(--transition);
        }
        .brand-name span {
            font-weight: 350;
            color: var(--gray-500);
        }

        /* ── menu ─────────────────────────────────────────── */
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 14px;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 14px;
            font-weight: 480;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            white-space: nowrap;
            position: relative;
        }
        .menu-item a svg {
            stroke: currentColor;
            fill: none;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .menu-item a:hover {
            background: var(--green-10);
            color: var(--green-700);
        }
        .menu-item a:hover svg {
            opacity: 1;
        }
        .menu-item.active a {
            background: var(--green-50);
            color: var(--green-700);
            font-weight: 520;
        }
        .menu-item.active a svg {
            opacity: 1;
        }
        .menu-item.active a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--green-600);
            border-radius: 0 3px 3px 0;
        }

        .menu-label {
            transition: opacity var(--transition);
        }

        /* sidebar collapse (mobile) */
        @media (max-width: 820px) {
            .sidebar {
                width: var(--sidebar-collapsed);
                padding: 20px 10px 24px;
            }
            .brand-name,
            .menu-label {
                opacity: 0;
                width: 0;
                overflow: hidden;
                display: none;
            }
            .menu-item a {
                justify-content: center;
                padding: 11px 0;
            }
            .menu-item a svg {
                width: 22px;
                height: 22px;
            }
            .brand {
                justify-content: center;
                padding-bottom: 24px;
            }
            .diamond-scene {
                width: 38px;
                height: 38px;
            }
            .diamond-dot {
                width: 7px;
                height: 7px;
                margin-left: -3.5px;
                margin-top: -3.5px;
            }
            .main-wrap {
                margin-left: var(--sidebar-collapsed);
                padding: 20px 16px 16px;
            }
        }

        /* ── MAIN ─────────────────────────────────────────── */
        .main-wrap {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 32px 32px 20px;
            overflow: hidden;
            transition: margin-left var(--transition), padding var(--transition);
            position: relative;
        }

        /* ── CENTER VOICE CIRCLE ─────────────────────────── */
        .voice-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 560px;
            gap: 20px;
            transition: transform var(--transition), opacity var(--transition);
        }

        .voice-circle-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            transition: transform var(--transition);
        }

        .voice-circle {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow var(--transition);
        }

        /* anel externo */
        .voice-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(46, 125, 50, 0.10);
            transition: all 0.6s ease;
        }

        .voice-circle.listening .voice-ring {
            animation: ringPulse 2.2s ease-in-out infinite;
            border-color: rgba(46, 125, 50, 0.15);
            box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.06);
        }

        .voice-circle.responding .voice-ring {
            border-color: transparent;
            background: conic-gradient(from 0deg,
                    #2E7D32 0%,
                    #66BB6A 25%,
                    #A5D6A7 45%,
                    #F48FB1 65%,
                    #E91E8C 85%,
                    #2E7D32 100%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
            animation: spinGradient 3s linear infinite;
            box-shadow: 0 0 40px rgba(46, 125, 50, 0.08);
        }

        @keyframes ringPulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.08);
            }
            50% {
                box-shadow: 0 0 0 18px rgba(46, 125, 50, 0);
            }
        }
        @keyframes spinGradient {
            to {
                transform: rotate(360deg);
            }
        }

        /* fundo do círculo */
        .voice-bg {
            position: absolute;
            inset: 6px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: var(--shadow-circle);
            transition: box-shadow 0.6s;
        }

        .voice-circle.listening .voice-bg {
            box-shadow: 0 8px 48px rgba(46, 125, 50, 0.10);
        }
        .voice-circle.responding .voice-bg {
            box-shadow: 0 8px 48px rgba(233, 30, 140, 0.08);
        }

        /* canvas da waveform */
        #waveCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
        }

        /* ícone central (microfone / check) */
        .voice-icon {
            position: relative;
            z-index: 2;
            color: var(--green-700);
            transition: all 0.5s ease;
            pointer-events: none;
            opacity: 0.6;
            width: 32px;
            height: 32px;
        }
        .voice-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
        }

        .voice-circle.listening .voice-icon {
            opacity: 1;
            color: var(--green-600);
        }
        .voice-circle.responding .voice-icon {
            opacity: 1;
            color: #E91E8C;
        }

        /* ── status ────────────────────────────────────────── */
        .voice-status {
            font-size: 15px;
            font-weight: 440;
            color: var(--gray-500);
            letter-spacing: 0.2px;
            text-align: center;
            min-height: 28px;
            transition: color 0.4s, opacity 0.4s;
        }
        .voice-status.active {
            color: var(--green-700);
        }
        .voice-status.responding {
            color: #D81B60;
        }

        .voice-sub {
            font-size: 13px;
            color: var(--gray-300);
            margin-top: -6px;
            min-height: 20px;
            transition: opacity 0.4s;
            text-align: center;
            max-width: 320px;
        }

        /* ── resposta ──────────────────────────────────────── */
        .response-area {
            width: 100%;
            max-width: 520px;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s ease, transform 0.5s ease, max-height 0.6s ease;
            pointer-events: none;
            max-height: 0;
            overflow: hidden;
            margin-top: 0;
        }
        .response-area.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            max-height: 400px;
            margin-top: 8px;
        }

        .response-bubble {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            font-size: 15px;
            line-height: 1.7;
            color: var(--gray-900);
            box-shadow: var(--shadow-soft);
            max-height: 280px;
            overflow-y: auto;
            scroll-behavior: smooth;
            transition: background 0.4s;
        }

        .response-bubble h1 {
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0 6px;
            color: var(--green-800);
        }
        .response-bubble h2 {
            font-size: 16px;
            font-weight: 600;
            margin: 8px 0 4px;
            color: var(--green-800);
        }
        .response-bubble h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 6px 0 4px;
            color: var(--green-700);
        }
        .response-bubble p {
            margin: 6px 0;
        }
        .response-bubble ul,
        .response-bubble ol {
            margin: 6px 0;
            padding-left: 22px;
        }
        .response-bubble li {
            margin: 3px 0;
        }
        .response-bubble code {
            background: var(--green-50);
            padding: 2px 8px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 13px;
            color: var(--green-800);
        }
        .response-bubble pre {
            background: var(--green-10);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 8px 0;
            border-left: 3px solid var(--green-400);
        }
        .response-bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .response-bubble blockquote {
            border-left: 3px solid var(--green-300);
            padding-left: 14px;
            margin: 8px 0;
            color: var(--gray-500);
            font-style: italic;
        }
        .response-bubble strong {
            font-weight: 600;
            color: var(--gray-900);
        }
        .response-bubble a {
            color: var(--green-700);
            text-decoration: none;
            border-bottom: 1px solid var(--green-200);
        }
        .response-bubble a:hover {
            border-bottom-color: var(--green-600);
        }

        /* typing dots dentro da resposta */
        .typing-dots {
            display: inline-flex;
            gap: 5px;
            align-items: center;
            padding: 4px 0;
        }
        .typing-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green-300);
            animation: dotBlink 1.3s ease-in-out infinite;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.15s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.3s;
        }
        @keyframes dotBlink {
            0%,
            80%,
            100% {
                opacity: 0.25;
                transform: scale(0.8);
            }
            40% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── INPUT FOOTER ──────────────────────────────────── */
        .input-footer {
            width: 100%;
            max-width: 560px;
            padding-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all var(--transition);
            flex-shrink: 0;
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.80);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 4px 4px 4px 22px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: var(--shadow-soft);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: var(--green-300);
            box-shadow: 0 4px 24px rgba(46, 125, 50, 0.06);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 15px;
            color: var(--gray-900);
            padding: 12px 6px 12px 0;
            font-weight: 420;
            min-width: 0;
        }
        .input-wrapper input::placeholder {
            color: var(--gray-300);
            font-weight: 400;
        }

        .input-wrapper .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--green-50);
            color: var(--green-700);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        .input-wrapper .send-btn:hover {
            background: var(--green-700);
            color: #fff;
            transform: scale(1.02);
        }
        .input-wrapper .send-btn:active {
            transform: scale(0.94);
        }
        .input-wrapper .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .input-wrapper .send-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            transition: transform 0.25s;
        }
        .input-wrapper .send-btn:hover svg {
            transform: translateX(2px);
        }

        /* botão de voz (microfone) */
        .voice-toggle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--green-10);
            color: var(--green-600);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: var(--shadow-soft);
            position: relative;
        }
        .voice-toggle-btn:hover {
            background: var(--green-50);
            transform: scale(1.03);
        }
        .voice-toggle-btn:active {
            transform: scale(0.93);
        }
        .voice-toggle-btn.active {
            background: var(--green-700);
            color: #fff;
            box-shadow: 0 4px 24px rgba(46, 125, 50, 0.25);
        }
        .voice-toggle-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 1.8;
            fill: none;
            transition: transform 0.3s;
        }
        .voice-toggle-btn.active svg {
            transform: scale(1.05);
        }

        /* ── STOP BUTTON (modo voz ativo) ────────────────── */
        .stop-btn-wrap {
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 14px;
            flex-shrink: 0;
            padding-top: 12px;
        }
        .stop-btn-wrap.visible {
            display: flex;
        }

        .stop-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 28px;
            border-radius: 60px;
            border: none;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: var(--shadow-soft);
            color: #C62828;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(198, 40, 40, 0.08);
        }
        .stop-btn:hover {
            background: #FFEBEE;
            border-color: rgba(198, 40, 40, 0.15);
            transform: scale(1.02);
        }
        .stop-btn:active {
            transform: scale(0.96);
        }
        .stop-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* ── input escondido no modo voz ──────────────────── */
        .input-footer.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px);
            max-height: 0;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        /* ── responsive ────────────────────────────────────── */
        @media (max-width: 640px) {
            .main-wrap {
                padding: 16px 12px 12px;
            }
            .voice-circle-wrap {
                width: 160px;
                height: 160px;
            }
            .voice-status {
                font-size: 14px;
            }
            .response-bubble {
                padding: 16px 18px;
                font-size: 14px;
                max-height: 200px;
            }
            .input-wrapper input {
                font-size: 14px;
                padding: 10px 4px 10px 0;
            }
            .input-wrapper {
                padding-left: 16px;
            }
            .voice-toggle-btn {
                width: 42px;
                height: 42px;
            }
            .voice-toggle-btn svg {
                width: 19px;
                height: 19px;
            }
            .input-wrapper .send-btn {
                width: 38px;
                height: 38px;
            }
            .input-wrapper .send-btn svg {
                width: 16px;
                height: 16px;
            }
            .stop-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .voice-circle-wrap {
                width: 130px;
                height: 130px;
            }
            .voice-icon {
                width: 26px;
                height: 26px;
            }
            .main-wrap {
                padding: 10px 8px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="app">

        <!-- ─── SIDEBAR ─── -->
        <aside class="sidebar" id="sidebar">

            <!-- brand com losango de partículas -->
            <div class="brand">
                <div class="diamond-scene" id="diamondScene">
                    <div class="diamond-dot"></div>
                    <div class="diamond-dot"></div>
                    <div class="diamond-dot"></div>
                    <div class="diamond-dot"></div>
                </div>
                <span class="brand-name">Yra<span>Assistant</span></span>
            </div>

            <!-- menu -->
            <ul class="menu-list">
                <li class="menu-item active">
                    <a href="#">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        <span class="menu-label">Chat</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        <span class="menu-label">Plugins</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <span class="menu-label">Notas</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                        <span class="menu-label">Memória</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="#">
                        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span class="menu-label">Configurações</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- ─── MAIN ─── -->
        <main class="main-wrap" id="mainWrap">

            <!-- centro: círculo de voz + status + resposta -->
            <section class="voice-section" id="voiceSection">

                <!-- círculo -->
                <div class="voice-circle-wrap">
                    <div class="voice-circle" id="voiceCircle">
                        <div class="voice-ring" id="voiceRing"></div>
                        <div class="voice-bg"></div>
                        <canvas id="waveCanvas"></canvas>
                        <div class="voice-icon" id="voiceIcon">
                            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </div>
                    </div>
                </div>

                <!-- status -->
                <div class="voice-status" id="voiceStatus">Pronto para ouvir</div>
                <div class="voice-sub" id="voiceSub">Toque no microfone para ativar</div>

                <!-- área de resposta -->
                <div class="response-area" id="responseArea">
                    <div class="response-bubble" id="responseBubble"></div>
                </div>
            </section>

            <!-- ─── INPUT FOOTER ─── -->
            <footer class="input-footer" id="inputFooter">
                <div class="input-wrapper" id="inputWrapper">
                    <input type="text" class="message-input" id="messageInput"
                    placeholder="Pergunte qualquer coisa ao Yra…" />
                    <button class="send-btn" id="sendBtn" aria-label="Enviar">
                        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>

                <button class="voice-toggle-btn" id="voiceToggleBtn" aria-label="Ativar voz">
                    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
            </footer>

            <!-- ─── STOP BUTTON (modo voz ativo) ─── -->
            <div class="stop-btn-wrap" id="stopBtnWrap">
                <button class="stop-btn" id="stopBtn">
                    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    Encerrar modo escuta
                </button>
            </div>

        </main>
    </div>

    <!-- ─── LIBS ─── -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>

    <script>
        /* ================================================================
           DIAMOND PARTICLES — animação no topo da sidebar
           ================================================================ */
        (function diamondAnimation() {
            const dots = document.querySelectorAll('.diamond-dot');
            if (!dots.length) return;

            // posições formando um losango (diamond)
            const positions = [
                { x: 0, y: -14 },
                { x: 14, y: 0 },
                { x: 0, y: 14 },
                { x: -14, y: 0 }
            ];

            function shuffle(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            let timer = setInterval(() => {
                const p = shuffle(positions);
                dots.forEach((dot, i) => {
                    if (p[i]) {
                        dot.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
                    }
                });
            }, 1200);

            // iniciar com um shuffle imediato
            const initP = shuffle(positions);
            dots.forEach((dot, i) => {
                if (initP[i]) {
                    dot.style.transform = `translate(${initP[i].x}px, ${initP[i].y}px)`;
                }
            });
        })();


        /* ================================================================
           VOICE CIRCLE — waveform + estados
           ================================================================ */
        const voiceCircle = document.getElementById('voiceCircle');
        const voiceRing = document.getElementById('voiceRing');
        const voiceStatus = document.getElementById('voiceStatus');
        const voiceSub = document.getElementById('voiceSub');
        const waveCanvas = document.getElementById('waveCanvas');
        const waveCtx = waveCanvas.getContext('2d');
        const responseArea = document.getElementById('responseArea');
        const responseBubble = document.getElementById('responseBubble');

        let audioCtx = null;
        let analyser = null;
        let micSource = null;
        let waveData = null;
        let waveRAF = null;
        let isWaveReady = false;
        let isVoiceActive = false;
        let isResponding = false;
        let isProcessing = false;

        let recognition = null;
        let isRecognizing = false;
        let silenceTimer = null;
        const SILENCE_MS = 2000;

        // ── canvas resize ──
        function resizeCanvas() {
            const size = voiceCircle.offsetWidth || 200;
            waveCanvas.width = size;
            waveCanvas.height = size;
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 50);

        // ── setup áudio ──
        async function setupAudio() {
            if (isWaveReady) return true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                waveData = new Uint8Array(analyser.frequencyBinCount);
                micSource = audioCtx.createMediaStreamSource(stream);
                micSource.connect(analyser);
                isWaveReady = true;
                return true;
            } catch (e) {
                console.error('Mic setup error:', e);
                return false;
            }
        }

        // ── draw waveform ──
        function drawWave(mode) {
            // mode: 'listening' | 'responding' | 'idle'
            cancelAnimationFrame(waveRAF);

            const size = waveCanvas.width;
            const cx = size / 2;
            const cy = size / 2;
            const baseR = size * 0.30;

            function frame() {
                waveRAF = requestAnimationFrame(frame);
                waveCtx.clearRect(0, 0, size, size);

                if (mode === 'responding') {
                    // anel gradiente girante
                    const now = Date.now() / 1000;
                    const bars = 44;
                    for (let i = 0; i < bars; i++) {
                        const angle = (i / bars) * Math.PI * 2 + now * 1.0;
                        const t = (Math.sin(angle * 2.5 + now * 1.8) + 1) / 2;
                        const r = Math.round(46 + (233 - 46) * t);
                        const g = Math.round(125 + (30 - 125) * t);
                        const b = Math.round(50 + (139 - 50) * t);
                        const len = baseR * 0.18 + baseR * 0.22 * Math.abs(Math.sin(angle * 3 + now * 2.2));

                        const x1 = cx + Math.cos(angle) * baseR;
                        const y1 = cy + Math.sin(angle) * baseR;
                        const x2 = cx + Math.cos(angle) * (baseR + len);
                        const y2 = cy + Math.sin(angle) * (baseR + len);

                        waveCtx.beginPath();
                        waveCtx.moveTo(x1, y1);
                        waveCtx.lineTo(x2, y2);
                        waveCtx.strokeStyle = `rgba(${r},${g},${b},0.8)`;
                        waveCtx.lineWidth = 2.8;
                        waveCtx.lineCap = 'round';
                        waveCtx.stroke();
                    }
                    return;
                }

                if (mode === 'idle' || !analyser) {
                    // pequenos pontos estáticos
                    for (let i = 0; i < 32; i++) {
                        const angle = (i / 32) * Math.PI * 2;
                        const len = baseR * 0.12;
                        const x1 = cx + Math.cos(angle) * (baseR - 2);
                        const y1 = cy + Math.sin(angle) * (baseR - 2);
                        const x2 = cx + Math.cos(angle) * (baseR - 2 + len);
                        const y2 = cy + Math.sin(angle) * (baseR - 2 + len);
                        waveCtx.beginPath();
                        waveCtx.moveTo(x1, y1);
                        waveCtx.lineTo(x2, y2);
                        waveCtx.strokeStyle = 'rgba(46,125,50,0.15)';
                        waveCtx.lineWidth = 2;
                        waveCtx.lineCap = 'round';
                        waveCtx.stroke();
                    }
                    return;
                }

                // mode === 'listening' — waveform real
                analyser.getByteFrequencyData(waveData);
                const bars = 40;
                const step = Math.floor(waveData.length / bars);

                for (let i = 0; i < bars; i++) {
                    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
                    const raw = waveData[i * step] || 0;
                    const norm = raw / 255;
                    const len = baseR * 0.10 + baseR * 0.58 * norm;

                    const x1 = cx + Math.cos(angle) * (baseR - 3);
                    const y1 = cy + Math.sin(angle) * (baseR - 3);
                    const x2 = cx + Math.cos(angle) * (baseR - 3 + len);
                    const y2 = cy + Math.sin(angle) * (baseR - 3 + len);

                    const alpha = 0.3 + 0.7 * norm;
                    waveCtx.beginPath();
                    waveCtx.moveTo(x1, y1);
                    waveCtx.lineTo(x2, y2);
                    waveCtx.strokeStyle = `rgba(46,125,50,${alpha})`;
                    waveCtx.lineWidth = 2.5;
                    waveCtx.lineCap = 'round';
                    waveCtx.stroke();
                }
            }

            frame();
        }

        function stopWave() {
            cancelAnimationFrame(waveRAF);
            waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        }

        // ── atualizar estado visual do círculo ──
        function setCircleState(state) {
            // state: 'idle' | 'listening' | 'responding'
            voiceCircle.classList.remove('listening', 'responding');

            if (state === 'listening') {
                voiceCircle.classList.add('listening');
                voiceStatus.textContent = '🎤 Ouvindo…';
                voiceStatus.className = 'voice-status active';
                voiceSub.textContent = 'Fale algo para o Yra';
                document.getElementById('voiceIcon').querySelector('svg').innerHTML =
                    '<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
                drawWave('listening');
            } else if (state === 'responding') {
                voiceCircle.classList.add('responding');
                voiceStatus.textContent = '✨ Yra está respondendo';
                voiceStatus.className = 'voice-status responding';
                voiceSub.textContent = 'Toque na resposta para fechar';
                document.getElementById('voiceIcon').querySelector('svg').innerHTML =
                    '<path d="M20 6L9 17l-5-5"/>';
                drawWave('responding');
            } else {
                // idle
                voiceStatus.textContent = 'Pronto para ouvir';
                voiceStatus.className = 'voice-status';
                voiceSub.textContent = 'Toque no microfone para ativar';
                document.getElementById('voiceIcon').querySelector('svg').innerHTML =
                    '<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
                drawWave('idle');
            }
        }

        // ── resposta ──
        function showResponse(text) {
            let html;
            try {
                if (typeof marked !== 'undefined') {
                    html = marked.parse(text);
                } else {
                    html = text.replace(/\n/g, '<br>');
                }
            } catch (_) {
                html = text.replace(/\n/g, '<br>');
            }
            responseBubble.innerHTML = html;
            responseArea.classList.add('visible');
            setCircleState('responding');
            isResponding = true;
        }

        function clearResponse() {
            responseArea.classList.remove('visible');
            responseBubble.innerHTML = '';
            isResponding = false;
        }

        function showTyping() {
            responseBubble.innerHTML =
                `<div class="typing-dots"><span></span><span></span><span></span></div>`;
            responseArea.classList.add('visible');
            setCircleState('listening');
        }

        // ── Speech Recognition ──
        if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'pt-BR';

            recognition.onresult = (event) => {
                if (!isVoiceActive) return;
                let interim = '',
                    final = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) final += event.results[i][0].transcript;
                    else interim += event.results[i][0].transcript;
                }

                const text = final || interim;
                if (text) {
                    voiceSub.textContent = text;
                    voiceSub.style.opacity = '1';
                }

                clearTimeout(silenceTimer);
                if (final && text.trim()) {
                    silenceTimer = setTimeout(() => {
                        if (isVoiceActive && !isProcessing) {
                            submitVoiceQuery(text.trim());
                        }
                    }, SILENCE_MS);
                }
            };

            recognition.onerror = (e) => {
                if (e.error === 'no-speech') return;
                console.error('Speech error:', e.error);
                if (e.error === 'not-allowed') {
                    alert('Permissão de microfone negada.');
                    deactivateVoice();
                }
            };

            recognition.onend = () => {
                isRecognizing = false;
                if (isVoiceActive && !isProcessing) {
                    try { recognition.start();
                        isRecognizing = true; } catch (_) {}
                }
            };
        }

        // ── ativar / desativar voz ──
        async function activateVoice() {
            if (isVoiceActive) return;

            const ok = await setupAudio();
            if (!ok) {
                alert('Não foi possível acessar o microfone.');
                return;
            }

            isVoiceActive = true;
            isProcessing = false;

            // esconde input, mostra stop
            document.getElementById('inputFooter').classList.add('hidden');
            document.getElementById('stopBtnWrap').classList.add('visible');

            // ativa botão
            document.getElementById('voiceToggleBtn').classList.add('active');

            // estado
            setCircleState('listening');
            clearResponse();
            voiceSub.textContent = 'Ouvindo…';
            voiceSub.style.opacity = '1';

            // inicia reconhecimento
            if (recognition && !isRecognizing) {
                try { recognition.start();
                    isRecognizing = true; } catch (_) {}
            }

            // inicia waveform
            resizeCanvas();
            drawWave('listening');
        }

        function deactivateVoice() {
            isVoiceActive = false;
            isRecognizing = false;
            isProcessing = false;

            if (recognition) {
                try { recognition.stop(); } catch (_) {}
            }

            document.getElementById('inputFooter').classList.remove('hidden');
            document.getElementById('stopBtnWrap').classList.remove('visible');
            document.getElementById('voiceToggleBtn').classList.remove('active');

            clearTimeout(silenceTimer);
            clearResponse();
            setCircleState('idle');
            voiceSub.textContent = 'Toque no microfone para ativar';
            voiceSub.style.opacity = '1';
            stopWave();
            resizeCanvas();
            drawWave('idle');
        }

        // ── enviar pergunta por voz ──
        async function submitVoiceQuery(text) {
            if (isProcessing || !text) return;
            isProcessing = true;

            // feedback visual
            voiceSub.textContent = '⏳ Processando…';
            showTyping();

            const apiKey = window.__yraApiKey;
            if (!apiKey) {
                showResponse('⚠️ Nenhuma API key encontrada. Configure em Configurações.');
                isProcessing = false;
                return;
            }

            try {
                const endpoint =
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text }] }],
                        generationConfig: { temperature: 0.85, maxOutputTokens: 512 }
                    })
                });
                const data = await res.json();
                const reply = data.error ?
                    `⚠️ ${data.error.message}` :
                    (data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sem resposta.');

                showResponse(reply);
                voiceSub.textContent = '✅ Resposta pronta — fale para continuar';

                // volta a ouvir após um instante (mantém o microfone ativo)
                setTimeout(() => {
                    if (isVoiceActive) {
                        setCircleState('listening');
                        voiceSub.textContent = 'Ouvindo…';
                        if (recognition && !isRecognizing) {
                            try { recognition.start();
                                isRecognizing = true; } catch (_) {}
                        }
                        drawWave('listening');
                    }
                }, 400);

            } catch (err) {
                console.error(err);
                showResponse('⚠️ Erro ao conectar. Tente novamente.');
            }

            isProcessing = false;
        }


        /* ================================================================
           EVENT LISTENERS
           ================================================================ */

        // ── toggle voz ──
        document.getElementById('voiceToggleBtn').addEventListener('click', () => {
            if (isVoiceActive) {
                deactivateVoice();
            } else {
                activateVoice();
            }
        });

        // ── stop btn ──
        document.getElementById('stopBtn').addEventListener('click', deactivateVoice);

        // ── enviar texto ──
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendTextMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            // se modo voz ativo, desativa
            if (isVoiceActive) deactivateVoice();

            isProcessing = true;
            messageInput.value = '';
            messageInput.disabled = true;
            sendBtn.disabled = true;

            showTyping();
            voiceSub.textContent = '⏳ Pensando…';

            const apiKey = window.__yraApiKey;
            if (!apiKey) {
                showResponse('⚠️ Nenhuma API key encontrada. Configure em Configurações.');
                isProcessing = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                return;
            }

            try {
                const endpoint =
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: 'user', parts: [{ text }] }],
                        generationConfig: { temperature: 0.85, maxOutputTokens: 512 }
                    })
                });
                const data = await res.json();
                const reply = data.error ?
                    `⚠️ ${data.error.message}` :
                    (data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sem resposta.');

                showResponse(reply);
                voiceSub.textContent = '✅ Resposta pronta';

            } catch (err) {
                console.error(err);
                showResponse('⚠️ Erro ao conectar. Tente novamente.');
            }

            isProcessing = false;
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener('click', sendTextMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendTextMessage();
        });

        // ── clicar na resposta fecha (modo texto) ──
        responseArea.addEventListener('click', () => {
            if (!isVoiceActive && !isProcessing) {
                clearResponse();
                setCircleState('idle');
                voiceSub.textContent = 'Toque no microfone para ativar';
                drawWave('idle');
            }
        });

        // ── inicializa estado idle ──
        setTimeout(() => {
            resizeCanvas();
            setCircleState('idle');
            drawWave('idle');
        }, 100);

        // ── expor API key (vinda do Firebase) ──
        window.__yraApiKey = window.__yraApiKey || null;

        // ── placeholder para quando não houver key ──
        console.log('Yra Assistant · pronto');
    </script>
