<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yra Assistant</title>
<style>
:root {
    --primary:        #2E7D32;
    --primary-light:  #81C784;
    --primary-ultra:  #E8F5E9;
    --text-dark:      #2C3E50;
    --text-light:     #7F8C8D;
    --bg:             #F9FBF9;
    --border:         #E2E8F0;
    --white:          #ffffff;
}

* { margin:0; padding:0; box-sizing:border-box;
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif; }

body {
    background: var(--bg);
    color: var(--text-dark);
    height: 100vh;
    display: flex;
    overflow: hidden;
    position: relative;
}

.main-wrapper {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 30px;
    height: 100vh;
    overflow: hidden;
    transition: margin-left 0.3s ease;
}

@media (max-width: 900px) {
    .main-wrapper {
        margin-left: 70px;
    }
}

/* ── SIDEBAR ─────────────────────────────────────────── */
--sidebar-width: 260px;

.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding-left: 10px;
}

.scene-sidebar {
    position: relative;
    width: 40px;
    height: 40px;
}

.dot-sidebar {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    margin-left: -4px;
    margin-top: -4px;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.dot-sidebar:nth-child(1) { background: #1B5E20; }
.dot-sidebar:nth-child(2) { background: #2E7D32; }
.dot-sidebar:nth-child(3) { background: #4CAF50; }
.dot-sidebar:nth-child(4) { background: #81C784; }

.brand-name {
    font-size: 18px;
    font-weight: 600;
    color: #1B5E20;
    letter-spacing: 0.5px;
}

.menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.menu-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.2s ease;
}

.menu-item a:hover, .menu-item.active a {
    background: var(--primary-ultra);
    color: var(--primary);
}

.menu-item a svg {
    stroke: currentColor;
    fill: none;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}

@media (max-width: 900px) {
    .sidebar {
        width: 70px;
        padding: 20px 10px;
    }
    .brand-name, .menu-item span {
        display: none;
    }
    .brand {
        justify-content: center;
    }
}

/* ── CENTRO ───────────────────────────────────────────── */
.center-container {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    gap:32px; width:100%; position:relative;
    padding-top: 60px;
}

/* Wrapper das esferas */
.scene-wrapper {
    display:flex; flex-direction:column; align-items:center; gap:22px;
    transition: transform .7s cubic-bezier(.4,0,.2,1),
                opacity   .7s cubic-bezier(.4,0,.2,1),
                margin-top .7s cubic-bezier(.4,0,.2,1);
}
.scene-wrapper.top-mode { margin-top: -200px; }
.scene-wrapper.hidden   { opacity:0; pointer-events:none; transform:scale(.85); }

/* Esferas */
.scene { position:relative; width:180px; height:180px; }
.dot {
    position:absolute; width:36px; height:36px; border-radius:50%;
    left:50%; top:50%; margin-left:-18px; margin-top:-18px;
    transition: transform .8s cubic-bezier(.4,0,.2,1),
                background .6s ease;
    box-shadow:0 4px 12px rgba(46,125,50,.1);
}
.dot:nth-child(1){ background:#1B5E20; }
.dot:nth-child(2){ background:#2E7D32; }
.dot:nth-child(3){ background:#4CAF50; }
.dot:nth-child(4){ background:#81C784; }

/* Órbita pensando */
.scene.thinking .dot:nth-child(1){ animation:orbit1 1.4s linear infinite; }
.scene.thinking .dot:nth-child(2){ animation:orbit2 1.4s linear infinite; }
.scene.thinking .dot:nth-child(3){ animation:orbit3 1.4s linear infinite; }
.scene.thinking .dot:nth-child(4){ animation:orbit4 1.4s linear infinite; }
@keyframes orbit1 {
    0%  { transform:translate(  0px,-55px); }
    25% { transform:translate( 55px,  0px); }
    50% { transform:translate(  0px, 55px); }
    75% { transform:translate(-55px,  0px); }
    100%{ transform:translate(  0px,-55px); }
}
@keyframes orbit2 {
    0%  { transform:translate( 55px,  0px); }
    25% { transform:translate(  0px, 55px); }
    50% { transform:translate(-55px,  0px); }
    75% { transform:translate(  0px,-55px); }
    100%{ transform:translate( 55px,  0px); }
}
@keyframes orbit3 {
    0%  { transform:translate(  0px, 55px); }
    25% { transform:translate(-55px,  0px); }
    50% { transform:translate(  0px,-55px); }
    75% { transform:translate( 55px,  0px); }
    100%{ transform:translate(  0px, 55px); }
}
@keyframes orbit4 {
    0%  { transform:translate(-55px,  0px); }
    25% { transform:translate(  0px,-55px); }
    50% { transform:translate( 55px,  0px); }
    75% { transform:translate(  0px, 55px); }
    100%{ transform:translate(-55px,  0px); }
}

/* ── PLACEHOLDER / TRANSCRIÇÃO ─────────────────────────── */
.subtitle-area { min-height:28px; text-align:center; max-width:380px; }
.placeholder-text {
    font-size:14px; color:var(--text-light); font-style:italic;
    opacity:1; transition:opacity .5s ease;
}
.placeholder-text.fade { opacity:0; }

.transcript-text {
    font-size:15px; color:var(--primary); font-weight:500;
    text-align:center; max-width:380px;
    opacity:0; transition:opacity .4s ease;
}
.transcript-text.visible { opacity:1; }

/* ── RESPOSTA ────────────────────────────────────────────── */
.response-area {
    width:100%; max-width:540px;
    opacity:0; transform:translateY(-20px);
    transition: opacity .5s ease, transform .5s ease;
    pointer-events:none; display:none;
    position: relative;
    order: 3;
}
.response-area.visible {
    display:block; opacity:1; transform:translateY(0); pointer-events:auto;
}

/* Esferas verticais ao lado durante pensamento */
.thinking-dots-vertical {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

.thinking-dots-vertical.visible {
    opacity: 1;
    pointer-events: auto;
}

.thinking-dots-vertical .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    left: 0 !important;
    top: 0 !important;
    margin: 0 !important;
    animation: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.thinking-dots-vertical .dot:nth-child(1) { 
    background: #1B5E20; 
    animation: floatUp 1.2s ease-in-out infinite;
}
.thinking-dots-vertical .dot:nth-child(2) { 
    background: #2E7D32; 
    animation: floatUp 1.2s ease-in-out infinite 0.15s;
}
.thinking-dots-vertical .dot:nth-child(3) { 
    background: #4CAF50; 
    animation: floatUp 1.2s ease-in-out infinite 0.3s;
}
.thinking-dots-vertical .dot:nth-child(4) { 
    background: #81C784; 
    animation: floatUp 1.2s ease-in-out infinite 0.45s;
}

@keyframes floatUp {
    0%, 100% { 
        transform: translateY(0);
        opacity: 0.7;
    }
    50% { 
        transform: translateY(-15px);
        opacity: 1;
    }
}

@media (max-width: 768px) {
    .thinking-dots-vertical {
        bottom: -50px;
        flex-direction: row;
        gap: 10px;
    }
}
.response-bubble {
    background:var(--white); border:1px solid rgba(46,125,50,.10);
    border-radius:20px; padding:20px 26px;
    font-size:15px; line-height:1.65; color:var(--text-dark);
    box-shadow:0 4px 24px rgba(46,125,50,.06);
    text-align:left; max-height:320px; overflow-y:auto;
    cursor: pointer;
}
.response-bubble::-webkit-scrollbar { width:6px; }
.response-bubble::-webkit-scrollbar-track { background:transparent; }
.response-bubble::-webkit-scrollbar-thumb { background:var(--primary-light); border-radius:3px; }
.response-bubble::-webkit-scrollbar-thumb:hover { background:var(--primary); }

/* Markdown styles */
.response-bubble h1 { font-size:18px; font-weight:600; margin:12px 0 8px; color:var(--primary-color); }
.response-bubble h2 { font-size:16px; font-weight:600; margin:10px 0 6px; color:var(--primary-color); }
.response-bubble h3 { font-size:14px; font-weight:600; margin:8px 0 4px; color:var(--primary-color); }
.response-bubble p { margin:8px 0; }
.response-bubble ul, .response-bubble ol { margin:8px 0; padding-left:20px; }
.response-bubble li { margin:4px 0; }
.response-bubble code { background:rgba(46,125,50,0.1); padding:2px 6px; border-radius:4px; font-family:'Courier New', monospace; font-size:13px; color:#1B5E20; }
.response-bubble pre { background:rgba(46,125,50,0.08); padding:12px; border-radius:8px; overflow-x:auto; margin:8px 0; border-left:3px solid var(--primary-color); }
.response-bubble pre code { background:none; padding:0; color:inherit; }
.response-bubble blockquote { border-left:3px solid var(--primary-light); padding-left:12px; margin:8px 0; color:var(--text-light); font-style:italic; }
.response-bubble strong { font-weight:600; color:var(--text-dark); }
.response-bubble em { font-style:italic; }
.response-bubble a { color:var(--primary-color); text-decoration:none; border-bottom:1px solid var(--primary-light); }
.response-bubble a:hover { border-bottom:1px solid var(--primary-color); }

.typing-dots { display:inline-flex; gap:5px; align-items:center; }
.typing-dots span {
    width:7px; height:7px; border-radius:50%; background:var(--primary-light);
    animation:blink 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){ animation-delay:.2s; }
.typing-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes blink {
    0%,80%,100%{ opacity:.25; transform:scale(.8); }
    40%        { opacity:1;   transform:scale(1);   }
}

/* ── MODO ESCUTA ATIVA — círculo central ─────────────────── */
.listen-circle {
    position:relative;
    width:160px; height:160px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transform:scale(.8);
    transition: opacity .6s cubic-bezier(.4,0,.2,1),
                transform .6s cubic-bezier(.4,0,.2,1);
}
.listen-circle.visible { opacity:1; pointer-events:auto; transform:scale(1); }

/* Anel externo */
.listen-ring {
    position:absolute; inset:0; border-radius:50%;
    border:2px solid rgba(46,125,50,.15);
    box-shadow:0 0 0 0 rgba(46,125,50,.1);
    animation:none;
}
.listen-circle.active .listen-ring {
    animation:ringPulse 2s ease-in-out infinite;
}
/* Gradiente verde→rosa quando respondendo */
.listen-circle.responding .listen-ring {
    border-color:transparent;
    background: conic-gradient(
        from 0deg,
        #2E7D32 0%,
        #81C784 30%,
        #F48FB1 60%,
        #E91E8C 80%,
        #2E7D32 100%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
    animation:spinGradient 2.5s linear infinite;
}
@keyframes ringPulse {
    0%,100%{ box-shadow:0 0 0 0   rgba(46,125,50,.15); }
    50%    { box-shadow:0 0 0 12px rgba(46,125,50,0);   }
}
@keyframes spinGradient {
    to { transform:rotate(360deg); }
}

/* Canvas da faixa de áudio dentro do círculo */
#waveCanvas {
    position:absolute; inset:0;
    width:100%; height:100%;
    border-radius:50%;
}

/* Fundo do círculo */
.listen-bg {
    position:absolute; inset:6px;
    border-radius:50%; background:var(--white);
    box-shadow:0 8px 32px rgba(46,125,50,.08);
}

/* ── INPUT RODAPÉ ──────────────────────────────────────── */
.input-container {
    width:100%; max-width:600px;
    display:flex; align-items:center;
    background:var(--white); border-radius:30px;
    padding:8px 10px 8px 20px;
    box-shadow:0 4px 20px rgba(0,0,0,.02);
    border:1px solid rgba(46,125,50,.08);
    transition:all .3s; gap:6px;
}
.input-container:focus-within {
    border-color:var(--primary);
    box-shadow:0 6px 24px rgba(46,125,50,.05);
}
.message-input {
    flex:1; border:none; outline:none; background:transparent;
    font-size:15px; color:var(--text-dark); padding:8px 0;
}
.message-input::placeholder { color:var(--text-light); }

/* Botão modo escuta — círculo com mini waveform SVG */
.voice-mode-btn {
    width:44px; height:44px; border-radius:50%;
    background:var(--white); border:1.5px solid rgba(46,125,50,.15);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
    transition:all .25s ease;
    box-shadow:0 2px 8px rgba(46,125,50,.04);
    position:relative; overflow:hidden;
}
.voice-mode-btn:hover {
    border-color:var(--primary-light);
    box-shadow:0 3px 12px rgba(46,125,50,.12);
}
.voice-mode-btn.active {
    background:var(--primary);
    border-color:var(--primary);
    box-shadow:0 4px 16px rgba(46,125,50,.3);
}
.voice-mode-btn .btn-wave {
    display:flex; align-items:center; gap:2px; height:16px;
}
.voice-mode-btn .btn-wave span {
    display:block; width:2.5px; border-radius:2px;
    background:var(--text-light); transition:background .25s;
}
.voice-mode-btn.active .btn-wave span { background:var(--white); }
/* Alturas dos 5 tracinhos (waveform miniaturo) */
.voice-mode-btn .btn-wave span:nth-child(1){ height:6px;  }
.voice-mode-btn .btn-wave span:nth-child(2){ height:12px; }
.voice-mode-btn .btn-wave span:nth-child(3){ height:16px; }
.voice-mode-btn .btn-wave span:nth-child(4){ height:10px; }
.voice-mode-btn .btn-wave span:nth-child(5){ height:5px;  }
/* Animação quando ativo */
.voice-mode-btn.active .btn-wave span:nth-child(1){ animation:bw 0.9s ease-in-out infinite; }
.voice-mode-btn.active .btn-wave span:nth-child(2){ animation:bw 0.9s ease-in-out infinite .15s; }
.voice-mode-btn.active .btn-wave span:nth-child(3){ animation:bw 0.9s ease-in-out infinite .05s; }
.voice-mode-btn.active .btn-wave span:nth-child(4){ animation:bw 0.9s ease-in-out infinite .2s; }
.voice-mode-btn.active .btn-wave span:nth-child(5){ animation:bw 0.9s ease-in-out infinite .1s; }
@keyframes bw {
    0%,100%{ transform:scaleY(.5); }
    50%    { transform:scaleY(1);   }
}

/* Botão microfone simples (mantido para o fluxo de voz sem modo ativo) */
.mic-btn {
    background:transparent; border:none; width:38px; height:38px;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s; color:var(--text-light); flex-shrink:0;
}
.mic-btn:hover { background:var(--primary-ultra); color:var(--primary); }
.mic-btn.recording { background:#FFEBEE; color:#C62828; animation:micPulse 1s ease-in-out infinite; }
@keyframes micPulse {
    0%,100%{ box-shadow:0 0 0 0   rgba(198,40,40,.2); }
    50%    { box-shadow:0 0 0 6px rgba(198,40,40,0);   }
}

/* Botão enviar */
.send-btn {
    background:var(--primary-ultra); border:none;
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s; flex-shrink:0;
}
.send-btn svg { color:var(--primary); transition:transform .2s; }
.send-btn:hover { background:var(--primary); }
.send-btn:hover svg { color:var(--white); transform:translateX(2px); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>

<!-- Conteúdo Principal -->
<div class="main-wrapper">

<!-- ÁREA CENTRAL -->
<main class="center-container" id="centerContainer">

    <!-- Esferas -->

        <div class="scene" id="scene">

        <div class="listen-ring" id="listenRing"></div>
        <div class="listen-bg"></div>
        <canvas id="waveCanvas"></canvas>
    </div>

    <!-- Transcrição no modo escuta -->
    <div class="transcript-text" id="listenTranscript"
         style="max-width:340px; font-size:14px; text-align:center; transition:opacity .4s; opacity:0;"></div>

    <!-- Resposta -->
    <div class="response-area" id="responseArea">
        <div class="response-bubble" id="responseBubble"></div>
        <div class="thinking-dots-vertical" id="thinkingDotsVertical">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</main>

<!-- INPUT RODAPÉ -->
<footer class="input-container">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
/* ================================================================
   ANIMAÇÃO DO LOGO LATERAL (BOLINHAS)
================================================================ */
const sidebarDots = document.querySelectorAll(".dot-sidebar");
const sidebarPositions = [
    {x: 0, y: -10},
    {x: 10, y: 0},
    {x: 0, y: 10},
    {x: -10, y: 0}
];

function shuffleSidebarArray(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startSidebarAnimation() {
    if (sidebarDots.length === 0) {
        console.warn("Sidebar dots not found, animation skipped");
        return;
    }
    
    setInterval(() => {
        const p = shuffleSidebarArray(sidebarPositions);
        sidebarDots.forEach((dot, i) => {
            if (p[i]) {
                dot.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
            }
        });
    }, 1000);
}

// Wait for DOM to be ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startSidebarAnimation);
} else {
    startSidebarAnimation();
}

/* ================================================================
   PLACEHOLDERS
================================================================ */
const PLACEHOLDERS = [
    "Estudando o mercado cripto...",
    "Memorizando as leis de Newton...",
    "Calculando a entropia do universo...",
    "Lendo Kant por prazer. Sério.",
    "Treinando para a Olimpíada de Xadrez...",
    "Analisando padrões nas estrelas...",
    "Bebendo café virtual. ☕",
    "Processando 847 abas abertas...",
    "Relendo 'O Guia do Mochileiro' pela 42ª vez...",
    "Aprendendo suaíli por curiosidade...",
    "Verificando se gatos entendem física quântica...",
    "Simulando universos paralelos...",
    "Otimizando algoritmos de procrastinação...",
    "Traduzindo emojis para latim...",
    "Pesquisando por vida inteligente. Ainda buscando.",
    "Atualizando o mapa mental do cosmos...",
    "Perguntando por que o céu é azul. Ainda.",
    "Refatorando a teoria do tudo...",
    "Sincronizando com o fuso horário de Marte...",
    "Lendo sobre buracos negros. Por diversão.",
];

const placeholderEl   = document.getElementById("placeholderText");
const transcriptEl    = document.getElementById("transcriptText"); // sob esferas (modo normal)
const listenTranscript= document.getElementById("listenTranscript");

let phIndex   = Math.floor(Math.random() * PLACEHOLDERS.length);
let phTimeout = null;
let isIdle    = true;

function showNextPlaceholder() {
    if (!isIdle) return;
    placeholderEl.classList.add("fade");
    setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        placeholderEl.textContent = PLACEHOLDERS[phIndex];
        placeholderEl.classList.remove("fade");
    }, 500);
    phTimeout = setTimeout(showNextPlaceholder, 3500);
}
function startPlaceholders() {
    isIdle = true;
    placeholderEl.style.display  = "block";
    placeholderEl.classList.remove("fade");
    transcriptEl.classList.remove("visible");
    clearTimeout(phTimeout);
    showNextPlaceholder();
}
function stopPlaceholders() {
    isIdle = false;
    clearTimeout(phTimeout);
    placeholderEl.classList.add("fade");
    setTimeout(() => { placeholderEl.style.display = "none"; }, 500);
}

setTimeout(startPlaceholders, 800);

/* ================================================================
   ESFERAS
================================================================ */
const dots         = document.querySelectorAll(".dot");
const scene        = document.getElementById("scene");
const sceneWrapper = document.getElementById("sceneWrapper");

const POS = [
    {x:0,   y:-55},
    {x:55,  y:0  },
    {x:0,   y:55 },
    {x:-55, y:0  }
];

function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
}

let sphereInterval = null;

function startIdleAnimation() {
    if (!scene || dots.length === 0) {
        console.warn("Scene elements not found, idle animation skipped");
        return;
    }
    scene.classList.remove("thinking");
    clearInterval(sphereInterval);
    sphereInterval = setInterval(() => {
        const p = shuffle(POS);
        dots.forEach((d, i) => {
            if (p[i]) {
                d.style.transform = `translate(${p[i].x}px,${p[i].y}px)`;
                d.style.animation  = "";
            }
        });
    }, 1000);
}

function startThinkingAnimation() {
    if (!scene || dots.length === 0) {
        console.warn("Scene elements not found, thinking animation skipped");
        return;
    }
    clearInterval(sphereInterval);
    dots.forEach(d => { d.style.transform = ""; d.style.animation = ""; });
    // Pequeno delay para garantir que o browser reflow processe o reset
    requestAnimationFrame(() => {
        requestAnimationFrame(() => { scene.classList.add("thinking"); });
    });
}

function hideSpheres() {
    if (sceneWrapper) {
        sceneWrapper.classList.add("hidden");
    }
}
function showSpheres(atTop = false) {
    if (!sceneWrapper) return;
    sceneWrapper.classList.remove("hidden");
    if (atTop) {
        sceneWrapper.classList.add("top-mode");
    } else {
        sceneWrapper.classList.remove("top-mode");
    }
}

// Wait for DOM to be ready before starting animations
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startIdleAnimation);
} else {
    startIdleAnimation();
}

/* ================================================================
   WAVEFORM REAL — CANVAS NO CÍRCULO DE ESCUTA
================================================================ */
const listenCircle = document.getElementById("listenCircle");
const waveCanvas   = document.getElementById("waveCanvas");
const waveCtx      = waveCanvas.getContext("2d");

let audioCtx    = null;
let analyser    = null;
let micSource   = null;
let waveData    = null;
let waveRAF     = null;
let isWaveReady = false;

async function setupAudio() {
    if (isWaveReady) return true;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
        audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
        analyser   = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        waveData   = new Uint8Array(analyser.frequencyBinCount);
        micSource  = audioCtx.createMediaStreamSource(stream);
        micSource.connect(analyser);
        isWaveReady = true;
        return true;
    } catch(e) {
        console.error("Mic:", e);
        return false;
    }
}

function resizeCanvas() {
    const size = listenCircle.offsetWidth;
    waveCanvas.width  = size;
    waveCanvas.height = size;
}

function drawWave(isResponding = false) {
    cancelAnimationFrame(waveRAF);
    const size = waveCanvas.width;
    const cx   = size / 2;
    const cy   = size / 2;
    const r    = size * 0.3;  // raio base

    function frame() {
        waveRAF = requestAnimationFrame(frame);
        waveCtx.clearRect(0, 0, size, size);

        if (isResponding) {
            // — Anel girante verde→rosa —
            const now  = Date.now() / 1000;
            const bars = 40;
            for (let i = 0; i < bars; i++) {
                const angle = (i / bars) * Math.PI * 2 + now * 1.2;
                const t     = ((Math.sin(angle * 3 + now * 2) + 1) / 2); // 0..1
                // Interpola verde → rosa
                const rc = Math.round(46  + (233-46)  * t);
                const gc = Math.round(125 + (30-125)  * t);
                const bc = Math.round(50  + (139-50)  * t);
                const len = r * 0.22 + r * 0.18 * Math.abs(Math.sin(angle * 4 + now * 3));

                const x1 = cx + Math.cos(angle) * r;
                const y1 = cy + Math.sin(angle) * r;
                const x2 = cx + Math.cos(angle) * (r + len);
                const y2 = cy + Math.sin(angle) * (r + len);

                waveCtx.beginPath();
                waveCtx.moveTo(x1, y1);
                waveCtx.lineTo(x2, y2);
                waveCtx.strokeStyle = `rgba(${rc},${gc},${bc},0.85)`;
                waveCtx.lineWidth   = 2.5;
                waveCtx.lineCap     = "round";
                waveCtx.stroke();
            }
        } else {
            // — Waveform real do microfone —
            if (analyser) analyser.getByteFrequencyData(waveData);

            const bars    = 36;
            const step    = Math.floor(waveData ? waveData.length / bars : 1);

            for (let i = 0; i < bars; i++) {
                const angle   = (i / bars) * Math.PI * 2 - Math.PI / 2;
                const raw     = waveData ? waveData[i * step] : 0;
                const norm    = raw / 255;
                const len     = r * 0.12 + r * 0.55 * norm;

                const x1 = cx + Math.cos(angle) * (r - 4);
                const y1 = cy + Math.sin(angle) * (r - 4);
                const x2 = cx + Math.cos(angle) * (r - 4 + len);
                const y2 = cy + Math.sin(angle) * (r - 4 + len);

                const alpha = 0.4 + 0.6 * norm;
                waveCtx.beginPath();
                waveCtx.moveTo(x1, y1);
                waveCtx.lineTo(x2, y2);
                waveCtx.strokeStyle = `rgba(46,125,50,${alpha})`;
                waveCtx.lineWidth   = 2.5;
                waveCtx.lineCap     = "round";
                waveCtx.stroke();
            }
        }
    }

    frame();
}

function stopWave() {
    cancelAnimationFrame(waveRAF);
    waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
}

/* ================================================================
   ESTADO GLOBAL
================================================================ */
/*
  Estados:
    "idle"      — esferas + placeholders
    "listening" — círculo + waveform real + transcrição
    "thinking"  — esferas no topo girando (transição)
    "responding"— círculo com waveform rosa/verde, resposta exibida
*/
let APP_STATE = "idle";

function setState(newState) {
    APP_STATE = newState;
}

/* ================================================================
   MODO ESCUTA ATIVA
================================================================ */
const voiceModeBtn = document.getElementById("voiceModeBtn");
let voiceModeActive = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition   = null;
let isRecognizing = false;
let silenceTimer  = null;
const SILENCE_MS  = 2000;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous     = true;
    recognition.interimResults = true;
    recognition.lang           = "pt-BR";

    recognition.onresult = (event) => {
        if (!voiceModeActive) return;
        let interim = "", final = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) final   += event.results[i][0].transcript;
            else                          interim  += event.results[i][0].transcript;
        }

        const text = final || interim;
        listenTranscript.textContent = text;
        listenTranscript.style.opacity = "1";

        // Se estava em modo "responding", o user falou → volta a ouvir
        if (APP_STATE === "responding") {
            leaveRespondingMode();
        }

        clearTimeout(silenceTimer);
        if (final) {
            silenceTimer = setTimeout(() => {
                if (voiceModeActive && APP_STATE === "listening") {
                    submitFromVoice(final.trim());
                }
            }, SILENCE_MS);
        }
    };

    recognition.onerror = (e) => {
        if (e.error === "no-speech") return;
        console.error("Speech error:", e.error);
        if (e.error === "not-allowed") {
            alert("Permissão de microfone negada.");
            deactivateVoiceMode();
        }
    };

    recognition.onend = () => {
        isRecognizing = false;
        if (voiceModeActive && APP_STATE !== "thinking") {
            // Reinicia automaticamente
            try { recognition.start(); isRecognizing = true; } catch(_) {}
        }
    };
}

async function activateVoiceMode() {
    voiceModeActive = true;
    voiceModeBtn.classList.add("active");

    // Prepara áudio
    const ok = await setupAudio();
    if (!ok) { deactivateVoiceMode(); return; }

    // Esconde esferas suavemente
    hideSpheres();
    stopPlaceholders();
    clearResponse();

    // Mostra círculo
    resizeCanvas();
    listenCircle.classList.add("visible", "active");
    listenTranscript.textContent = "Ouvindo...";
    listenTranscript.style.opacity = "1";

    setState("listening");

    // Inicia waveform
    drawWave(false);

    // Inicia reconhecimento
    if (recognition && !isRecognizing) {
        try { recognition.start(); isRecognizing = true; } catch(_) {}
    }
}

function deactivateVoiceMode() {
    voiceModeActive = false;
    isRecognizing   = false;
    voiceModeBtn.classList.remove("active");
    clearTimeout(silenceTimer);

    if (recognition) try { recognition.stop(); } catch(_) {}

    // Esconde círculo
    listenCircle.classList.remove("visible", "active", "responding");
    listenTranscript.style.opacity = "0";
    stopWave();

    // Volta ao idle
    clearResponse();
    showSpheres(false);
    startIdleAnimation();
    startPlaceholders();
    setState("idle");
}

// Initialize voice mode button listener when DOM is ready
function initVoiceListener() {
    if (!voiceModeBtn) return;
    voiceModeBtn.addEventListener("click", () => {
        if (voiceModeActive) {
            deactivateVoiceMode();
        } else {
            activateVoiceMode();
        }
    });
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initVoiceListener);
} else {
    initVoiceListener();
}

/* ================================================================
   SUBMISSÃO DE MENSAGEM (texto ou voz)
================================================================ */
const sendBtn      = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const responseArea = document.getElementById("responseArea");
const responseBubble = document.getElementById("responseBubble");

let isBusy = false;

async function submitMessage(text) {
    if (isBusy || !text) return;

    const apiKey = window.__yraApiKey;
    if (!apiKey) {
        showResponseText("⚠️ Nenhuma API key encontrada. Configure em Settings.");
        return;
    }

    isBusy = true;
    messageInput.value    = "";
    messageInput.disabled = true;
    sendBtn.disabled      = true;
    setState("thinking");

    if (voiceModeActive) {
        // Esconde círculo de escuta, mostra esferas no topo girando
        listenCircle.classList.remove("active", "responding");
        stopWave();
        listenTranscript.style.opacity = "0";

        showSpheres(true);
        startThinkingAnimation();
    } else {
        // Modo texto: esconde esferas e mostra thinking dots ao lado
        stopPlaceholders();
        transcriptEl.classList.remove("visible");
        hideSpheres();
    }

    // Typing indicator + thinking dots verticais
    responseArea.classList.add("visible");
    document.getElementById("thinkingDotsVertical").classList.add("visible");
    responseBubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    try {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`;
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ role:"user", parts:[{ text }] }],
                generationConfig: { temperature:0.85, maxOutputTokens:512 }
            })
        });
        const data = await res.json();
        const reply = data.error
            ? `⚠️ ${data.error.message}`
            : (data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.");

        showResponseText(reply);

    } catch(err) {
        console.error(err);
        showResponseText("⚠️ Não foi possível conectar. Tente novamente.");
    } finally {
        isBusy = false;
        messageInput.disabled = false;
        sendBtn.disabled      = false;
    }
}

function showResponseText(text) {
    // Converter markdown para HTML
    let html;
    try {
        if (typeof marked !== 'undefined') {
            html = marked.parse(text);
        } else {
            html = text.replace(/\n/g, '<br>');
        }
    } catch(e) {
        html = text.replace(/\n/g, '<br>');
    }
    
    responseBubble.innerHTML = html;
    responseArea.classList.add("visible", "thinking");
    setState("responding");

    const thinkingDots = document.getElementById("thinkingDotsVertical");

    if (voiceModeActive) {
        // Esferas somem, círculo volta com modo resposta
        thinkingDots.classList.remove("visible");
        responseArea.classList.remove("thinking");
        sceneWrapper.classList.add("hidden");

        setTimeout(() => {
            listenCircle.classList.add("visible", "responding");
            listenCircle.classList.remove("active");
            listenTranscript.textContent = "Resposta pronta — fale para continuar...";
            listenTranscript.style.opacity = "1";
            resizeCanvas();
            drawWave(true);

            // Mantém reconhecimento ativo para detectar próxima fala
            if (recognition && !isRecognizing) {
                try { recognition.start(); isRecognizing = true; } catch(_) {}
            }
        }, 300);
    } else {
        // Modo texto — bolinhas ficam visíveis pulsando
        // A resposta fica visível até:
        // 1. Enviar outra mensagem
        // 2. Clicar nas bolinhas
        // 3. Ativar modo voz
        
        // Cancelar qualquer timer anterior
        clearTimeout(window.__yraIdleTimer);
        
        // Bolinhas desaparecem após 5 segundos, deixando só a mensagem visível
        // A mensagem só some quando: enviar nova msg, clicar nas bolinhas, ou ativar modo voz
        window.__yraIdleTimer = setTimeout(() => {
            thinkingDots.classList.remove("visible");
            responseArea.classList.remove("thinking");
        }, 5000);
    }
}

// Fazer bolinhas serem clicáveis para fechar resposta
function setupThinkingDotsClick() {
    const thinkingDots = document.getElementById("thinkingDotsVertical");
    if (!thinkingDots) return;
    
    thinkingDots.style.cursor = "pointer";
    thinkingDots.onclick = (e) => {
        e.stopPropagation();
        resetToIdle();
    };
}

function leaveRespondingMode() {
    // User falou novamente no modo escuta
    listenCircle.classList.remove("responding");
    listenCircle.classList.add("active");
    stopWave();
    clearResponse();

    // Volta waveform de escuta
    resizeCanvas();
    drawWave(false);

    listenTranscript.textContent = "Ouvindo...";
    setState("listening");

    // Mostra esferas novamente (some depois de capturar mensagem)
}

function clearResponse() {
    if (responseArea) {
        responseArea.classList.remove("visible", "thinking");
    }
    const thinkingDots = document.getElementById("thinkingDotsVertical");
    if (thinkingDots) {
        thinkingDots.classList.remove("visible");
    }
    clearTimeout(window.__yraIdleTimer);
}

function resetToIdle() {
    clearResponse();
    setTimeout(() => {
        showSpheres(false);
        startIdleAnimation();
        startPlaceholders();
        setState("idle");
    }, 400);
}

function submitFromVoice(text) {
    if (!text) return;
    listenTranscript.style.opacity = "0";
    setTimeout(() => { listenTranscript.textContent = ""; }, 300);
    submitMessage(text);
}

// Envio pelo input de texto
async function sendTextMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    if (voiceModeActive) deactivateVoiceMode();
    await submitMessage(text);
}

// Initialize message submission listeners when DOM is ready
function initMessageListeners() {
    if (!sendBtn || !messageInput || !responseArea) return;
    
    sendBtn.addEventListener("click", sendTextMessage);
    messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendTextMessage(); });

    // Clique na resposta para fechar manualmente (modo texto)
    responseArea.addEventListener("click", () => {
        if (!voiceModeActive) resetToIdle();
    });
    
    // Setup clicking on thinking dots to close response
    setupThinkingDotsClick();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMessageListeners);
} else {
    initMessageListeners();
}

// Redimensiona canvas quando a janela muda
window.addEventListener("resize", () => {
    if (listenCircle && listenCircle.classList.contains("visible")) resizeCanvas();
});
</script>
