<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yra Assistant</title>
<style>
:root {
    --primary-color: #2E7D32;
    --primary-light: #81C784;
    --primary-ultra-light: #E8F5E9;
    --primary-dark: #1B5E20;
    --text-dark: #2C3E50;
    --text-light: #7F8C8D;
    --text-xlight: #B0BEC5;
    --bg-light: #F9FBF9;
    --border-color: #EAEAEA;
    --white: #ffffff;
    --sidebar-width: 260px;
    --shadow-soft: 0 4px 24px rgba(46,125,50,.06);
    --shadow-card: 0 8px 32px rgba(46,125,50,.08);
    --radius-lg: 20px;
    --radius-md: 12px;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: var(--bg-light);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
}

/* ==================== MENU LATERAL (SIDEBAR) ==================== */
.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
    transition: width 0.3s ease;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding-left: 10px;
    cursor: default;
}

.scene-sidebar {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
}

.dot-sidebar {
    position: absolute;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    margin-left: -4.5px;
    margin-top: -4.5px;
    transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 2px 8px rgba(46,125,50,.15);
}

.dot-sidebar:nth-child(1) { background: #1B5E20; }
.dot-sidebar:nth-child(2) { background: #2E7D32; }
.dot-sidebar:nth-child(3) { background: #4CAF50; }
.dot-sidebar:nth-child(4) { background: #81C784; }

.brand-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--primary-dark);
    letter-spacing: 0.5px;
}
.brand-name span {
    color: var(--text-light);
    font-weight: 400;
}

.menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
}

.menu-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: var(--radius-md);
    transition: all 0.2s ease;
    position: relative;
}

.menu-item a:hover {
    background: var(--primary-ultra-light);
    color: var(--primary-color);
}

.menu-item.active a {
    background: var(--primary-ultra-light);
    color: var(--primary-color);
    font-weight: 600;
}

.menu-item.active a::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 24px;
    background: var(--primary-color);
    border-radius: 0 3px 3px 0;
}

.menu-item a svg {
    stroke: currentColor;
    fill: none;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
}

.sidebar-footer {
    padding-top: 20px;
    border-top: 1px solid var(--border-color);
    font-size: 11px;
    color: var(--text-xlight);
    text-align: center;
}
.sidebar-footer a {
    color: var(--text-xlight);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
}
.sidebar-footer a:hover {
    color: var(--primary-color);
}

/* ==================== ÁREA DE CONTEÚDO PRINCIPAL ==================== */
.main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 30px 40px 30px;
}

.top-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-shrink: 0;
}

.page-title h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dark);
}
.page-title p {
    font-size: 13px;
    color: var(--text-light);
}

.user-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-light);
}
.user-status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--primary-color);
    animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
}

/* ── CENTRO ───────────────────────────────────────────── */
.center-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 10px 0;
    position: relative;
}

/* Wrapper das esferas */
.scene-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
                opacity 0.6s ease,
                margin-top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.scene-wrapper.top-mode { margin-top: -180px; }
.scene-wrapper.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.85);
}

/* Esferas centrais */
.scene {
    position: relative;
    width: 160px;
    height: 160px;
}
.dot {
    position: absolute;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    margin-left: -16px;
    margin-top: -16px;
    transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                background 0.6s ease;
    box-shadow: 0 4px 16px rgba(46,125,50,.12);
}
.dot:nth-child(1){ background: #1B5E20; }
.dot:nth-child(2){ background: #2E7D32; }
.dot:nth-child(3){ background: #4CAF50; }
.dot:nth-child(4){ background: #81C784; }

/* Órbita pensando */
.scene.thinking .dot:nth-child(1){ animation:orbit1 1.4s ease-in-out infinite; }
.scene.thinking .dot:nth-child(2){ animation:orbit2 1.4s ease-in-out infinite; }
.scene.thinking .dot:nth-child(3){ animation:orbit3 1.4s ease-in-out infinite; }
.scene.thinking .dot:nth-child(4){ animation:orbit4 1.4s ease-in-out infinite; }

@keyframes orbit1 {
    0%  { transform:translate(  0px,-48px); }
    25% { transform:translate( 48px,  0px); }
    50% { transform:translate(  0px, 48px); }
    75% { transform:translate(-48px,  0px); }
    100%{ transform:translate(  0px,-48px); }
}
@keyframes orbit2 {
    0%  { transform:translate( 48px,  0px); }
    25% { transform:translate(  0px, 48px); }
    50% { transform:translate(-48px,  0px); }
    75% { transform:translate(  0px,-48px); }
    100%{ transform:translate( 48px,  0px); }
}
@keyframes orbit3 {
    0%  { transform:translate(  0px, 48px); }
    25% { transform:translate(-48px,  0px); }
    50% { transform:translate(  0px,-48px); }
    75% { transform:translate( 48px,  0px); }
    100%{ transform:translate(  0px, 48px); }
}
@keyframes orbit4 {
    0%  { transform:translate(-48px,  0px); }
    25% { transform:translate(  0px,-48px); }
    50% { transform:translate( 48px,  0px); }
    75% { transform:translate(  0px, 48px); }
    100%{ transform:translate(-48px,  0px); }
}

/* ── PLACEHOLDER ─────────────────────────────────────────── */
.subtitle-area {
    min-height: 28px;
    text-align: center;
    max-width: 420px;
}
.placeholder-text {
    font-size: 14px;
    color: var(--text-light);
    font-style: italic;
    opacity: 1;
    transition: opacity 0.5s ease;
}
.placeholder-text.fade { opacity: 0; }

/* ── CÍRCULO DE ESCUTA ATIVA ────────────────────────────── */
.listen-circle {
    position: relative;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
    transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.listen-circle.visible {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
}

.listen-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(46,125,50,.12);
    box-shadow: 0 0 0 0 rgba(46,125,50,.08);
    animation: none;
}
.listen-circle.active .listen-ring {
    animation: ringPulse 2s ease-in-out infinite;
}
.listen-circle.responding .listen-ring {
    border-color: transparent;
    background: conic-gradient(
        from 0deg,
        #2E7D32 0%,
        #81C784 30%,
        #F48FB1 60%,
        #E91E8C 80%,
        #2E7D32 100%
    );
    mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 0);
    animation: spinGradient 2.5s linear infinite;
}
@keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,125,50,.15); }
    50% { box-shadow: 0 0 0 16px rgba(46,125,50,0); }
}
@keyframes spinGradient {
    to { transform: rotate(360deg); }
}

#waveCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

.listen-bg {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: var(--white);
    box-shadow: inset 0 2px 12px rgba(46,125,50,.04);
}

/* ── TRANSCRIÇÃO ─────────────────────────────────────────── */
.transcript-text {
    font-size: 15px;
    color: var(--primary-color);
    font-weight: 500;
    text-align: center;
    max-width: 400px;
    opacity: 0;
    transition: opacity 0.4s ease;
    min-height: 24px;
}
.transcript-text.visible { opacity: 1; }

/* ── RESPOSTA ELEGANTE ────────────────────────────────────── */
.response-area {
    width: 100%;
    max-width: 620px;
    opacity: 0;
    transform: translateY(20px) scale(0.97);
    transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
                transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    display: none;
}
.response-area.visible {
    display: block;
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
}

.response-container {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(46,125,50,.06);
    position: relative;
    overflow: hidden;
}

.response-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #2E7D32, #81C784, #4CAF50);
    opacity: 0.6;
}

.response-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
}

.response-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--primary-ultra-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.response-avatar svg {
    stroke: var(--primary-color);
}

.response-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 0.3px;
    text-transform: uppercase;
}

.response-body {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-dark);
    max-height: 280px;
    overflow-y: auto;
    padding-right: 4px;
}
.response-body::-webkit-scrollbar {
    width: 4px;
}
.response-body::-webkit-scrollbar-thumb {
    background: var(--primary-ultra-light);
    border-radius: 2px;
}
.response-body::-webkit-scrollbar-track {
    background: transparent;
}

.response-body .typing-dots {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    padding: 4px 0;
}
.response-body .typing-dots span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--primary-light);
    animation: blink 1.2s ease-in-out infinite;
}
.response-body .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.response-body .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
}

.response-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
}

.response-footer .time {
    font-size: 11px;
    color: var(--text-xlight);
}

.response-footer .action-btn {
    background: none;
    border: none;
    color: var(--text-xlight);
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
}
.response-footer .action-btn:hover {
    color: var(--primary-color);
    background: var(--primary-ultra-light);
}

/* ── INPUT RODAPÉ ──────────────────────────────────────── */
.input-wrapper {
    width: 100%;
    max-width: 620px;
    flex-shrink: 0;
    padding: 10px 0 0;
}

.input-container {
    display: flex;
    align-items: center;
    background: var(--white);
    border-radius: 50px;
    padding: 6px 6px 6px 20px;
    box-shadow: var(--shadow-soft);
    border: 1.5px solid rgba(46,125,50,.06);
    transition: all 0.3s ease;
    gap: 4px;
}
.input-container:focus-within {
    border-color: var(--primary-color);
    box-shadow: 0 4px 24px rgba(46,125,50,.08);
}

.message-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 15px;
    color: var(--text-dark);
    padding: 10px 0;
    min-width: 0;
}
.message-input::placeholder {
    color: var(--text-xlight);
}

.input-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
}

/* Botão modo escuta */
.voice-mode-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--white);
    border: 1.5px solid rgba(46,125,50,.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    flex-shrink: 0;
}
.voice-mode-btn:hover {
    border-color: var(--primary-light);
    background: var(--primary-ultra-light);
}
.voice-mode-btn.active {
    background: var(--primary-color);
    border-color: var(--primary-color);
    box-shadow: 0 4px 16px rgba(46,125,50,.25);
}
.voice-mode-btn .btn-wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 16px;
}
.voice-mode-btn .btn-wave span {
    display: block;
    width: 2.5px;
    border-radius: 2px;
    background: var(--text-light);
    transition: background 0.25s;
}
.voice-mode-btn.active .btn-wave span {
    background: var(--white);
}
.voice-mode-btn .btn-wave span:nth-child(1) { height: 6px; }
.voice-mode-btn .btn-wave span:nth-child(2) { height: 12px; }
.voice-mode-btn .btn-wave span:nth-child(3) { height: 16px; }
.voice-mode-btn .btn-wave span:nth-child(4) { height: 10px; }
.voice-mode-btn .btn-wave span:nth-child(5) { height: 5px; }

.voice-mode-btn.active .btn-wave span:nth-child(1) { animation: bw 0.9s ease-in-out infinite; }
.voice-mode-btn.active .btn-wave span:nth-child(2) { animation: bw 0.9s ease-in-out infinite 0.15s; }
.voice-mode-btn.active .btn-wave span:nth-child(3) { animation: bw 0.9s ease-in-out infinite 0.05s; }
.voice-mode-btn.active .btn-wave span:nth-child(4) { animation: bw 0.9s ease-in-out infinite 0.2s; }
.voice-mode-btn.active .btn-wave span:nth-child(5) { animation: bw 0.9s ease-in-out infinite 0.1s; }
@keyframes bw {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
}

/* Botão enviar */
.send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--primary-ultra-light);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    flex-shrink: 0;
}
.send-btn svg {
    color: var(--primary-color);
    transition: transform 0.25s ease;
}
.send-btn:hover {
    background: var(--primary-color);
}
.send-btn:hover svg {
    color: var(--white);
    transform: translateX(2px);
}
.send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.send-btn:disabled:hover {
    background: var(--primary-ultra-light);
}
.send-btn:disabled:hover svg {
    color: var(--primary-color);
    transform: none;
}

/* ==================== RESPONSIVIDADE ==================== */
@media (max-width: 900px) {
    .sidebar {
        width: 72px;
        padding: 20px 12px;
    }
    .brand-name {
        display: none;
    }
    .brand {
        justify-content: center;
        padding-left: 0;
    }
    .menu-item a span {
        display: none;
    }
    .menu-item a {
        justify-content: center;
        padding: 12px;
    }
    .menu-item.active a::before {
        display: none;
    }
    .sidebar-footer {
        display: none;
    }
    .main-content {
        margin-left: 72px;
        padding: 20px;
    }
    .scene {
        width: 120px;
        height: 120px;
    }
    .dot {
        width: 24px;
        height: 24px;
        margin-left: -12px;
        margin-top: -12px;
    }
    @keyframes orbit1 {
        0%  { transform:translate(  0px,-36px); }
        25% { transform:translate( 36px,  0px); }
        50% { transform:translate(  0px, 36px); }
        75% { transform:translate(-36px,  0px); }
        100%{ transform:translate(  0px,-36px); }
    }
    @keyframes orbit2 {
        0%  { transform:translate( 36px,  0px); }
        25% { transform:translate(  0px, 36px); }
        50% { transform:translate(-36px,  0px); }
        75% { transform:translate(  0px,-36px); }
        100%{ transform:translate( 36px,  0px); }
    }
    @keyframes orbit3 {
        0%  { transform:translate(  0px, 36px); }
        25% { transform:translate(-36px,  0px); }
        50% { transform:translate(  0px,-36px); }
        75% { transform:translate( 36px,  0px); }
        100%{ transform:translate(  0px, 36px); }
    }
    @keyframes orbit4 {
        0%  { transform:translate(-36px,  0px); }
        25% { transform:translate(  0px,-36px); }
        50% { transform:translate( 36px,  0px); }
        75% { transform:translate(  0px, 36px); }
        100%{ transform:translate(-36px,  0px); }
    }
    .listen-circle {
        width: 120px;
        height: 120px;
    }
    .response-container {
        padding: 18px 20px;
    }
    .input-container {
        padding: 4px 4px 4px 16px;
    }
    .top-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
}

@media (max-width: 480px) {
    .main-content {
        padding: 14px;
    }
    .scene {
        width: 100px;
        height: 100px;
    }
    .dot {
        width: 20px;
        height: 20px;
        margin-left: -10px;
        margin-top: -10px;
    }
    @keyframes orbit1 {
        0%  { transform:translate(  0px,-30px); }
        25% { transform:translate( 30px,  0px); }
        50% { transform:translate(  0px, 30px); }
        75% { transform:translate(-30px,  0px); }
        100%{ transform:translate(  0px,-30px); }
    }
    @keyframes orbit2 {
        0%  { transform:translate( 30px,  0px); }
        25% { transform:translate(  0px, 30px); }
        50% { transform:translate(-30px,  0px); }
        75% { transform:translate(  0px,-30px); }
        100%{ transform:translate( 30px,  0px); }
    }
    @keyframes orbit3 {
        0%  { transform:translate(  0px, 30px); }
        25% { transform:translate(-30px,  0px); }
        50% { transform:translate(  0px,-30px); }
        75% { transform:translate( 30px,  0px); }
        100%{ transform:translate(  0px, 30px); }
    }
    @keyframes orbit4 {
        0%  { transform:translate(-30px,  0px); }
        25% { transform:translate(  0px,-30px); }
        50% { transform:translate( 30px,  0px); }
        75% { transform:translate(  0px, 30px); }
        100%{ transform:translate(-30px,  0px); }
    }
    .listen-circle {
        width: 100px;
        height: 100px;
    }
    .response-container {
        padding: 14px 16px;
    }
    .response-body {
        font-size: 14px;
    }
    .input-container {
        padding: 4px 4px 4px 12px;

<script>
/* ================================================================
   SIDEBAR — ANIMAÇÃO DAS BOLINHAS (PARADA E ELEGANTE)
================================================================ */
const sidebarDots = document.querySelectorAll(".dot-sidebar");
let sidebarAngle = 0;

function animateSidebarDots() {
    const positions = [
        { x: 0, y: -12 },
        { x: 12, y: 0 },
        { x: 0, y: 12 },
        { x: -12, y: 0 }
    ];

    // Movimento suave e sincronizado com as esferas centrais
    sidebarDots.forEach((dot, i) => {
        const angle = (i / sidebarDots.length) * Math.PI * 2 + sidebarAngle;
        const radius = 10;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        dot.style.transform = `translate(${x}px, ${y}px)`;
    });

    sidebarAngle += 0.008;
    requestAnimationFrame(animateSidebarDots);
}

// Inicia a animação suave
animateSidebarDots();

/* ================================================================
   PLACEHOLDERS
================================================================ */
const PLACEHOLDERS = [
    "Estudando o mercado cripto...",
    "Memorizando as leis de Newton...",
    "Calculando a entropia do universo...",
    "Lendo Kant por prazer. Sério.",
    "Treinando para a Olimpíada de Xadrez...",
    "Analisando padrões nas estrelas...",
    "Bebendo café virtual. ☕",
    "Processando 847 abas abertas...",
    "Relendo 'O Guia do Mochileiro' pela 42ª vez...",
    "Aprendendo suaíli por curiosidade...",
    "Verificando se gatos entendem física quântica...",
    "Simulando universos paralelos...",
    "Otimizando algoritmos de procrastinação...",
    "Traduzindo emojis para latim...",
    "Pesquisando por vida inteligente. Ainda buscando.",
    "Atualizando o mapa mental do cosmos...",
    "Perguntando por que o céu é azul. Ainda.",
    "Refatorando a teoria do tudo...",
    "Sincronizando com o fuso horário de Marte...",
    "Lendo sobre buracos negros. Por diversão.",
];

const placeholderEl = document.getElementById("placeholderText");
const listenTranscript = document.getElementById("listenTranscript");

let phIndex = Math.floor(Math.random() * PLACEHOLDERS.length);
let phTimeout = null;
let isIdle = true;

function showNextPlaceholder() {
    if (!isIdle) return;
    placeholderEl.classList.add("fade");
    setTimeout(() => {
        phIndex = (phIndex + 1) % PLACEHOLDERS.length;
        placeholderEl.textContent = PLACEHOLDERS[phIndex];
        placeholderEl.classList.remove("fade");
    }, 500);
    phTimeout = setTimeout(showNextPlaceholder, 3500);
}

function startPlaceholders() {
    isIdle = true;
    placeholderEl.style.display = "block";
    placeholderEl.classList.remove("fade");
    clearTimeout(phTimeout);
    showNextPlaceholder();
}

function stopPlaceholders() {
    isIdle = false;
    clearTimeout(phTimeout);
    placeholderEl.classList.add("fade");
    setTimeout(() => { placeholderEl.style.display = "none"; }, 500);
}

setTimeout(startPlaceholders, 800);

/* ================================================================
   ESFERAS CENTRAIS
================================================================ */
const dots = document.querySelectorAll(".dot");
const scene = document.getElementById("scene");
const sceneWrapper = document.getElementById("sceneWrapper");

let sphereInterval = null;

function startIdleAnimation() {
    scene.classList.remove("thinking");
    clearInterval(sphereInterval);
    // Movimento suave e aleatório
    sphereInterval = setInterval(() => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 48;
        const positions = [
            { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius },
            { x: Math.cos(angle + Math.PI / 2) * radius, y: Math.sin(angle + Math.PI / 2) * radius },
            { x: Math.cos(angle + Math.PI) * radius, y: Math.sin(angle + Math.PI) * radius },
            { x: Math.cos(angle + 3 * Math.PI / 2) * radius, y: Math.sin(angle + 3 * Math.PI / 2) * radius }
        ];
        dots.forEach((d, i) => {
            d.style.transform = `translate(${positions[i].x}px, ${positions[i].y}px)`;
            d.style.animation = "";
        });
    }, 1200);
}

function startThinkingAnimation() {
    clearInterval(sphereInterval);
    dots.forEach(d => { d.style.transform = ""; d.style.animation = ""; });
    requestAnimationFrame(() => {
        requestAnimationFrame(() => { scene.classList.add("thinking"); });
    });
}

function hideSpheres() {
    sceneWrapper.classList.add("hidden");
}

function showSpheres(atTop = false) {
    sceneWrapper.classList.remove("hidden");
    if (atTop) {
        sceneWrapper.classList.add("top-mode");
    } else {
        sceneWrapper.classList.remove("top-mode");
    }
}

startIdleAnimation();

/* ================================================================
   WAVEFORM — CANVAS
================================================================ */
const listenCircle = document.getElementById("listenCircle");
const waveCanvas = document.getElementById("waveCanvas");
const waveCtx = waveCanvas.getContext("2d");

let audioCtx = null;
let analyser = null;
let micSource = null;
let waveData = null;
let waveRAF = null;
let isWaveReady = false;

async function setupAudio() {
    if (isWaveReady) return true;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        waveData = new Uint8Array(analyser.frequencyBinCount);
        micSource = audioCtx.createMediaStreamSource(stream);
        micSource.connect(analyser);
        isWaveReady = true;
        return true;
    } catch (e) {
        console.error("Mic:", e);
        return false;
    }
}

function resizeCanvas() {
    const size = listenCircle.offsetWidth;
    waveCanvas.width = size;
    waveCanvas.height = size;
}

function drawWave(isResponding = false) {
    cancelAnimationFrame(waveRAF);
    const size = waveCanvas.width;
    const cx = size / 2;
    const cy = size / 2;
    const r = size * 0.28;

    function frame() {
        waveRAF = requestAnimationFrame(frame);
        waveCtx.clearRect(0, 0, size, size);

        if (isResponding) {
            const now = Date.now() / 1000;
            const bars = 40;
            for (let i = 0; i < bars; i++) {
                const angle = (i / bars) * Math.PI * 2 + now * 1.2;
                const t = ((Math.sin(angle * 3 + now * 2) + 1) / 2);
                const rc = Math.round(46 + (233 - 46) * t);
                const gc = Math.round(125 + (30 - 125) * t);
                const bc = Math.round(50 + (139 - 50) * t);
                const len = r * 0.2 + r * 0.2 * Math.abs(Math.sin(angle * 4 + now * 3));

                const x1 = cx + Math.cos(angle) * r;
                const y1 = cy + Math.sin(angle) * r;
                const x2 = cx + Math.cos(angle) * (r + len);
                const y2 = cy + Math.sin(angle) * (r + len);

                waveCtx.beginPath();
                waveCtx.moveTo(x1, y1);
                waveCtx.lineTo(x2, y2);
                waveCtx.strokeStyle = `rgba(${rc},${gc},${bc},0.8)`;
                waveCtx.lineWidth = 2.5;
                waveCtx.lineCap = "round";
                waveCtx.stroke();
            }
        } else {
            if (analyser) analyser.getByteFrequencyData(waveData);

            const bars = 36;
            const step = Math.floor(waveData ? waveData.length / bars : 1);

            for (let i = 0; i < bars; i++) {
                const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
                const raw = waveData ? waveData[i * step] : 0;
                const norm = raw / 255;
                const len = r * 0.1 + r * 0.5 * norm;

                const x1 = cx + Math.cos(angle) * (r - 4);
                const y1 = cy + Math.sin(angle) * (r - 4);
                const x2 = cx + Math.cos(angle) * (r - 4 + len);
                const y2 = cy + Math.sin(angle) * (r - 4 + len);

                const alpha = 0.3 + 0.7 * norm;
                waveCtx.beginPath();
                waveCtx.moveTo(x1, y1);
                waveCtx.lineTo(x2, y2);
                waveCtx.strokeStyle = `rgba(46,125,50,${alpha})`;
                waveCtx.lineWidth = 2.5;
                waveCtx.lineCap = "round";
                waveCtx.stroke();
            }
        }
    }

    frame();
}

function stopWave() {
    cancelAnimationFrame(waveRAF);
    waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
}

/* ================================================================
   MODO ESCUTA ATIVA
================================================================ */
const voiceModeBtn = document.getElementById("voiceModeBtn");
let voiceModeActive = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isRecognizing = false;
let silenceTimer = null;
const SILENCE_MS = 2000;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = "pt-BR";

    recognition.onresult = (event) => {
        if (!voiceModeActive) return;
        let interim = "",
            final = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) final += event.results[i][0].transcript;
            else interim += event.results[i][0].transcript;
        }

        const text = final || interim;
        listenTranscript.textContent = text;
        listenTranscript.style.opacity = "1";

        if (APP_STATE === "responding") {
            leaveRespondingMode();
        }

        clearTimeout(silenceTimer);
        if (final) {
            silenceTimer = setTimeout(() => {
                if (voiceModeActive && APP_STATE === "listening") {
                    submitFromVoice(final.trim());
                }
            }, SILENCE_MS);
        }
    };

    recognition.onerror = (e) => {
        if (e.error === "no-speech") return;
        console.error("Speech error:", e.error);
        if (e.error === "not-allowed") {
            alert("Permissão de microfone negada.");
            deactivateVoiceMode();
        }
    };

    recognition.onend = () => {
        isRecognizing = false;
        if (voiceModeActive && APP_STATE !== "thinking") {
            try { recognition.start();
                isRecognizing = true; } catch (_) {}
        }
    };
}

async function activateVoiceMode() {
    voiceModeActive = true;
    voiceModeBtn.classList.add("active");

    const ok = await setupAudio();
    if (!ok) { deactivateVoiceMode(); return; }

    hideSpheres();
    stopPlaceholders();
    clearResponse();

    resizeCanvas();
    listenCircle.classList.add("visible", "active");
    listenTranscript.textContent = "Ouvindo...";
    listenTranscript.style.opacity = "1";

    setState("listening");
    drawWave(false);

    if (recognition && !isRecognizing) {
        try { recognition.start();
            isRecognizing = true; } catch (_) {}
    }
}

function deactivateVoiceMode() {
    voiceModeActive = false;
    isRecognizing = false;
    voiceModeBtn.classList.remove("active");
    clearTimeout(silenceTimer);

    if (recognition) try { recognition.stop(); } catch (_) {}

    listenCircle.classList.remove("visible", "active", "responding");
    listenTranscript.style.opacity = "0";
    stopWave();

    clearResponse();
    showSpheres(false);
    startIdleAnimation();
    startPlaceholders();
    setState("idle");
}

voiceModeBtn.addEventListener("click", () => {
    if (voiceModeActive) {
        deactivateVoiceMode();
    } else {
        activateVoiceMode();
    }
});

/* ================================================================
   ESTADO GLOBAL E SUBMISSÃO
================================================================ */
let APP_STATE = "idle";

function setState(newState) {
    APP_STATE = newState;
}

const sendBtn = document.getElementById("sendBtn");
const messageInput = document.getElementById("messageInput");
const responseArea = document.getElementById("responseArea");
const responseBody = document.getElementById("responseBody");
const responseTime = document.getElementById("responseTime");
const closeResponseBtn = document.getElementById("closeResponseBtn");

let isBusy = false;

async function submitMessage(text) {
    if (isBusy || !text) return;

    const apiKey = window.__yraApiKey;
    if (!apiKey) {
        showResponseText("⚠️ Nenhuma API key encontrada. Configure em Settings.");
        return;
    }

    isBusy = true;
    messageInput.value = "";
    messageInput.disabled = true;
    sendBtn.disabled = true;
    setState("thinking");

    if (voiceModeActive) {
        listenCircle.classList.remove("active", "responding");
        stopWave();
        listenTranscript.style.opacity = "0";
        showSpheres(true);
        startThinkingAnimation();
    } else {
        stopPlaceholders();
        showSpheres(true);
        startThinkingAnimation();
    }

    // Typing indicator
    responseArea.classList.add("visible");
    responseBody.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    try {
        const endpoint =
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite-preview-06-17:generateContent?key=${apiKey}`;
        const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ role: "user", parts: [{ text }] }],
                generationConfig: { temperature: 0.85, maxOutputTokens: 512 }
            })
        });
        const data = await res.json();
        const reply = data.error ?
            `⚠️ ${data.error.message}` :
            (data.candidates?.[0]?.content?.parts?.[0]?.text || "Sem resposta.");

        showResponseText(reply);

    } catch (err) {
        console.error(err);
        showResponseText("⚠️ Não foi possível conectar. Tente novamente.");
    } finally {
        isBusy = false;
        messageInput.disabled = false;
        sendBtn.disabled = false;
    }
}

function showResponseText(text) {
    responseBody.textContent = text;
    responseTime.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    responseArea.classList.add("visible");
    setState("responding");

    if (voiceModeActive) {
        sceneWrapper.classList.add("hidden");

        setTimeout(() => {
            listenCircle.classList.add("visible", "responding");
            listenCircle.classList.remove("active");
            listenTranscript.textContent = "Resposta pronta — fale para continuar...";
            listenTranscript.style.opacity = "1";
            resizeCanvas();
            drawWave(true);

            if (recognition && !isRecognizing) {
                try { recognition.start();
                    isRecognizing = true; } catch (_) {}
            }
        }, 300);
    } else {
        startIdleAnimation();
        clearTimeout(window.__yraIdleTimer);
        window.__yraIdleTimer = setTimeout(resetToIdle, 14000);
    }
}

function leaveRespondingMode() {
    listenCircle.classList.remove("responding");
    listenCircle.classList.add("active");
    stopWave();
    clearResponse();
    resizeCanvas();
    drawWave(false);
    listenTranscript.textContent = "Ouvindo...";
    setState("listening");
}

function clearResponse() {
    responseArea.classList.remove("visible");
    clearTimeout(window.__yraIdleTimer);
}

function resetToIdle() {
    clearResponse();
    setTimeout(() => {
        showSpheres(false);
        startIdleAnimation();
        startPlaceholders();
        setState("idle");
    }, 400);
}

function submitFromVoice(text) {
    if (!text) return;
    listenTranscript.style.opacity = "0";
    setTimeout(() => { listenTranscript.textContent = ""; }, 300);
    submitMessage(text);
}

async function sendTextMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    if (voiceModeActive) deactivateVoiceMode();
    await submitMessage(text);
}

sendBtn.addEventListener("click", sendTextMessage);
messageInput.addEventListener("keypress", e => { if (e.key === "Enter") sendTextMessage(); });

closeResponseBtn.addEventListener("click", () => {
    if (!voiceModeActive) resetToIdle();
});

window.addEventListener("resize", () => {
    if (listenCircle.classList.contains("visible")) resizeCanvas();
});
</script>

</body>
</html>
