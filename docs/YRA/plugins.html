<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yra Assistant - Plugins</title>
<style>
:root {
    --primary-color: #2E7D32;
    --primary-light: #81C784;
    --primary-ultra-light: #E8F5E9;
    --text-dark: #2C3E50;
    --text-light: #7F8C8D;
    --bg-light: #F9FBF9;
    --border-color: #EAEAEA;
    --white: #ffffff;
    --sidebar-width: 260px;
}

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: var(--bg-light);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
}

/* ==================== MENU LATERAL (SIDEBAR) ==================== */
.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding-left: 10px;
}

.scene-sidebar {
    position: relative;
    width: 40px;
    height: 40px;
}

.dot-sidebar {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    margin-left: -4px;
    margin-top: -4px;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.dot-sidebar:nth-child(1) { background: #1B5E20; }
.dot-sidebar:nth-child(2) { background: #2E7D32; }
.dot-sidebar:nth-child(3) { background: #4CAF50; }
.dot-sidebar:nth-child(4) { background: #81C784; }

.brand-name {
    font-size: 18px;
    font-weight: 600;
    color: #1B5E20;
    letter-spacing: 0.5px;
}

.menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.menu-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.2s ease;
}

.menu-item a:hover, .menu-item.active a {
    background: var(--primary-ultra-light);
    color: var(--primary-color);
}

.menu-item a svg {
    stroke: currentColor;
    fill: none;
    width: 20px;
    height: 20px;
}

/* ==================== ÁREA DE CONTEÚDO PRINCIPAL ==================== */
.main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 40px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.top-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    gap: 20px;
}

.search-container {
    position: relative;
    width: 100%;
    max-width: 450px;
}

.search-input {
    width: 100%;
    padding: 12px 16px 12px 45px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    background: var(--white);
    outline: none;
    font-size: 14px;
    transition: all 0.2s ease;
}

.search-input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.08);
}

.search-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    pointer-events: none;
}

.user-area {
    display: flex;
    align-items: center;
    gap: 20px;
}

.user-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--text-dark);
}

.btn-logout {
    background: none;
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-light);
    transition: 0.2s;
}
.btn-logout:hover {
    background: #f5f5f5;
    color: var(--text-dark);
}

.btn-chat {
    background: var(--primary-color);
    color: var(--white);
    padding: 10px 24px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s ease;
    box-shadow: 0 4px 12px rgba(46, 125, 50, 0.15);
}

.btn-chat:hover {
    background: #1B5E20;
}

/* Banner de Destaque (Card Especial) */
.featured-card {
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
    border-radius: 16px;
    padding: 35px;
    color: var(--white);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(27, 94, 32, 0.15);
}

.featured-info {
    max-width: 60%;
}

.featured-tag {
    background: rgba(255, 255, 255, 0.18);
    color: var(--white);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 15px;
}

.featured-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 10px;
    line-height: 1.2;
}

.featured-desc {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 20px;
    line-height: 1.5;
}

.btn-featured {
    background: var(--white);
    color: var(--primary-color);
    border: none;
    padding: 11px 24px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s ease;
}

.btn-featured:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.featured-graphic {
    font-size: 90px;
    opacity: 0.15;
    position: absolute;
    right: 40px;
    bottom: -10px;
    user-select: none;
}

/* Catálogo e Grid de Cards */
.catalog-section h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 20px;
}

.plugins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
}

/* Card Individual de Plugin */
.plugin-card {
    background: var(--white);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
}

.plugin-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
    border-color: var(--primary-light);
}

.plugin-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.plugin-icon-box {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--primary-ultra-light);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary-color);
    font-size: 20px;
    font-weight: bold;
    flex-shrink: 0;
}

.plugin-meta {
    overflow: hidden;
}

.plugin-category {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--primary-color);
    margin-bottom: 3px;
    letter-spacing: 0.5px;
}

.plugin-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.plugin-body {
    font-size: 13px;
    color: var(--text-light);
    line-height: 1.4;
    margin-bottom: 20px;
    height: 56px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.plugin-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border-color);
    padding-top: 15px;
}

.plugin-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: #F39C12;
}

.plugin-status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
}

.plugin-status-badge.active {
    background: var(--primary-ultra-light);
    color: var(--primary-color);
}

.plugin-status-badge.inactive {
    background: #F5F5F5;
    color: var(--text-light);
}

/* ==================== MODAL DE DETALHES ==================== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
}

.modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
}

.modal-box {
    background: var(--white);
    width: 90%;
    max-width: 550px;
    border-radius: 20px;
    padding: 35px;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.3s ease;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
}

.modal-overlay.open .modal-box {
    transform: translateY(0);
}

.modal-close-btn {
    position: absolute;
    top: 25px;
    right: 25px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-light);
    transition: color 0.2s ease;
}

.modal-close-btn:hover {
    color: var(--text-dark);
}

.modal-header {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 25px;
}

.modal-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: var(--primary-ultra-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--primary-color);
}

.modal-title-desc h3 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-dark);
}

.modal-title-desc p {
    font-size: 12px;
    color: var(--primary-color);
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 2px;
}

.modal-details {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 30px;
}

.modal-action-row {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
}

.btn-secondary {
    background: #F5F5F5;
    border: none;
    color: var(--text-dark);
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s ease;
}

.btn-secondary:hover {
    background: #EAEAEA;
}

.btn-action {
    background: var(--primary-color);
    border: none;
    color: var(--white);
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s ease;
}

.btn-action:hover {
    background: #1B5E20;
}

.btn-action.desativar {
    background: #c0392b;
}
.btn-action.desativar:hover {
    background: #a93226;
}

/* Responsividade Geral */
@media (max-width: 900px) {
    .sidebar {
        width: 70px;
        padding: 20px 10px;
    }
    .brand-name, .menu-item span {
        display: none;
    }
    .brand {
        justify-content: center;
        padding-left: 0;
    }
    .main-content {
        margin-left: 70px;
        padding: 20px;
    }
    .featured-info {
        max-width: 100%;
    }
    .featured-graphic {
        display: none;
    }
    .user-area .user-name {
        display: none;
    }
}
</style>
</head>

{

        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",

<script type="module">
// ============================
// IMPORTS DO FIREBASE
// ============================
import { initializeApp } from "firebase/app";
import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "firebase/auth";
import {
    getFirestore,
    collection,
    doc,
    getDoc,
    setDoc,
    updateDoc,
    arrayUnion,
    arrayRemove,
    onSnapshot,
    serverTimestamp
} from "firebase/firestore";

// ============================
// CONFIGURAÇÃO DO FIREBASE
// ============================
const firebaseConfig = {
    apiKey: "AIzaSyCvZrOVysl6iPOkqGNhUbWtmgRPkfxI1EA",
    authDomain: "yra-syra.firebaseapp.com",
    projectId: "yra-syra",
    storageBucket: "yra-syra.firebasestorage.app",
    messagingSenderId: "555145505684",
    appId: "1:555145505684:web:aa1ef14072653e41057d81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ============================
// ELEMENTOS DOM
// ============================
const pluginsGrid = document.getElementById("pluginsGrid");
const searchInput = document.getElementById("searchInput");
const modal = document.getElementById("pluginModal");
const modalIcon = document.getElementById("modalIcon");
const modalTitle = document.getElementById("modalTitle");
const modalCategory = document.getElementById("modalCategory");
const modalDescription = document.getElementById("modalDescription");
const modalPrimaryAction = document.getElementById("modalPrimaryAction");
const closeModalBtn = document.getElementById("closeModalBtn");
const closeModalActionBtn = document.getElementById("closeModalActionBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userNameDisplay = document.getElementById("userNameDisplay");

// Banner
const featuredTag = document.getElementById("featuredTag");
const featuredTitle = document.getElementById("featuredTitle");
const featuredDesc = document.getElementById("featuredDesc");
const featuredGraphic = document.getElementById("featuredGraphic");
const featuredBtn = document.getElementById("featuredBtn");

// ============================
// ESTADO GLOBAL
// ============================
let currentUserId = null;
let allPlugins = [];          // array de objetos {id, ...data}
let currentSelectedPluginId = null;

// ============================
// FUNÇÕES DE FIRESTORE
// ============================

// Referência à coleção Plugins
function getPluginsCollection() {
    return collection(db, "Plugins");
}

// Verificar se o usuário tem o plugin ativo
function isPluginActive(plugin) {
    if (!currentUserId) return false;
    const users = plugin.associated_users || [];
    return users.includes(currentUserId);
}

// Ativar/Desativar plugin (adicionar/remover UID do array)
async function togglePlugin(pluginId, active) {
    if (!currentUserId) return;
    const pluginRef = doc(db, "Plugins", pluginId);
    try {
        if (active) {
            // Adicionar UID ao array
            await updateDoc(pluginRef, {
                associated_users: arrayUnion(currentUserId),
                updated_at: serverTimestamp()
            });
        } else {
            // Remover UID do array
            await updateDoc(pluginRef, {
                associated_users: arrayRemove(currentUserId),
                updated_at: serverTimestamp()
            });
        }
    } catch (error) {
        console.error("Erro ao atualizar plugin:", error);
        alert("Não foi possível alterar o status do plugin.");
    }
}

// ============================
// ESCUTAR PLUGINS EM TEMPO REAL
// ============================

function subscribeToPlugins() {
    const pluginsRef = getPluginsCollection();
    const unsubscribe = onSnapshot(pluginsRef, (snapshot) => {
        allPlugins = [];
        snapshot.forEach((doc) => {
            const data = doc.data();
            allPlugins.push({
                id: doc.id,
                ...data,
                // Garantir que associated_users seja um array
                associated_users: data.associated_users || []
            });
        });
        // Atualizar a interface
        renderPlugins(searchInput.value);
        updateFeaturedCard();
    }, (error) => {
        console.error("Erro ao carregar plugins:", error);
        alert("Erro ao carregar plugins. Verifique sua conexão.");
    });
    return unsubscribe;
}

// ============================
// RENDERIZAÇÃO DOS PLUGINS
// ============================

function renderPlugins(filterText = "") {
    pluginsGrid.innerHTML = "";

    const filtered = allPlugins.filter(p =>
        p.name.toLowerCase().includes(filterText.toLowerCase()) ||
        (p.description && p.description.toLowerCase().includes(filterText.toLowerCase()))
    );

    if (filtered.length === 0) {
        pluginsGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-light); padding: 30px;">Nenhum plugin encontrado para sua pesquisa.</p>`;
        return;
    }

    filtered.forEach(plugin => {
        const active = isPluginActive(plugin);
        const card = document.createElement("div");
        card.className = "plugin-card";
        card.onclick = () => openModal(plugin.id);

        card.innerHTML = `
            <div>
                <div class="plugin-header">
                    <div class="plugin-icon-box">${plugin.icon || '🧩'}</div>
                    <div class="plugin-meta">
                        <div class="plugin-category">${plugin.category || 'Geral'}</div>
                        <h3 class="plugin-name" title="${plugin.name}">${plugin.name}</h3>
                    </div>
                </div>
                <div class="plugin-body">
                    ${plugin.description || 'Sem descrição.'}
                </div>
            </div>
            <div class="plugin-footer">
                <div class="plugin-rating">
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    <span>${plugin.rating || '4.5'}</span>
                </div>
                <span class="plugin-status-badge ${active ? 'active' : 'inactive'}">
                    ${active ? 'Ativo' : 'Inativo'}
                </span>
            </div>
        `;
        pluginsGrid.appendChild(card);
    });
}

// ============================
// BANNER DE DESTAQUE (primeiro plugin ativo ou primeiro da lista)
// ============================

function updateFeaturedCard() {
    if (allPlugins.length === 0) {
        featuredTitle.innerText = "Nenhum plugin disponível";
        featuredDesc.innerText = "Volte em breve para novas integrações.";
        featuredGraphic.innerText = "🧩";
        featuredBtn.style.display = "none";
        return;
    }

    // Escolhe o primeiro plugin ativo do usuário, senão o primeiro da lista
    let featured = allPlugins.find(p => isPluginActive(p));
    if (!featured) featured = allPlugins[0];

    featuredTitle.innerText = featured.name || "Plugin";
    featuredDesc.innerText = featured.description || "Conecte este plugin ao seu assistente.";
    featuredGraphic.innerText = featured.icon || "🚀";
    featuredBtn.style.display = "inline-block";
    featuredBtn.onclick = () => openModal(featured.id);
}

// ============================
// MODAL DE DETALHES
// ============================

function openModal(pluginId) {
    const plugin = allPlugins.find(p => p.id === pluginId);
    if (!plugin) return;

    currentSelectedPluginId = pluginId;
    modalIcon.innerText = plugin.icon || '🧩';
    modalTitle.innerText = plugin.name || 'Sem nome';
    modalCategory.innerText = plugin.category || 'Geral';
    modalDescription.innerText = plugin.description || 'Sem descrição detalhada.';
    const active = isPluginActive(plugin);
    updateModalButton(active);
    modal.classList.add("open");
}

function updateModalButton(isActive) {
    if (isActive) {
        modalPrimaryAction.innerText = "Desativar";
        modalPrimaryAction.className = "btn-action desativar";
    } else {
        modalPrimaryAction.innerText = "Ativar";
        modalPrimaryAction.className = "btn-action";
    }
}

// Ação do botão principal do modal
modalPrimaryAction.onclick = async () => {
    if (!currentSelectedPluginId) return;
    const plugin = allPlugins.find(p => p.id === currentSelectedPluginId);
    if (!plugin) return;

    const active = isPluginActive(plugin);
    await togglePlugin(currentSelectedPluginId, !active);
    // O snapshot atualizará a lista automaticamente
    closeModal();
};

function closeModal() {
    modal.classList.remove("open");
    currentSelectedPluginId = null;
}

// Fechar modal com botões
closeModalBtn.onclick = closeModal;
closeModalActionBtn.onclick = closeModal;
window.onclick = (e) => {
    if (e.target === modal) closeModal();
};

// ============================
// BUSCA EM TEMPO REAL
// ============================

searchInput.addEventListener("input", (e) => {
    renderPlugins(e.target.value);
});

// ============================
// LOGOUT
// ============================

logoutBtn.addEventListener("click", async () => {
    try {
        await signOut(auth);
        // Redirecionamento feito pelo onAuthStateChanged
    } catch (error) {
        console.error("Erro ao sair:", error);
    }
});

// ============================
// AUTENTICAÇÃO
// ============================

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "index.html";
        return;
    }

    currentUserId = user.uid;
    userNameDisplay.textContent = user.displayName || user.email || "Usuário";

    // Verificar/criar documento do usuário em Users (alinhado com miu.py)
    try {
        const userDocRef = doc(db, "Users", currentUserId);
        const userSnap = await getDoc(userDocRef);
        if (!userSnap.exists()) {
            await setDoc(userDocRef, {
                username: user.displayName || "",
                email: user.email || "",
                phone: "",
                birth_date: "",
                security_code: "",
                monthly_cost: 0.0,
                status: "active",
                role: "user",
                created_at: serverTimestamp(),
                updated_at: serverTimestamp()
            });
        }
    } catch (error) {
        console.warn("Erro ao verificar/criar documento do usuário:", error);
    }

    // Iniciar escuta dos plugins
    subscribeToPlugins();
});

// ============================
// ANIMAÇÃO DAS BOLINHAS (SIDEBAR)
// ============================
const sidebarDots = document.querySelectorAll(".dot-sidebar");
const positions = [
    {x: 0, y: -10}, 
    {x: 10, y: 0}, 
    {x: 0, y: 10}, 
    {x: -10, y: 0}
];

function shuffleArray(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startSidebarAnimation() {
    setInterval(() => {
        const p = shuffleArray(positions);
        sidebarDots.forEach((dot, i) => {
            dot.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
        });
    }, 1000);
}

startSidebarAnimation();

</script>
</body>
