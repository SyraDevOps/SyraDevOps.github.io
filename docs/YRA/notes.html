<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yra Assistant - Notas</title>
<style>
:root {
    --primary-color: #2E7D32;
    --primary-light: #81C784;
    --primary-ultra-light: #E8F5E9;
    --text-dark: #2C3E50;
    --text-light: #7F8C8D;
    --bg-light: #F9FBF9;
    --border-color: #EAEAEA;
    --white: #ffffff;
    --sidebar-width: 260px;
}

* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: var(--bg-light);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
}

/* ==================== MENU LATERAL (SIDEBAR) ==================== */
.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 100;
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    padding-left: 10px;
}

.scene-sidebar {
    position: relative;
    width: 40px;
    height: 40px;
}

.dot-sidebar {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    left: 50%;
    top: 50%;
    margin-left: -4px;
    margin-top: -4px;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.dot-sidebar:nth-child(1) { background: #1B5E20; }
.dot-sidebar:nth-child(2) { background: #2E7D32; }
.dot-sidebar:nth-child(3) { background: #4CAF50; }
.dot-sidebar:nth-child(4) { background: #81C784; }

.brand-name {
    font-size: 18px;
    font-weight: 600;
    color: #1B5E20;
    letter-spacing: 0.5px;
}

.menu-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.menu-item a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.2s ease;
}

.menu-item a:hover, .menu-item.active a {
    background: var(--primary-ultra-light);
    color: var(--primary-color);
}

.menu-item a svg {
    stroke: currentColor;
    fill: none;
    width: 20px;
    height: 20px;
}

/* ==================== ÁREA DE CONTEÚDO PRINCIPAL ==================== */
.main-content {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 40px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.top-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.page-title h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-dark);
}

.page-title p {
    font-size: 13px;
    color: var(--text-light);
}

.user-area {
    display: flex;
    align-items: center;
    gap: 20px;
}

.user-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--text-dark);
}

.btn-logout {
    background: none;
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-light);
    transition: 0.2s;
}
.btn-logout:hover {
    background: #f5f5f5;
    color: var(--text-dark);
}

/* Estrutura das Notas (Split) */
.notes-container {
    display: flex;
    flex: 1;
    background: var(--white);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    height: calc(100vh - 150px);
}

/* Coluna Esquerda: Lista de Notas */
.notes-list-pane {
    width: 300px;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    background: #FAFAFA;
}

.notes-pane-header {
    padding: 20px;
    border-bottom: 1px solid var(--border-color);
}

.btn-new-note {
    width: 100%;
    background: var(--primary-color);
    color: var(--white);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s ease;
}

.btn-new-note:hover {
    background: #1B5E20;
}

.notes-search {
    margin-top: 15px;
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s ease;
}

.notes-search:focus {
    border-color: var(--primary-color);
}

.notes-list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.note-item {
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s ease;
}

.note-item:hover {
    background: rgba(46, 125, 50, 0.05);
}

.note-item.active {
    background: var(--primary-ultra-light);
    border-left: 4px solid var(--primary-color);
}

.note-item-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dark);
    margin-bottom: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.note-item-snippet {
    font-size: 12px;
    color: var(--text-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* Coluna Direita: Editor de Notas */
.note-editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 30px;
    background: var(--white);
}

.editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.editor-status {
    font-size: 12px;
    color: var(--text-light);
}

.editor-actions {
    display: flex;
    gap: 10px;
}

.btn-editor {
    border: none;
    background: none;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    color: var(--text-light);
    transition: all 0.2s ease;
}

.btn-editor:hover {
    background: #F5F5F5;
    color: var(--text-dark);
}

.btn-editor-delete:hover {
    background: #FCE4D6;
    color: #c0392b;
}

.note-title-input {
    font-size: 22px;
    font-weight: 600;
    border: none;
    outline: none;
    width: 100%;
    margin-bottom: 20px;
    color: var(--text-dark);
}

.note-textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    width: 100%;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-dark);
}

.empty-editor-message {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--text-light);
}

.empty-editor-message svg {
    margin-bottom: 15px;
    stroke: var(--border-color);
}

/* Responsividade */
@media (max-width: 900px) {
    .sidebar {
        width: 70px;
        padding: 20px 10px;
    }
    .brand-name, .menu-item span {
        display: none;
    }
    .brand {
        justify-content: center;
    }
    .main-content {
        margin-left: 70px;
        padding: 20px;
    }
    .user-area .user-name {
        display: none;
    }
}
</style>
</head>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
// ============================
// IMPORTS DO FIREBASE
// ============================
import { initializeApp } from "firebase/app";
import { 
    getAuth, 
    onAuthStateChanged, 
    signOut 
} from "firebase/auth";
import {
    getFirestore,
    collection,
    doc,
    addDoc,
    updateDoc,
    deleteDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp,
    getDoc
} from "firebase/firestore";

// ============================
// CONFIGURAÇÃO DO FIREBASE
// ============================
const firebaseConfig = {
    apiKey: "AIzaSyCvZrOVysl6iPOkqGNhUbWtmgRPkfxI1EA",
    authDomain: "yra-syra.firebaseapp.com",
    projectId: "yra-syra",
    storageBucket: "yra-syra.firebasestorage.app",
    messagingSenderId: "555145505684",
    appId: "1:555145505684:web:aa1ef14072653e41057d81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ============================
// ELEMENTOS DOM
// ============================
const notesListContainer = document.getElementById("notesListContainer");
const emptyEditorState = document.getElementById("emptyEditorState");
const editorContent = document.getElementById("editorContent");
const noteTitleInput = document.getElementById("noteTitleInput");
const noteTextInput = document.getElementById("noteTextInput");
const saveStatus = document.getElementById("saveStatus");
const noteSearchInput = document.getElementById("noteSearchInput");
const newNoteBtn = document.getElementById("newNoteBtn");
const deleteNoteBtn = document.getElementById("deleteNoteBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userNameDisplay = document.getElementById("userNameDisplay");

// ============================
// ESTADO GLOBAL
// ============================
let currentUserId = null;          // UID do usuário
let currentNoteId = null;         // ID da nota selecionada
let allNotes = [];               // array com os dados das notas (do snapshot)
let saveTimeout = null;

// ============================
// FUNÇÕES CRUD (com Firestore)
// ============================

// Referência à subcoleção Notes do usuário
function getUserNotesRef() {
    if (!currentUserId) throw new Error("Usuário não autenticado");
    return collection(db, "Users", currentUserId, "Notes");
}

// Carregar notas em tempo real (onSnapshot)
function subscribeToNotes() {
    if (!currentUserId) return;

    const notesRef = getUserNotesRef();
    const q = query(notesRef, orderBy("createdAt", "desc"));

    const unsubscribe = onSnapshot(q, (snapshot) => {
        allNotes = [];
        snapshot.forEach((doc) => {
            const data = doc.data();
            allNotes.push({
                id: doc.id,
                title: data.title || "Sem título",
                text: data.text || "",
                createdAt: data.createdAt?.toDate?.() || new Date(),
                updatedAt: data.updatedAt?.toDate?.() || new Date()
            });
        });

        // Atualizar lista
        renderNotesList(noteSearchInput.value);

        // Se a nota atual foi removida, limpar editor
        if (currentNoteId && !allNotes.some(n => n.id === currentNoteId)) {
            clearEditor();
        }
    }, (error) => {
        console.error("Erro ao carregar notas:", error);
        alert("Erro ao carregar notas. Verifique sua conexão.");
    });

    // Retorna função para cancelar inscrição (opcional)
    return unsubscribe;
}

// Adicionar nova nota
async function addNote() {
    if (!currentUserId) return;

    const notesRef = getUserNotesRef();
    try {
        const docRef = await addDoc(notesRef, {
            title: "Nova Nota",
            text: "",
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
        });
        // A seleção será feita automaticamente pelo snapshot
    } catch (error) {
        console.error("Erro ao criar nota:", error);
        alert("Não foi possível criar a nota.");
    }
}

// Atualizar nota existente
async function updateNote(noteId, title, text) {
    if (!currentUserId || !noteId) return;

    const noteRef = doc(db, "Users", currentUserId, "Notes", noteId);
    try {
        await updateDoc(noteRef, {
            title: title,
            text: text,
            updatedAt: serverTimestamp()
        });
        // O snapshot atualizará a lista
    } catch (error) {
        console.error("Erro ao atualizar nota:", error);
        alert("Não foi possível salvar a nota.");
    }
}

// Deletar nota
async function deleteNote(noteId) {
    if (!currentUserId || !noteId) return;
    if (!confirm("Tem certeza que deseja excluir esta nota?")) return;

    const noteRef = doc(db, "Users", currentUserId, "Notes", noteId);
    try {
        await deleteDoc(noteRef);
        // O snapshot atualizará a lista
        clearEditor();
    } catch (error) {
        console.error("Erro ao excluir nota:", error);
        alert("Não foi possível excluir a nota.");
    }
}

// ============================
// RENDERIZAÇÃO DA LISTA
// ============================

function renderNotesList(filter = "") {
    notesListContainer.innerHTML = "";

    const filtered = allNotes.filter(n =>
        n.title.toLowerCase().includes(filter.toLowerCase()) ||
        n.text.toLowerCase().includes(filter.toLowerCase())
    );

    if (filtered.length === 0) {
        notesListContainer.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--text-light);">Nenhuma nota encontrada.</div>`;
        return;
    }

    filtered.forEach(note => {
        const item = document.createElement("div");
        item.className = `note-item ${note.id === currentNoteId ? 'active' : ''}`;
        item.onclick = () => selectNote(note.id);

        const snippet = note.text ? note.text.substring(0, 35) + "..." : "Sem descrição...";

        item.innerHTML = `
            <div class="note-item-title">${note.title || "Sem título"}</div>
            <div class="note-item-snippet">${snippet}</div>
        `;
        notesListContainer.appendChild(item);
    });
}

// ============================
// SELEÇÃO E EDIÇÃO
// ============================

function selectNote(id) {
    const note = allNotes.find(n => n.id === id);
    if (!note) return;

    currentNoteId = id;
    // Atualiza o editor
    noteTitleInput.value = note.title;
    noteTextInput.value = note.text;
    saveStatus.innerText = "Pronto";

    emptyEditorState.style.display = "none";
    editorContent.style.display = "flex";

    renderNotesList(noteSearchInput.value);
}

function clearEditor() {
    currentNoteId = null;
    editorContent.style.display = "none";
    emptyEditorState.style.display = "flex";
    noteTitleInput.value = "";
    noteTextInput.value = "";
    saveStatus.innerText = "Pronto";
}

// ============================
// SALVAMENTO AUTOMÁTICO (DEBOUNCE)
// ============================

function autoSave() {
    if (!currentNoteId) return;

    const title = noteTitleInput.value;
    const text = noteTextInput.value;

    // Encontra a nota no array local para evitar atualizações desnecessárias
    const current = allNotes.find(n => n.id === currentNoteId);
    if (current && current.title === title && current.text === text) {
        saveStatus.innerText = "Pronto";
        return;
    }

    saveStatus.innerText = "Salvando...";
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        updateNote(currentNoteId, title, text).then(() => {
            saveStatus.innerText = "Salvo";
        }).catch(() => {
            saveStatus.innerText = "Erro ao salvar";
        });
    }, 1000);
}

// ============================
// EVENT LISTENERS
// ============================

newNoteBtn.addEventListener("click", addNote);

deleteNoteBtn.addEventListener("click", () => {
    if (currentNoteId) deleteNote(currentNoteId);
});

noteTitleInput.addEventListener("input", autoSave);
noteTextInput.addEventListener("input", autoSave);

noteSearchInput.addEventListener("input", (e) => {
    renderNotesList(e.target.value);
});

logoutBtn.addEventListener("click", async () => {
    try {
        await signOut(auth);
        // Redirecionamento será feito pelo onAuthStateChanged
    } catch (error) {
        console.error("Erro ao sair:", error);
    }
});

// ============================
// AUTENTICAÇÃO
// ============================

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        // Redireciona para login
        window.location.href = "index.html";
        return;
    }

    // Usuário autenticado
    currentUserId = user.uid;

    // Exibir nome (se disponível)
    userNameDisplay.textContent = user.displayName || user.email || "Usuário";

    // Iniciar escuta das notas
    subscribeToNotes();

    // Opcional: buscar documento do usuário para garantir que existe
    try {
        const userDoc = await getDoc(doc(db, "Users", currentUserId));
        if (!userDoc.exists()) {
            // Se o documento do usuário não existir, podemos criar com dados básicos
            // (isso segue a estrutura do miu.py)
            await setDoc(doc(db, "Users", currentUserId), {
                username: user.displayName || "",
                email: user.email || "",
                phone: "",
                birth_date: "",
                security_code: "",
                monthly_cost: 0.0,
                status: "active",
                role: "user",
                created_at: serverTimestamp(),
                updated_at: serverTimestamp()
            });
        }
    } catch (error) {
        console.warn("Erro ao verificar documento do usuário:", error);
    }
});

// ============================
// ANIMAÇÃO DAS BOLINHAS (SIDEBAR)
// ============================
const sidebarDots = document.querySelectorAll(".dot-sidebar");
const positions = [
    {x: 0, y: -10}, 
    {x: 10, y: 0}, 
    {x: 0, y: 10}, 
    {x: -10, y: 0}
];

function shuffleArray(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startSidebarAnimation() {
    setInterval(() => {
        const p = shuffleArray(positions);
        sidebarDots.forEach((dot, i) => {
            dot.style.transform = `translate(${p[i].x}px, ${p[i].y}px)`;
        });
    }, 1000);
}

startSidebarAnimation();

</script>
